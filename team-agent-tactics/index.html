<div id="game-container"></div>

<script>
(function() {
  var E2E_GAME_SLUG = "team-agent-tactics";
  var E2E = window.__playgentE2EState || {
    version: 1,
    regions: [],
    lastPhase: "loading",
    lastStatus: "loading",
    lastPlayerId: "",
    lastCurrentPlayer: "",
    lastLegalActionCount: 0,
    lastVisibleLegalActionCount: 0,
    lastActions: [],
    lastRawActions: []
  };
  window.__playgentE2EState = E2E;

  function setE2EAttr(el, name, value) {
    if (!el) return;
    el.setAttribute(name, value == null ? "" : String(value));
  }

  function unwrapE2EAction(option) {
    if (option && typeof option === "object" && option.decision !== undefined) return option.decision;
    if (option && typeof option === "object" && option.action !== undefined) return option.action;
    return option;
  }

  function isVisibleE2EAction(action) {
    action = unwrapE2EAction(action);
    if (!action || typeof action !== "object") return false;
    if (action.type === "advance_phase" || action.type === "system" || action.type === "noop") return false;
    return true;
  }

  function getVisibleE2EActions(actions) {
    var out = [];
    for (var i = 0; actions && i < actions.length; i++) {
      if (isVisibleE2EAction(actions[i])) out.push(unwrapE2EAction(actions[i]));
    }
    return out;
  }

  function ensureE2ETelemetry() {
    var el = document.getElementById("e2e-telemetry");
    if (!el) {
      el = document.createElement("div");
      el.id = "e2e-telemetry";
      if (document.body) document.body.appendChild(el);
    }
    el.setAttribute("aria-hidden", "true");
    el.style.cssText = "position:fixed;width:1px;height:1px;overflow:hidden;opacity:0;pointer-events:none;left:0;top:0;";
    setE2EAttr(el, "data-game", E2E_GAME_SLUG);
    setE2EAttr(el, "data-phase", E2E.lastPhase);
    setE2EAttr(el, "data-status", E2E.lastStatus);
    setE2EAttr(el, "data-player", E2E.lastPlayerId || "spectator");
    return el;
  }

  function addUnique(list, el) {
    if (!el) return;
    for (var i = 0; i < list.length; i++) if (list[i] === el) return;
    list.push(el);
  }

  function getE2ERoots() {
    var roots = [];
    addUnique(roots, ensureE2ETelemetry());
    addUnique(roots, document.getElementById("telemetry"));
    addUnique(roots, document.getElementById("game"));
    addUnique(roots, document.getElementById("game-container"));
    addUnique(roots, document.querySelector("[data-board]"));
    return roots;
  }

  function getCurrentPlayerE2E(view) {
    if (!view) return "";
    return view.currentPlayer || view.currentPlayerId || view.currentActor || view.turn || "";
  }

  function updateE2EPlayers(players) {
    var telemetry = ensureE2ETelemetry();
    var host = document.getElementById("e2e-players");
    if (!host) {
      host = document.createElement("div");
      host.id = "e2e-players";
      telemetry.appendChild(host);
    }
    host.textContent = "";
    for (var i = 0; players && i < players.length; i++) {
      var p = players[i] || {};
      var span = document.createElement("span");
      setE2EAttr(span, "data-player", p.id || "");
      setE2EAttr(span, "data-player-name", p.name || p.id || "");
      span.textContent = p.name || p.id || "";
      host.appendChild(span);
    }
  }

  function updateE2ELandmarks(view, legalActions, context) {
    var visibleActions = getVisibleE2EActions(legalActions || []);
    var phase = context && context.gameOver ? "game-over" : (view && (view.phase || view.mode || view.stage) ? (view.phase || view.mode || view.stage) : "playing");
    var status = context && context.gameOver ? "game-over" : (visibleActions.length > 0 ? "your-turn" : "waiting");
    var playerId = context && context.myId ? context.myId : "spectator";
    var currentPlayer = getCurrentPlayerE2E(view);
    var roots = getE2ERoots();
    E2E.lastPhase = phase;
    E2E.lastStatus = status;
    E2E.lastPlayerId = playerId;
    E2E.lastCurrentPlayer = currentPlayer;
    E2E.lastRawActions = legalActions || [];
    E2E.lastActions = visibleActions;
    E2E.lastLegalActionCount = (legalActions || []).length;
    E2E.lastVisibleLegalActionCount = visibleActions.length;
    for (var i = 0; i < roots.length; i++) {
      setE2EAttr(roots[i], "data-game", E2E_GAME_SLUG);
      setE2EAttr(roots[i], "data-phase", phase);
      setE2EAttr(roots[i], "data-status", status);
      setE2EAttr(roots[i], "data-player", playerId);
      setE2EAttr(roots[i], "data-current-player", currentPlayer);
      if (view && view.round != null) setE2EAttr(roots[i], "data-round", view.round);
      if (view && view.turnNumber != null) setE2EAttr(roots[i], "data-turn", view.turnNumber);
    }
    updateE2EPlayers(context && context.players ? context.players : []);
  }

  function actionTypeForIndex(idx) {
    var raw = E2E.lastRawActions && E2E.lastRawActions[idx] ? unwrapE2EAction(E2E.lastRawActions[idx]) : null;
    return raw && raw.type ? raw.type : "choose";
  }

  function safeLabelFromNode(node) {
    var label = node.getAttribute("data-action-label") || node.getAttribute("aria-label") || node.title || node.textContent || node.value || "";
    return String(label).replace(/\s+/g, " ").trim().slice(0, 100);
  }

  function decorateE2EDOMControls() {
    var nodes = document.querySelectorAll("[data-action-idx], [data-action], button, [role='button'], input[type='button'], input[type='submit'], input:not([type='hidden']), select, textarea, [data-cell], [data-card], [data-card-id], [data-option-id], [data-brainrot], canvas");
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      if (node.hasAttribute("data-action") && !node.hasAttribute("data-action-idx")) {
        node.setAttribute("data-action-idx", node.getAttribute("data-action"));
      }
      if (node.hasAttribute("data-action-idx")) {
        var idx = parseInt(node.getAttribute("data-action-idx"), 10);
        if (!isNaN(idx) && !node.hasAttribute("data-action-type")) node.setAttribute("data-action-type", actionTypeForIndex(idx));
        if (!node.hasAttribute("data-action-label")) node.setAttribute("data-action-label", safeLabelFromNode(node));
      }
      if (node.hasAttribute("data-cell") && !node.getAttribute("aria-label")) {
        node.setAttribute("aria-label", "cell " + node.getAttribute("data-cell"));
      }
      if ((node.hasAttribute("data-card") || node.hasAttribute("data-card-id")) && !node.getAttribute("aria-label")) {
        node.setAttribute("aria-label", "card " + (node.getAttribute("data-card") || node.getAttribute("data-card-id")));
      }
      if (node.tagName === "CANVAS" && !node.getAttribute("aria-label")) {
        node.setAttribute("aria-label", E2E_GAME_SLUG + " canvas");
      }
    }
  }

  function e2eBeginFrame(view, legalActions, context) {
    E2E.regions = [];
    updateE2ELandmarks(view || {}, legalActions || [], context || {});
  }

  function e2eAfterRender() {
    decorateE2EDOMControls();
  }

  function isVisibleE2ENode(node) {
    if (!node || !node.getBoundingClientRect) return false;
    var rect = node.getBoundingClientRect();
    if (rect.width <= 0 || rect.height <= 0) return false;
    if (rect.right <= 0 || rect.bottom <= 0 || rect.left >= window.innerWidth || rect.top >= window.innerHeight) return false;
    var style = window.getComputedStyle ? window.getComputedStyle(node) : null;
    if (style && (style.display === "none" || style.visibility === "hidden" || style.opacity === "0")) return false;
    if (node.disabled || node.getAttribute("aria-disabled") === "true") return false;
    return true;
  }

  function regionKindForNode(node) {
    if (node.tagName === "CANVAS") return "canvas";
    if (node.tagName === "INPUT" || node.tagName === "SELECT" || node.tagName === "TEXTAREA") return "input";
    if (node.hasAttribute("data-cell")) return "cell";
    if (node.hasAttribute("data-card") || node.hasAttribute("data-card-id")) return "card";
    return "button";
  }

  function getDOMActionRegions() {
    decorateE2EDOMControls();
    var nodes = document.querySelectorAll("[data-action-idx], button, [role='button'], input[type='button'], input[type='submit'], input:not([type='hidden']), select, textarea, [data-cell], [data-card], [data-card-id], [data-option-id], [data-brainrot], canvas");
    var out = [];
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      if (!isVisibleE2ENode(node)) continue;
      var r = clipE2ERect(node.getBoundingClientRect());
      if (!r) continue;
      var id = node.id || node.getAttribute("data-action-idx") || node.getAttribute("data-cell") || node.getAttribute("data-card") || node.getAttribute("data-card-id") || node.getAttribute("data-option-id") || node.getAttribute("data-brainrot") || ("control-" + i);
      out.push({
        id: String(id),
        kind: regionKindForNode(node),
        label: safeLabelFromNode(node),
        actionType: node.getAttribute("data-action-type") || "",
        selector: node.id ? ("#" + node.id) : "",
        rect: { x: r.left, y: r.top, width: r.width, height: r.height },
        center: { x: r.left + r.width / 2, y: r.top + r.height / 2 }
      });
    }
    return out;
  }

  function clipE2ERect(rect) {
    if (!rect) return null;
    var x = Number(rect.x != null ? rect.x : rect.left) || 0;
    var y = Number(rect.y != null ? rect.y : rect.top) || 0;
    var width = Number(rect.width) || 0;
    var height = Number(rect.height) || 0;
    var left = Math.max(0, x);
    var top = Math.max(0, y);
    var right = Math.min(window.innerWidth, x + width);
    var bottom = Math.min(window.innerHeight, y + height);
    if (right - left <= 0 || bottom - top <= 0) return null;
    return { x: left, y: top, width: right - left, height: bottom - top };
  }

  function e2eRegisterRegion(region) {
    if (!region || !region.id || !region.rect) return;
    var r = clipE2ERect(region.rect);
    if (!r || r.width == null || r.height == null) return;
    var item = {
      id: String(region.id),
      kind: region.kind || "button",
      label: region.label || "",
      actionType: region.actionType || "",
      rect: { x: Number(r.x) || 0, y: Number(r.y) || 0, width: Number(r.width) || 0, height: Number(r.height) || 0 },
      center: region.center || { x: (Number(r.x) || 0) + (Number(r.width) || 0) / 2, y: (Number(r.y) || 0) + (Number(r.height) || 0) / 2 }
    };
    for (var i = 0; i < E2E.regions.length; i++) {
      if (E2E.regions[i].id === item.id) {
        E2E.regions[i] = item;
        return;
      }
    }
    E2E.regions.push(item);
  }

  function e2eCanvasRect(localRect, app) {
    var canvas = app && app.canvas ? app.canvas : document.querySelector("canvas");
    var screen = app && app.screen ? app.screen : null;
    if (!canvas || !localRect) return null;
    var canvasRect = canvas.getBoundingClientRect();
    var screenW = screen && screen.width ? screen.width : canvasRect.width;
    var screenH = screen && screen.height ? screen.height : canvasRect.height;
    var sx = canvasRect.width / (screenW || canvasRect.width || 1);
    var sy = canvasRect.height / (screenH || canvasRect.height || 1);
    return {
      x: canvasRect.left + localRect.x * sx,
      y: canvasRect.top + localRect.y * sy,
      width: localRect.width * sx,
      height: localRect.height * sy
    };
  }

  function e2ePixiBounds(displayObject, app) {
    if (!displayObject || !displayObject.getBounds) return null;
    var b = displayObject.getBounds();
    return e2eCanvasRect({ x: b.x, y: b.y, width: b.width, height: b.height }, app);
  }

  function getE2ECanvasInfo() {
    var canvas = document.querySelector("canvas");
    if (!canvas) return null;
    var rect = canvas.getBoundingClientRect();
    return { selector: "canvas", width: rect.width, height: rect.height };
  }

  function getAllE2ERegions() {
    var out = E2E.regions.slice();
    var dom = getDOMActionRegions();
    var seen = {};
    var merged = [];
    for (var i = 0; i < out.length; i++) { seen[out[i].id] = true; merged.push(out[i]); }
    for (var j = 0; j < dom.length; j++) {
      if (!seen[dom[j].id]) merged.push(dom[j]);
    }
    return merged;
  }

  function runE2ELayoutChecks() {
    var failures = [];
    var regions = getAllE2ERegions();
    var canvas = getE2ECanvasInfo();
    if (E2E.lastVisibleLegalActionCount > 0 && regions.length === 0) {
      failures.push({ severity: "error", message: "active legal actions did not create visible controls" });
    }
    if (canvas && (canvas.width <= 0 || canvas.height <= 0)) {
      failures.push({ severity: "error", message: "canvas has empty bounds" });
    }
    for (var i = 0; i < regions.length; i++) {
      var region = regions[i];
      var r = region.rect;
      if (!r) {
        failures.push({ severity: "error", message: region.id + " has no rect" });
        continue;
      }
      if (r.width <= 0 || r.height <= 0) failures.push({ severity: "error", message: region.id + " has empty bounds" });
      if (r.x < -1 || r.y < -1 || r.x + r.width > window.innerWidth + 1 || r.y + r.height > window.innerHeight + 1) {
        failures.push({ severity: "error", message: region.id + " is offscreen" });
      }
      if (region.kind !== "canvas" && (r.width < 36 || r.height < 36)) {
        failures.push({ severity: "warning", message: region.id + " is a small touch target" });
      }
    }
    return failures;
  }

  window.__playgentE2EBegin = e2eBeginFrame;
  window.__playgentE2EAfterRender = e2eAfterRender;
  window.__playgentE2ERegisterRegion = e2eRegisterRegion;
  window.__playgentE2ECanvasRect = e2eCanvasRect;
  window.__playgentE2EPixiBounds = e2ePixiBounds;
  window.__playgentE2ERunLayoutChecks = runE2ELayoutChecks;
  window.__playgentE2E = {
    version: 1,
    getSnapshot: function() {
      return {
        phase: E2E.lastPhase,
        status: E2E.lastStatus,
        playerId: E2E.lastPlayerId,
        currentPlayer: E2E.lastCurrentPlayer,
        legalActionCount: E2E.lastVisibleLegalActionCount,
        regionCount: getAllE2ERegions().length,
        canvas: getE2ECanvasInfo()
      };
    },
    getInteractiveRegions: function() { return getAllE2ERegions(); },
    checkLayout: function() { return runE2ELayoutChecks(); }
  };

  if (typeof window.__playgentCheckLayout !== "function") {
    window.__playgentCheckLayout = function() { return runE2ELayoutChecks(); };
  }

  function patchPlaygentE2E() {
    if (!window.playgent || !window.playgent.onStateChange || window.playgent.__e2ePatched) return false;
    var original = window.playgent.onStateChange;
    window.playgent.onStateChange = function(cb) {
      return original.call(window.playgent, function(view, legalActions, context) {
        e2eBeginFrame(view, legalActions, context || {});
        var result = cb.apply(this, arguments);
        e2eAfterRender();
        return result;
      });
    };
    window.playgent.__e2ePatched = true;
    return true;
  }

  ensureE2ETelemetry();
  decorateE2EDOMControls();
  if (!patchPlaygentE2E()) {
    var tries = 0;
    var timer = setInterval(function() {
      tries++;
      if (patchPlaygentE2E() || tries > 80) clearInterval(timer);
    }, 50);
  }
}());
</script>

<script>
/* ===================================================================
   Arena Tactics — GameRenderer + Initialization
   Orchestrates all modules for 1v1 / 2v2 auto-battler.
   =================================================================== */

function unwrapAction(option) {
  if (option && typeof option === 'object' && option.decision !== undefined) return option.decision;
  if (option && typeof option === 'object' && option.action !== undefined) return option.action;
  return option;
}

var GameRenderer = {
  app: null,
  gameWorld: null,
  hudLayer: null,
  unitSprites: {},
  selectedBenchIdx: -1,
  selectedBoardIdx: -1,
  _lastPhase: null,
  _myId: null,
  _oppId: null,
  _isSpectator: false,
  _lastView: null,
  _lastLeaderboard: null,
  _tileClickHandlers: [],
  _time: 0,
  _vsOverlay: null,
  _vsOverlayBg: null,
  _vsLeftText: null,
  _vsRightText: null,
  _vsCenterText: null,
  _vsLeftCount: null,
  _vsRightCount: null,

  init: function() {
    _initUnitContexts();

    var container = document.getElementById('game-container');
    var app = new PIXI.Application();
    GameRenderer.app = app;

    return app.init({
      resizeTo: container,
      antialias: true,
      resolution: Math.min(window.devicePixelRatio || 1, 2),
      autoDensity: true,
      background: 0x0a1210,
    }).then(function() {
      container.appendChild(app.canvas);

      var w = app.screen.width;
      var h = app.screen.height;

      var gameWorld = new PIXI.Container();
      gameWorld.label = 'gameWorld';
      var hudLayer = new PIXI.Container();
      hudLayer.label = 'hudLayer';
      app.stage.addChild(gameWorld, hudLayer);
      GameRenderer.gameWorld = gameWorld;
      GameRenderer.hudLayer = hudLayer;

      /* Ambient FX — below everything in gameWorld */
      AmbientFX.create(gameWorld, w, h);

      /* Create views */
      BoardView.create(gameWorld, w, h);
      HudView.create(hudLayer, w, h);
      ShopPanel.create(hudLayer, w, h);
      BenchPanel.create(hudLayer, w, h);
      GameOverOverlay.create(hudLayer, w, h);

      /* VS Matchup Preview overlay */
      var vsOv = new PIXI.Container();
      vsOv.label = 'vsOverlay';
      vsOv.visible = false;
      var vsOvBg = new PIXI.Graphics();
      vsOvBg.rect(0, 0, w, h).fill({ color: 0x000000 });
      vsOvBg.alpha = 0.6;
      GameRenderer._vsOverlayBg = vsOvBg;
      vsOv.addChild(vsOvBg);
      var vsLeftT = new PIXI.Text({ text: '', style: { fontSize: 16, fill: 0x60a5fa, fontFamily: 'monospace', fontWeight: 'bold' } });
      vsLeftT.anchor.set(1, 0.5);
      vsLeftT.x = w / 2 - 40;
      vsLeftT.y = h / 2 - 10;
      GameRenderer._vsLeftText = vsLeftT;
      vsOv.addChild(vsLeftT);
      var vsRightT = new PIXI.Text({ text: '', style: { fontSize: 16, fill: 0xef4444, fontFamily: 'monospace', fontWeight: 'bold' } });
      vsRightT.anchor.set(0, 0.5);
      vsRightT.x = w / 2 + 40;
      vsRightT.y = h / 2 - 10;
      GameRenderer._vsRightText = vsRightT;
      vsOv.addChild(vsRightT);
      var vsCtr = new PIXI.Text({ text: 'VS', style: { fontSize: 28, fill: 0xffd700, fontFamily: 'monospace', fontWeight: 'bold' } });
      vsCtr.anchor.set(0.5, 0.5);
      vsCtr.x = w / 2;
      vsCtr.y = h / 2 - 10;
      GameRenderer._vsCenterText = vsCtr;
      vsOv.addChild(vsCtr);
      var vsLeftC = new PIXI.Text({ text: '', style: { fontSize: 11, fill: 0x888888, fontFamily: 'monospace' } });
      vsLeftC.anchor.set(1, 0.5);
      vsLeftC.x = w / 2 - 40;
      vsLeftC.y = h / 2 + 14;
      GameRenderer._vsLeftCount = vsLeftC;
      vsOv.addChild(vsLeftC);
      var vsRightC = new PIXI.Text({ text: '', style: { fontSize: 11, fill: 0x888888, fontFamily: 'monospace' } });
      vsRightC.anchor.set(0, 0.5);
      vsRightC.x = w / 2 + 40;
      vsRightC.y = h / 2 + 14;
      GameRenderer._vsRightCount = vsRightC;
      vsOv.addChild(vsRightC);
      GameRenderer._vsOverlay = vsOv;
      hudLayer.addChild(vsOv);

      /* Effect pool — on top of unit layer */
      EffectPool.create(gameWorld);

      /* Hide shop/bench initially */
      ShopPanel._container.visible = false;
      BenchPanel._container.visible = false;

      /* Single ticker callback */
      app.ticker.add(GameRenderer._tick);

      /* Resize handler */
      app.renderer.on('resize', GameRenderer._onResize);
    });
  },

  _tick: function(ticker) {
    Tween.update(ticker.deltaTime);
    AmbientFX.update(performance.now());
    UnitSprite.updateAllIdle(GameRenderer.unitSprites, performance.now());
    BattleReplay.update(ticker.deltaTime);
    EffectPool.update(ticker.deltaTime);
    /* Battle line pulse during battle phase */
    if (BoardView._battleLine && BoardView._battleLine._pulsePhase) {
      var sec = performance.now() * 0.001;
      BoardView._battleLine.alpha = 0.5 + 0.3 * Math.sin(sec * 4);
      if (BoardView._battleLineGlow) {
        BoardView._battleLineGlow.alpha = 0.1 + 0.15 * Math.sin(sec * 4);
      }
    }
    /* Bench selection pulse */
    if (BenchPanel._selectedIdx >= 0) {
      var selChip = BenchPanel._chips[BenchPanel._selectedIdx];
      if (selChip && selChip.visible) {
        var pSec = performance.now() * 0.001;
        var pulseAlpha = 0.6 + 0.4 * Math.sin(pSec * 5);
        selChip._bg.alpha = pulseAlpha;
      }
    }
  },

  _onResize: function(w, h) {
    BoardView.reposition(w, h);
    ShopPanel.reposition(w, h);
    BenchPanel.reposition(w, h);
    HudView.reposition(w, h);
    GameOverOverlay.reposition(w, h);
    AmbientFX.reposition(w, h);

    if (GameRenderer._lastView) {
      var view = GameRenderer._lastView;
      var myId = GameRenderer._myId;
      var oppId = GameRenderer._oppId;
      var isSpec = GameRenderer._isSpectator;
      BoardView.renderUnits(view, myId, oppId, GameRenderer.unitSprites, w, h, isSpec);
    }
  },

  handleResize: function() {
    if (GameRenderer.app) {
      var w = GameRenderer.app.screen.width;
      var h = GameRenderer.app.screen.height;
      GameRenderer._onResize(w, h);
    }
  },

  _collectStarUnitKeys: function(player) {
    var keys = {};
    var scan = function(list) {
      if (!list) return;
      for (var i = 0; i < list.length; i++) {
        var unit = list[i];
        if (unit && unit.star) {
          keys[unit.id || (unit.unitId + ':' + i)] = true;
        }
      }
    };
    scan(player.board);
    scan(player.bench);
    return keys;
  },

  _playVisibleStarSounds: function(prevView, view) {
    if (!prevView || !prevView.players || !view.players ||
        typeof playgent === 'undefined' || !playgent.sound) return;
    var played = false;
    for (var pid in view.players) {
      if (played) break;
      var prevPlayer = prevView.players[pid];
      var player = view.players[pid];
      if (!prevPlayer || !player) continue;
      if ((!prevPlayer.board || !player.board) && (!prevPlayer.bench || !player.bench)) continue;
      var prevStars = GameRenderer._collectStarUnitKeys(prevPlayer);
      var stars = GameRenderer._collectStarUnitKeys(player);
      for (var key in stars) {
        if (!prevStars[key]) {
          playgent.sound('positive.clean');
          played = true;
          break;
        }
      }
    }
  },

  /**
   * Main state change handler — FFA version.
   */
  onStateChange: function(view, legalActions, context) {
    legalActions = (legalActions || []).map(unwrapAction);
    var prevView = GameRenderer._lastView;
    var myId = context.myId;
    var isSpectator = !myId || !view.players[myId];

    /* Spectator fallback: follow first player */
    if (isSpectator && view.playerIds && view.playerIds.length > 0) {
      myId = view.playerIds[0];
    }

    /* Opponent from myMatchup */
    var oppId = view.myMatchup || null;

    GameRenderer._myId = myId;
    GameRenderer._oppId = oppId;
    GameRenderer._isSpectator = isSpectator;
    GameRenderer._lastView = view;

    var w = GameRenderer.app.screen.width;
    var h = GameRenderer.app.screen.height;

    /* Re-layout when spectator mode or 2v2 mode changes */
    var prevSpectator = Layout._isSpectator;
    var prev2v2 = Layout._is2v2;
    Layout._isSpectator = isSpectator;
    Layout._is2v2 = view.mode === '2v2';
    if (prevSpectator !== isSpectator || prev2v2 !== Layout._is2v2) {
      GameRenderer._onResize(w, h);
    }
    var myPlayer = myId ? view.players[myId] : null;
    GameRenderer._playVisibleStarSounds(prevView, view);

    /* Phase transition handling */
    if (GameRenderer._lastPhase !== view.phase) {
      if (GameRenderer._lastPhase && typeof playgent !== 'undefined' && playgent.sound) {
        if (view.phase === 'shop') playgent.sound('phase.shop');
        else if (view.phase === 'battle') playgent.sound('phase.battle');
        else if (view.phase === 'battleResult') playgent.sound('combat.heavy');
        else if (view.phase === 'gameOver') playgent.sound(myPlayer && myPlayer.teamId === view.winningTeam ? 'game.victory' : (myPlayer ? 'game.defeat' : 'game.over'));
        else playgent.sound('phase.change');
      }
      if (view.phase !== 'battle' && view.phase !== 'battleResult') {
        BattleReplay.stop(GameRenderer.unitSprites);
        EffectPool.clear();
      }
      BoardView.updatePhase(view.phase, w, h);

      /* VS Matchup Preview — show on shop→battle transition */
      if (view.phase === 'battle' && GameRenderer._lastPhase === 'shop' && GameRenderer._vsOverlay) {
        var names = view.playerNames || {};
        var myName = _truncName(names[myId] || myId || '?');
        var oppName = _truncName(names[oppId] || oppId || '?');
        var teams = view.teams || { alpha: { hp: 50 }, beta: { hp: 50 } };
        var myTeamId = myPlayer ? myPlayer.teamId : 'alpha';
        var oppTeamId = myTeamId === 'alpha' ? 'beta' : 'alpha';
        var myTeamHp = teams[myTeamId] ? teams[myTeamId].hp : 0;
        var oppTeamHp = teams[oppTeamId] ? teams[oppTeamId].hp : 0;
        var myUnits = 0;
        var oppUnits = 0;
        if (myPlayer && myPlayer.board) {
          for (var mu = 0; mu < 8; mu++) { if (myPlayer.board[mu]) myUnits++; }
        }
        if (oppId && view.players[oppId] && view.players[oppId].board) {
          for (var ou = 0; ou < 8; ou++) { if (view.players[oppId].board[ou]) oppUnits++; }
        }
        GameRenderer._vsLeftText.text = myName + ' (' + myTeamHp + ' HP)';
        GameRenderer._vsRightText.text = oppName + ' (' + oppTeamHp + ' HP)';
        GameRenderer._vsRightText.style.fill = 0xef4444;
        GameRenderer._vsLeftCount.text = myUnits + ' units';
        GameRenderer._vsRightCount.text = oppUnits + ' units';
        GameRenderer._vsCenterText.scaleX = 2;
        GameRenderer._vsCenterText.scaleY = 2;
        Tween.to(GameRenderer._vsCenterText, { scaleX: 1, scaleY: 1 }, 300, 'backOut');
        GameRenderer._vsOverlay.visible = true;
        GameRenderer._vsOverlay.alpha = 1;
        Tween.killTweensOf(GameRenderer._vsOverlay);
        Tween.to(GameRenderer._vsOverlay, { alpha: 0 }, 1500, 'easeIn', function() {
          GameRenderer._vsOverlay.visible = false;
        });
      }
    }

    /* Start battle replay when entering battleResult with a battleLog */
    if (view.phase === 'battleResult' && GameRenderer._lastPhase !== 'battleResult' &&
        view.battleLog && view.battleLog.length > 0) {
      BattleReplay.play(view.battleLog, GameRenderer.unitSprites, null);
    }

    /* HUD — team HP, round counter, traits */
    HudView.update(view, myId, context);

    /* Board units */
    BoardView.renderUnits(view, myId, oppId, GameRenderer.unitSprites, w, h, isSpectator);

    /* Show/hide opponent tiles based on phase */
    BoardView._oppContainer.visible = isSpectator || view.phase !== 'shop';

    /* Opponent hidden label */
    if (BoardView._oppHiddenLabel) {
      BoardView._oppHiddenLabel.visible = !isSpectator && view.phase === 'shop';
    }

    /* Shop phase — for all players during shop */
    if (view.phase === 'shop' && myPlayer) {
      ShopPanel._container.visible = true;
      BenchPanel._container.visible = true;
      ShopPanel.update(myPlayer.shop, myPlayer.gold, legalActions, myPlayer.ready, isSpectator, view.mode);
      BenchPanel.update(myPlayer.bench, legalActions, isSpectator);
      BoardView.setOwnTilesInteractive(!isSpectator);
      GameRenderer._updateTileHandlers();
    } else {
      ShopPanel._container.visible = false;
      BenchPanel._container.visible = false;
      BoardView.setOwnTilesInteractive(false);
      BenchPanel._selectedIdx = -1;
      GameRenderer.selectedBoardIdx = -1;
    }

    /* Game over — show team result */
    if (view.phase === 'gameOver') {
      var myTeam = myPlayer ? myPlayer.teamId : null;
      var won = myTeam === view.winningTeam;
      GameOverOverlay.show(won, view.teams, view.winningTeam);
    } else {
      GameOverOverlay.hide();
    }

    GameRenderer._lastPhase = view.phase;
  },

  /**
   * Wire tile click handlers for placement during shop.
   */
  _updateTileHandlers: function() {
    for (var hi = 0; hi < GameRenderer._tileClickHandlers.length; hi++) {
      var ent = GameRenderer._tileClickHandlers[hi];
      ent.tile.off('pointertap', ent.handler);
    }
    GameRenderer._tileClickHandlers = [];

    if (!GameRenderer._lastView || GameRenderer._lastView.phase !== 'shop') return;

    var myId = GameRenderer._myId;
    var myPlayer = GameRenderer._lastView.players[myId];
    if (!myPlayer) return;

    for (var i = 0; i < BoardView._ownTiles.length; i++) {
      var tile = BoardView._ownTiles[i];
      var handler = (function(cellIdx) {
        return function() {
          GameRenderer._onTileClick(cellIdx);
        };
      })(tile._cellIdx);
      tile.on('pointertap', handler);
      GameRenderer._tileClickHandlers.push({ tile: tile, handler: handler });
      if (window.__playgentE2ERegisterRegion && window.__playgentE2EPixiBounds) {
        window.__playgentE2ERegisterRegion({
          id: 'own-cell-' + tile._cellIdx,
          kind: 'cell',
          label: 'own cell ' + tile._cellIdx,
          actionType: 'board-cell',
          rect: window.__playgentE2EPixiBounds(tile, GameRenderer.app)
        });
      }
    }

    /* Highlight empty tiles when a bench unit is selected */
    if (BenchPanel._selectedIdx >= 0 && myPlayer.board) {
      BoardView.highlightPlaceable(myPlayer.board);
    } else {
      BoardView.clearHighlights();
    }
  },

  _onTileClick: function(cellIdx) {
    var view = GameRenderer._lastView;
    var myId = GameRenderer._myId;
    if (!view || !myId || view.phase !== 'shop') return;
    var myPlayer = view.players[myId];
    if (!myPlayer) return;

    var cellOccupied = myPlayer.board && myPlayer.board[cellIdx];
    var benchIdx = BenchPanel._selectedIdx;
    var boardIdx = GameRenderer.selectedBoardIdx;

    if (benchIdx >= 0 && !cellOccupied) {
      var benchActions = BenchPanel._legalActions;
      for (var a = 0; a < benchActions.length; a++) {
        var act = benchActions[a];
        if (act.type === 'benchToBoard' && act.benchIndex === benchIdx && act.cell === cellIdx) {
          if (playgent.sound) playgent.sound('board.place');
          playgent.submitAction(act);
          BenchPanel._selectedIdx = -1;
          BenchPanel._highlightSelected();
          BoardView.clearHighlights();
          return;
        }
      }
    } else if (boardIdx >= 0 && boardIdx !== cellIdx && !cellOccupied) {
      var boardActions = ShopPanel._legalActions;
      for (var b = 0; b < boardActions.length; b++) {
        var bAct = boardActions[b];
        if (bAct.type === 'boardToBoard' && bAct.fromCell === boardIdx && bAct.toCell === cellIdx) {
          if (playgent.sound) playgent.sound('piece.move');
          playgent.submitAction(bAct);
          GameRenderer.selectedBoardIdx = -1;
          return;
        }
      }
    } else if (cellOccupied) {
      GameRenderer.selectedBoardIdx = cellIdx;
      BenchPanel._selectedIdx = -1;
      BenchPanel._highlightSelected();
    } else {
      GameRenderer.selectedBoardIdx = -1;
      BenchPanel._selectedIdx = -1;
      BenchPanel._highlightSelected();
    }
  }
};

/* ===== INITIALIZATION ===== */

(function() {
  var _pendingState = null;
  var _pendingActions = null;
  var _pendingCtx = null;
  var _ready = false;

  function onState(view, legalActions, context) {
    if (_ready) {
      GameRenderer.onStateChange(view, legalActions, context);
    } else {
      _pendingState = view;
      _pendingActions = legalActions;
      _pendingCtx = context;
    }
  }

  /* Register callback BEFORE PIXI init to catch early state delivery */
  if (typeof playgent !== 'undefined' && playgent.onStateChange) {
    playgent.onStateChange(onState);
  } else {
    var pCheck = setInterval(function() {
      if (typeof playgent !== 'undefined' && playgent.onStateChange) {
        clearInterval(pCheck);
        playgent.onStateChange(onState);
      }
    }, 50);
  }

  /* Wait for PIXI, then init */
  function tryInit() {
    if (typeof PIXI === 'undefined') { setTimeout(tryInit, 50); return; }
    GameRenderer.init().then(function() {
      _ready = true;
      if (_pendingState) {
        GameRenderer.onStateChange(_pendingState, _pendingActions, _pendingCtx);
        _pendingState = null;
      }
    }).catch(function(err) {
      var container = document.getElementById('game-container');
      var wrapper = document.createElement('div');
      wrapper.style.cssText = 'color:#ff6666;padding:20px;font-family:monospace;font-size:14px;';
      var title = document.createElement('p');
      title.textContent = 'Failed to initialize game renderer';
      title.style.fontWeight = 'bold';
      var msg = document.createElement('p');
      msg.style.cssText = 'margin-top:8px;color:#aaa;';
      msg.textContent = err.message || String(err);
      var webgl = document.createElement('p');
      webgl.style.cssText = 'margin-top:8px;color:#888;font-size:12px;';
      var hasWebGL = false;
      try { var c = document.createElement('canvas'); hasWebGL = !!(c.getContext('webgl2') || c.getContext('webgl')); } catch(e) { /* ignore */ }
      webgl.textContent = 'WebGL support: ' + hasWebGL;
      wrapper.appendChild(title);
      wrapper.appendChild(msg);
      wrapper.appendChild(webgl);
      container.textContent = '';
      container.appendChild(wrapper);
    });
  }
  tryInit();
})();
</script>
