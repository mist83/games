<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sketchcode</title>
  <style>
    :root {
      color-scheme: light;
      --blue: #245da1;
      --blue-dark: #123d73;
      --ink: #16181d;
      --paper: #ffffff;
      --panel: #f5f7fb;
      --panel-2: #e8edf5;
      --line: #ccd4df;
      --accent: #2563eb;
      --good: #12805c;
      --shadow: 0 8px 22px rgba(0, 0, 0, 0.18);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 18px 18px, rgba(255,255,255,0.12) 0 3px, transparent 4px),
        radial-gradient(circle at 56px 44px, rgba(255,255,255,0.10) 0 8px, transparent 9px),
        var(--blue);
      background-size: 92px 92px;
    }
    .app {
      height: 100vh;
      min-width: 0;
      padding: 8px;
      display: grid;
      grid-template-rows: minmax(0, 1fr);
    }
    .shell {
      min-height: 0;
      min-width: 0;
      display: grid;
      grid-template-columns: 270px minmax(0, 1fr) 350px;
      gap: 8px;
    }
    .left, .right, .canvasPanel {
      min-height: 0;
      min-width: 0;
      background: var(--panel);
      border: 5px solid var(--blue-dark);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .left {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }
    .panelTitle {
      min-width: 0;
      padding: 9px 11px;
      font-weight: 900;
      background: white;
      border-bottom: 1px solid var(--line);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .players {
      min-height: 0;
      overflow: auto;
      display: grid;
      align-content: start;
    }
    .player {
      min-height: 70px;
      display: grid;
      grid-template-columns: 32px minmax(0, 1fr) 48px;
      align-items: center;
      gap: 6px;
      padding: 7px 8px;
      background: white;
      border-bottom: 1px solid var(--line);
    }
    .player:nth-child(even) { background: #edf1f7; }
    .rank { font-size: 17px; font-weight: 900; }
    .pname { font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pscore { font-size: 13px; }
    .avatar {
      width: 44px;
      height: 44px;
      border: 3px solid black;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-weight: 900;
    }
    .drawerMark { color: var(--accent); font-size: 12px; font-weight: 900; }
    .solvedMark { color: var(--good); font-size: 12px; font-weight: 900; }
    .canvasPanel {
      background: var(--paper);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
    }
    .canvasHead {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }
    .roundText {
      min-width: 0;
      font-size: 19px;
      font-weight: 950;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .phasePill {
      border: 2px solid #111;
      border-radius: 6px;
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 950;
      background: white;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .canvasWrap {
      min-height: 0;
      min-width: 0;
      position: relative;
      background: white;
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    canvas {
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
      display: block;
      touch-action: none;
      background: white;
    }
    .svgLayerCanvas {
      pointer-events: none;
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    .bubbleLayer {
      pointer-events: none;
      position: absolute;
      inset: 0;
    }
    .statusStrip {
      min-height: 58px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
      padding: 6px;
      background: #f8fafc;
      border-top: 1px solid var(--line);
    }
    .statusItem {
      min-width: 0;
      border: 1px solid var(--line);
      background: white;
      border-radius: 6px;
      padding: 5px 7px;
      overflow: hidden;
    }
    .statusItem b { display: block; color: #64748b; font-size: 11px; }
    .statusItem span { display: block; font-size: 14px; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .right {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      background: white;
    }
    .feed {
      min-height: 0;
      overflow: auto;
      display: grid;
      align-content: end;
      background: white;
    }
    .msg {
      padding: 6px 9px;
      border-bottom: 1px solid #edf0f3;
      font-size: 14px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }
    .msg:nth-child(odd) { background: #f2f5fa; }
    .msg.good { color: var(--good); font-weight: 900; }
    .msg.system { color: var(--accent); font-weight: 900; }
    .msg.layer { color: #334155; font-size: 13px; }
    .msg.guess {
      margin: 4px 8px;
      border: 1px solid #c8d9f0;
      border-radius: 6px;
      background: #eef6ff;
      font-weight: 850;
      box-shadow: 0 1px 4px rgba(15, 23, 42, 0.08);
    }
    .msg.guess:nth-child(odd) { background: #eef6ff; }
    .msg.guess.you { border-color: #111827; }
    .msg.guess.good {
      color: var(--good);
      background: #e9f9f1;
      border-color: #9ed9bd;
    }
    .msg.guess.good:nth-child(odd) { background: #e9f9f1; }
    .controls {
      border-top: 1px solid var(--line);
      padding: 8px;
      display: grid;
      gap: 8px;
      background: #f8fafc;
    }
    .guessRow {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 82px;
      gap: 6px;
    }
    input {
      width: 100%;
      height: 42px;
      border: 2px solid #cbd5e1;
      border-radius: 6px;
      padding: 0 10px;
      font-size: 16px;
      background: white;
    }
    textarea {
      width: 100%;
      min-height: 154px;
      border: 2px solid #cbd5e1;
      border-radius: 6px;
      padding: 9px 10px;
      font: 13px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      resize: vertical;
      background: white;
    }
    .svgActions {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 0.55fr);
      gap: 6px;
    }
    select {
      width: 100%;
      height: 40px;
      border: 2px solid #cbd5e1;
      border-radius: 6px;
      padding: 0 8px;
      font-size: 14px;
      font-weight: 850;
      background: white;
    }
    button {
      min-width: 0;
      min-height: 38px;
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: white;
      font-weight: 900;
      cursor: pointer;
      font-size: 14px;
    }
    button.secondary { background: #5b6472; }
    button.toolActive { outline: 3px solid #111; }
    button:disabled { opacity: 0.45; cursor: default; }
    .drawerTools {
      display: grid;
      gap: 7px;
    }
    .toolRow, .colorRow, .sizeRow {
      min-width: 0;
      display: grid;
      gap: 5px;
    }
    .toolRow { grid-template-columns: repeat(2, 1fr); }
    .toolRow.mainTools { grid-template-columns: repeat(4, 1fr); }
    .shapeRow { grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); }
    .colorRow { grid-template-columns: repeat(6, 1fr); }
    .sizeRow { grid-template-columns: repeat(4, 1fr); }
    .shapeEditor {
      display: grid;
      gap: 7px;
      padding: 7px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: white;
    }
    .fieldGrid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 6px;
    }
    .field {
      display: grid;
      gap: 3px;
      min-width: 0;
      font-size: 11px;
      font-weight: 900;
      color: #475467;
    }
    .shapeActions {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 6px;
    }
    .rangeRow {
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr) 36px;
      gap: 6px;
      align-items: center;
      font-size: 11px;
      font-weight: 900;
    }
    .rangeRow input {
      height: 26px;
      padding: 0;
    }
    .swatch {
      min-width: 0;
      min-height: 42px;
      border: 3px solid #111;
      border-radius: 6px;
      color: transparent;
      font-size: 0;
    }
    .swatch.toolActive { outline: 3px solid var(--accent); outline-offset: 1px; }
    .hint {
      color: #475467;
      font-size: 13px;
      font-weight: 800;
      min-height: 18px;
      overflow-wrap: anywhere;
    }
    @media (max-width: 980px) {
      .app { padding: 6px; }
      .shell {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 56vh) minmax(0, 1fr);
        gap: 6px;
      }
      .left { display: none; }
      .canvasPanel, .right { border-width: 3px; }
      .canvasHead { padding: 6px 8px; }
      .roundText { font-size: 15px; }
      .phasePill { font-size: 11px; padding: 4px 7px; }
      .statusStrip { min-height: 48px; gap: 4px; padding: 4px; }
      .statusItem { padding: 4px; }
      .statusItem b { font-size: 10px; }
      .statusItem span { font-size: 12px; }
      .panelTitle { padding: 6px 8px; font-size: 14px; }
      .feed { min-height: 76px; }
      .msg { padding: 4px 7px; font-size: 12px; }
      .controls { padding: 6px; gap: 6px; }
      .guessRow { grid-template-columns: minmax(0, 1fr) 72px; }
      input { height: 38px; font-size: 14px; }
      button { min-height: 36px; font-size: 12px; }
      .swatch { min-height: 42px; }
      .hint { font-size: 11px; }
    }
  </style>
</head>
<body>
  <div class="app" data-phase="loading" data-status="waiting" data-player="">
    <main class="shell">
      <aside class="left">
        <div class="panelTitle">Players</div>
        <div class="players" id="players"></div>
      </aside>
      <section class="canvasPanel">
        <div class="canvasHead">
          <div class="roundText" id="roundText">Round 1</div>
          <div class="phasePill" id="phasePill">Waiting</div>
        </div>
        <div class="canvasWrap">
          <canvas id="board" width="1000" height="1000" aria-label="Sketchcode canvas"></canvas>
          <svg id="svgLayerCanvas" class="svgLayerCanvas" viewBox="0 0 100 100" aria-hidden="true"></svg>
          <div class="bubbleLayer" id="bubbleLayer"></div>
        </div>
        <div class="statusStrip">
          <div class="statusItem"><b>Word</b><span id="wordText">_ _ _ _</span></div>
          <div class="statusItem"><b>Drawer</b><span id="drawerText">-</span></div>
          <div class="statusItem"><b>Layers</b><span id="markText">0</span></div>
          <div class="statusItem"><b>Resource</b><span id="resourceText">-</span></div>
        </div>
      </section>
      <aside class="right">
        <div class="panelTitle" id="rightTitle">Sketchcode</div>
        <div class="feed" id="feed"></div>
        <div class="controls" id="controls"></div>
      </aside>
    </main>
  </div>
  <script>
(function() {
  var E2E_GAME_SLUG = "sketchcode";
  var E2E = window.__playgentE2EState || {
    version: 1,
    regions: [],
    lastPhase: "loading",
    lastStatus: "loading",
    lastPlayerId: "",
    lastCurrentPlayer: "",
    lastLegalActionCount: 0,
    lastVisibleLegalActionCount: 0,
    lastActions: [],
    lastRawActions: []
  };
  window.__playgentE2EState = E2E;

  function setE2EAttr(el, name, value) {
    if (!el) return;
    el.setAttribute(name, value == null ? "" : String(value));
  }

  function unwrapE2EAction(option) {
    if (option && typeof option === "object" && option.decision !== undefined) return option.decision;
    if (option && typeof option === "object" && option.action !== undefined) return option.action;
    return option;
  }

  function isVisibleE2EAction(action) {
    action = unwrapE2EAction(action);
    if (!action || typeof action !== "object") return false;
    if (action.type === "advance_phase" || action.type === "system" || action.type === "noop") return false;
    return true;
  }

  function getVisibleE2EActions(actions) {
    var out = [];
    for (var i = 0; actions && i < actions.length; i++) {
      if (isVisibleE2EAction(actions[i])) out.push(unwrapE2EAction(actions[i]));
    }
    return out;
  }

  function ensureE2ETelemetry() {
    var el = document.getElementById("e2e-telemetry");
    if (!el) {
      el = document.createElement("div");
      el.id = "e2e-telemetry";
      if (document.body) document.body.appendChild(el);
    }
    el.setAttribute("aria-hidden", "true");
    el.style.cssText = "position:fixed;width:1px;height:1px;overflow:hidden;opacity:0;pointer-events:none;left:0;top:0;";
    setE2EAttr(el, "data-game", E2E_GAME_SLUG);
    setE2EAttr(el, "data-phase", E2E.lastPhase);
    setE2EAttr(el, "data-status", E2E.lastStatus);
    setE2EAttr(el, "data-player", E2E.lastPlayerId || "spectator");
    return el;
  }

  function addUnique(list, el) {
    if (!el) return;
    for (var i = 0; i < list.length; i++) if (list[i] === el) return;
    list.push(el);
  }

  function getE2ERoots() {
    var roots = [];
    addUnique(roots, ensureE2ETelemetry());
    addUnique(roots, document.getElementById("telemetry"));
    addUnique(roots, document.getElementById("game"));
    addUnique(roots, document.getElementById("game-container"));
    addUnique(roots, document.querySelector("[data-board]"));
    return roots;
  }

  function getCurrentPlayerE2E(view) {
    if (!view) return "";
    return view.currentPlayer || view.currentPlayerId || view.currentActor || view.turn || "";
  }

  function updateE2EPlayers(players) {
    var telemetry = ensureE2ETelemetry();
    var host = document.getElementById("e2e-players");
    if (!host) {
      host = document.createElement("div");
      host.id = "e2e-players";
      telemetry.appendChild(host);
    }
    host.textContent = "";
    for (var i = 0; players && i < players.length; i++) {
      var p = players[i] || {};
      var span = document.createElement("span");
      setE2EAttr(span, "data-player", p.id || "");
      setE2EAttr(span, "data-player-name", p.name || p.id || "");
      span.textContent = p.name || p.id || "";
      host.appendChild(span);
    }
  }

  function updateE2ELandmarks(view, legalActions, context) {
    var visibleActions = getVisibleE2EActions(legalActions || []);
    var phase = context && context.gameOver ? "game-over" : (view && (view.phase || view.mode || view.stage) ? (view.phase || view.mode || view.stage) : "playing");
    var status = context && context.gameOver ? "game-over" : (visibleActions.length > 0 ? "your-turn" : "waiting");
    var playerId = context && context.myId ? context.myId : "spectator";
    var currentPlayer = getCurrentPlayerE2E(view);
    var roots = getE2ERoots();
    E2E.lastPhase = phase;
    E2E.lastStatus = status;
    E2E.lastPlayerId = playerId;
    E2E.lastCurrentPlayer = currentPlayer;
    E2E.lastRawActions = legalActions || [];
    E2E.lastActions = visibleActions;
    E2E.lastLegalActionCount = (legalActions || []).length;
    E2E.lastVisibleLegalActionCount = visibleActions.length;
    for (var i = 0; i < roots.length; i++) {
      setE2EAttr(roots[i], "data-game", E2E_GAME_SLUG);
      setE2EAttr(roots[i], "data-phase", phase);
      setE2EAttr(roots[i], "data-status", status);
      setE2EAttr(roots[i], "data-player", playerId);
      setE2EAttr(roots[i], "data-current-player", currentPlayer);
      if (view && view.round != null) setE2EAttr(roots[i], "data-round", view.round);
      if (view && view.turnNumber != null) setE2EAttr(roots[i], "data-turn", view.turnNumber);
    }
    updateE2EPlayers(context && context.players ? context.players : []);
  }

  function actionTypeForIndex(idx) {
    var raw = E2E.lastRawActions && E2E.lastRawActions[idx] ? unwrapE2EAction(E2E.lastRawActions[idx]) : null;
    return raw && raw.type ? raw.type : "choose";
  }

  function safeLabelFromNode(node) {
    var label = node.getAttribute("data-action-label") || node.getAttribute("aria-label") || node.title || node.textContent || node.value || "";
    return String(label).replace(/\s+/g, " ").trim().slice(0, 100);
  }

  function decorateE2EDOMControls() {
    var nodes = document.querySelectorAll("[data-action-idx], [data-action], button, [role='button'], input[type='button'], input[type='submit'], input:not([type='hidden']), select, textarea, [data-cell], [data-card], [data-card-id], [data-option-id], [data-brainrot], canvas");
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      if (node.hasAttribute("data-action") && !node.hasAttribute("data-action-idx")) {
        node.setAttribute("data-action-idx", node.getAttribute("data-action"));
      }
      if (node.hasAttribute("data-action-idx")) {
        var idx = parseInt(node.getAttribute("data-action-idx"), 10);
        if (!isNaN(idx) && !node.hasAttribute("data-action-type")) node.setAttribute("data-action-type", actionTypeForIndex(idx));
        if (!node.hasAttribute("data-action-label")) node.setAttribute("data-action-label", safeLabelFromNode(node));
      }
      if (node.hasAttribute("data-cell") && !node.getAttribute("aria-label")) {
        node.setAttribute("aria-label", "cell " + node.getAttribute("data-cell"));
      }
      if ((node.hasAttribute("data-card") || node.hasAttribute("data-card-id")) && !node.getAttribute("aria-label")) {
        node.setAttribute("aria-label", "card " + (node.getAttribute("data-card") || node.getAttribute("data-card-id")));
      }
      if (node.tagName === "CANVAS" && !node.getAttribute("aria-label")) {
        node.setAttribute("aria-label", E2E_GAME_SLUG + " canvas");
      }
    }
  }

  function e2eBeginFrame(view, legalActions, context) {
    E2E.regions = [];
    updateE2ELandmarks(view || {}, legalActions || [], context || {});
  }

  function e2eAfterRender() {
    decorateE2EDOMControls();
  }

  function isVisibleE2ENode(node) {
    if (!node || !node.getBoundingClientRect) return false;
    var rect = node.getBoundingClientRect();
    if (rect.width <= 0 || rect.height <= 0) return false;
    if (rect.right <= 0 || rect.bottom <= 0 || rect.left >= window.innerWidth || rect.top >= window.innerHeight) return false;
    var style = window.getComputedStyle ? window.getComputedStyle(node) : null;
    if (style && (style.display === "none" || style.visibility === "hidden" || style.opacity === "0")) return false;
    if (node.disabled || node.getAttribute("aria-disabled") === "true") return false;
    return true;
  }

  function regionKindForNode(node) {
    if (node.tagName === "CANVAS") return "canvas";
    if (node.tagName === "INPUT" || node.tagName === "SELECT" || node.tagName === "TEXTAREA") return "input";
    if (node.hasAttribute("data-cell")) return "cell";
    if (node.hasAttribute("data-card") || node.hasAttribute("data-card-id")) return "card";
    return "button";
  }

  function getDOMActionRegions() {
    decorateE2EDOMControls();
    var nodes = document.querySelectorAll("[data-action-idx], button, [role='button'], input[type='button'], input[type='submit'], input:not([type='hidden']), select, textarea, [data-cell], [data-card], [data-card-id], [data-option-id], [data-brainrot], canvas");
    var out = [];
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      if (!isVisibleE2ENode(node)) continue;
      var r = clipE2ERect(node.getBoundingClientRect());
      if (!r) continue;
      var id = node.id || node.getAttribute("data-action-idx") || node.getAttribute("data-cell") || node.getAttribute("data-card") || node.getAttribute("data-card-id") || node.getAttribute("data-option-id") || node.getAttribute("data-brainrot") || ("control-" + i);
      out.push({
        id: String(id),
        kind: regionKindForNode(node),
        label: safeLabelFromNode(node),
        actionType: node.getAttribute("data-action-type") || "",
        selector: node.id ? ("#" + node.id) : "",
        rect: { x: r.left, y: r.top, width: r.width, height: r.height },
        center: { x: r.left + r.width / 2, y: r.top + r.height / 2 }
      });
    }
    return out;
  }

  function clipE2ERect(rect) {
    if (!rect) return null;
    var x = Number(rect.x != null ? rect.x : rect.left) || 0;
    var y = Number(rect.y != null ? rect.y : rect.top) || 0;
    var width = Number(rect.width) || 0;
    var height = Number(rect.height) || 0;
    var left = Math.max(0, x);
    var top = Math.max(0, y);
    var right = Math.min(window.innerWidth, x + width);
    var bottom = Math.min(window.innerHeight, y + height);
    if (right - left <= 0 || bottom - top <= 0) return null;
    return { x: left, y: top, width: right - left, height: bottom - top };
  }

  function e2eRegisterRegion(region) {
    if (!region || !region.id || !region.rect) return;
    var r = clipE2ERect(region.rect);
    if (!r || r.width == null || r.height == null) return;
    var item = {
      id: String(region.id),
      kind: region.kind || "button",
      label: region.label || "",
      actionType: region.actionType || "",
      rect: { x: Number(r.x) || 0, y: Number(r.y) || 0, width: Number(r.width) || 0, height: Number(r.height) || 0 },
      center: region.center || { x: (Number(r.x) || 0) + (Number(r.width) || 0) / 2, y: (Number(r.y) || 0) + (Number(r.height) || 0) / 2 }
    };
    for (var i = 0; i < E2E.regions.length; i++) {
      if (E2E.regions[i].id === item.id) {
        E2E.regions[i] = item;
        return;
      }
    }
    E2E.regions.push(item);
  }

        for (i = 1; i < points.length; i++) ctx.lineTo(sx(points[i][0]), sy(points[i][1]));
        ctx.stroke();
        ctx.restore();
      }
      function renderSvgLayers(events) {
        var parts = [];
        var i, ev;
        for (i = 0; i < events.length; i++) {
          ev = events[i];
          if (ev && ev.type === "svg_layer" && ev.svg) parts.push("<g data-layer=\"" + (i + 1) + "\">" + ev.svg + "</g>");
        }
        svgLayerCanvas.innerHTML = parts.join("");
      }
      function renderCanvas() {
        var rect = board.getBoundingClientRect();
        var size = Math.max(300, Math.floor(Math.min(rect.width, rect.height) * (window.devicePixelRatio || 1)));
        var events = view.drawEvents || [];
        var i;
        if (board.width !== size || board.height !== size) {
          board.width = size;
          board.height = size;
        }
        drawGrid();
        renderSvgLayers(events);
        for (i = 0; i < events.length; i++) {
          if (events[i].type === "stroke") drawStroke(events[i]);
          else if (events[i].type === "line") drawLine(events[i]);
          else if (events[i].type === "curve") drawCurve(events[i]);
          else if (events[i].type === "shape") drawShape(events[i]);
          else if (events[i].type === "polygon") drawPolygon(events[i]);
          else if (events[i].type === "dot") drawDot(events[i]);
        }
        drawDraftShape();
      }
      function renderPlayers() {
        var box = $("players");
        var players = (view.players || []).slice();
        var avatarColors = ["#f472b6", "#fb923c", "#38bdf8", "#a855f7", "#22c55e", "#facc15"];
        var i, player, row, rank, info, name, score, flag, avatar;
        clear(box);
        players.sort(function(a, b) { return ((view.scores && view.scores[b]) || 0) - ((view.scores && view.scores[a]) || 0); });
        for (i = 0; i < players.length; i++) {
          player = players[i];
          row = document.createElement("div");
          row.className = "player";
          rank = document.createElement("div");
          rank.className = "rank";
          rank.textContent = "#" + (i + 1);
          info = document.createElement("div");
          name = document.createElement("div");
          name.className = "pname";
          name.textContent = displayName(player) + (player === myName ? " (You)" : "");
          score = document.createElement("div");
          score.className = "pscore";
          score.textContent = ((view.scores && view.scores[player]) || 0) + " points";
          flag = document.createElement("div");
          flag.className = player === view.drawerName ? "drawerMark" : "solvedMark";
          flag.textContent = player === view.drawerName ? "drawing" : (view.solved && view.solved[player] ? "guessed it" : "");
          info.appendChild(name); info.appendChild(score); info.appendChild(flag);
          avatar = document.createElement("div");
          avatar.className = "avatar";
          avatar.style.background = avatarColors[i % avatarColors.length];
          avatar.textContent = String(i + 1);
          row.appendChild(rank); row.appendChild(info); row.appendChild(avatar);
          box.appendChild(row);
        }
      }
      function renderStatus() {
        var word = view.promptBlanks || "_ _ _ _";
        if (view.myRole === "drawer" && view.secretPrompt) word = view.secretPrompt.toUpperCase();
        else if (view.promptVisible && view.prompt) word = view.prompt.toUpperCase();
        $("roundText").textContent = "Round " + (view.round || 1) + " of " + (view.maxRounds || 1);
        $("phasePill").textContent = view.phase === "draw" ? "Live draw" : (view.phase || "waiting");
        $("wordText").textContent = word;
        $("drawerText").textContent = displayName(view.drawerName);
        $("markText").textContent = String(view.layerCount || view.markCount || 0);
        if (view.myRole === "drawer" && view.phase === "draw") $("resourceText").textContent = (view.layerCount || view.markCount || 0) + " layers";
        else if (view.myRole === "guesser" && view.phase === "draw") $("resourceText").textContent = view.guessesRemaining + " guesses";
        else $("resourceText").textContent = "-";
      }
      function renderFeed() {
        var box = $("feed");
        var title = $("rightTitle");
        var messages = [];
        var guessLog = view.guessLog || [];
        var geometry = view.geometryLog || [];
        var i, g, div;
        clear(box);
        if (view.myRole === "drawer" && view.secretPrompt) title.textContent = "Draw: " + view.secretPrompt;
        else if (view.promptVisible && view.prompt) title.textContent = "Answer: " + view.prompt;
        else title.textContent = "Guess " + (view.promptBlanks || "");
        if (view.lastEvent) messages.push({ text: view.lastEvent, cls: "system" });
        for (i = Math.max(0, geometry.length - 8); i < geometry.length; i++) messages.push({ text: geometry[i], cls: "layer" });
        for (i = Math.max(0, guessLog.length - 10); i < guessLog.length; i++) {
          g = guessLog[i];
          if (g.guessedIt && !g.text) messages.push({ text: (g.isYou ? "You" : displayName(g.player)) + " guessed it!", cls: "guess good" + (g.isYou ? " you" : "") });
          else if (g.text) messages.push({ text: (g.isYou ? "You" : displayName(g.player)) + ": " + g.text + (g.correct ? " (right)" : ""), cls: "guess" + (g.correct ? " good" : "") + (g.isYou ? " you" : "") });
          else messages.push({ text: (g.isYou ? "You" : displayName(g.player)) + " guessed.", cls: "guess" + (g.isYou ? " you" : "") });
        }
        if (messages.length === 0) messages.push({ text: "Waiting for the first mark.", cls: "system" });
        for (i = 0; i < messages.length; i++) {
          div = document.createElement("div");
          div.className = "msg" + (messages[i].cls ? " " + messages[i].cls : "");
          div.textContent = messages[i].text;
          box.appendChild(div);
        }
        box.scrollTop = box.scrollHeight;
      }
      function makeButton(text, fn, cls) {
        var b = document.createElement("button");
        b.textContent = text;
        if (cls) b.className = cls;
        b.onclick = fn;
        return b;
      }
      function makeShapeSelect() {
        var select = document.createElement("select");
        var shapes = [["oval", "Oval"], ["circle", "Circle"], ["rect", "Box"], ["triangle", "Triangle"]];
        var i, option;
        for (i = 0; i < shapes.length; i++) {
          option = document.createElement("option");
          option.value = shapes[i][0];
          option.textContent = shapes[i][1];
          select.appendChild(option);
        }
        select.value = currentShape;
        select.onchange = function() {
          if (playgent.sound) playgent.sound("ui.select");
          currentShape = select.value;
          if (!shapeDraft) startShapeDraft();
          syncShapeDraft();
          renderControls();
        };
        return select;
      }
      function makeFillSelect() {
        var select = document.createElement("select");
        var options = ["none"].concat(colors);
        var i, option;
        for (i = 0; i < options.length; i++) {
          option = document.createElement("option");
          option.value = options[i];
          option.textContent = options[i] === "none" ? "No fill" : options[i];
          select.appendChild(option);
        }
        select.value = currentFill;
        select.onchange = function() {
          if (playgent.sound) playgent.sound("ui.select");
          currentFill = select.value;
          if (currentTool === "shape" && shapeDraft) syncShapeDraft();
          renderControls();
        };
        return select;
      }
      function makeRange(label, field, max) {
        var row = document.createElement("div");
        var name = document.createElement("span");
        var input = document.createElement("input");
        var value = document.createElement("span");
        row.className = "rangeRow";
        name.textContent = label;
        input.type = "range";
        input.min = "0";
        input.max = String(max);
        input.step = "1";
        input.value = shapeDraft ? String(Math.round(shapeDraft[field])) : "0";
        value.textContent = input.value;
        input.oninput = function() {
          if (!shapeDraft) return;
          shapeDraft[field] = Number(input.value);
          normalizeDraft(shapeDraft);
          value.textContent = String(Math.round(shapeDraft[field]));
          renderCanvas();
        };
        row.appendChild(name);
        row.appendChild(input);
        row.appendChild(value);
        return row;
      }
      function renderShapeEditor(wrap) {
        var editor = document.createElement("div");
        var grid = document.createElement("div");
        var shapeField = document.createElement("label");
        var fillField = document.createElement("label");
        var actions = document.createElement("div");
        var hint = document.createElement("div");
        editor.className = "shapeEditor";
        grid.className = "fieldGrid";
        shapeField.className = "field";
        shapeField.textContent = "Shape";
        shapeField.appendChild(makeShapeSelect());
        fillField.className = "field";
        fillField.textContent = "Fill";
        fillField.appendChild(makeFillSelect());
        grid.appendChild(shapeField);
        grid.appendChild(fillField);
        editor.appendChild(grid);
        if (shapeDraft) {
          editor.appendChild(makeRange("X", "x", 96));
          editor.appendChild(makeRange("Y", "y", 96));
          editor.appendChild(makeRange("W", "w", 100));
          editor.appendChild(makeRange("H", "h", 100));
        }
        actions.className = "shapeActions";
        actions.appendChild(makeButton(shapeDraft ? "Place shape" : "New shape", function() {
          if (!shapeDraft && playgent.sound) playgent.sound("ui.select");
          if (!shapeDraft) startShapeDraft();
          else submitShapeDraft();
        }));
        actions.appendChild(makeButton("Cancel", function() {
          if (playgent.sound) playgent.sound("ui.cancel");
          shapeDraft = null;
          shapeDrag = null;
          currentTool = "brush";
          renderCanvas();
          renderControls();
        }, "secondary"));
        editor.appendChild(actions);
        hint.className = "hint";
        hint.textContent = shapeDraft ? "Drag the shape to move it, drag corner handles to resize, then place it." : "Create one editable shape, then move, resize, fill, and place it.";
        editor.appendChild(hint);
        wrap.appendChild(editor);
      }
      function toolButton(label, tool) {
        return makeButton(label, function() {
          if (playgent.sound) playgent.sound("ui.select");
          currentTool = tool;
          if (tool === "shape" && !shapeDraft) startShapeDraft();
          if (tool === "brush") {
            shapeDraft = null;
            shapeDrag = null;
            renderCanvas();
          }
          renderControls();
        }, currentTool === tool ? "toolActive" : "");
      }
      function renderToolRows(wrap) {
        var tools = document.createElement("div");
        var colorRow = document.createElement("div");
        var sizeRow = document.createElement("div");
        var i, b, color, width;
        tools.className = "toolRow";
        tools.appendChild(toolButton("Brush", "brush"));
        tools.appendChild(makeButton("Undo", function() {
          if (hasAction("undo_draw")) {
            if (playgent.sound) playgent.sound("ui.cancel");
            playgent.submitAction({ type: "undo_draw" });
          }
        }, "secondary"));
        wrap.appendChild(tools);

        colorRow.className = "colorRow";
        for (i = 0; i < colors.length; i++) {
          color = colors[i];
          b = makeButton(color, (function(c) {
            return function() {
              if (playgent.sound) playgent.sound("ui.select");
              currentColor = c;
              syncShapeDraft();
              renderControls();
            };
          })(color), "swatch" + (currentColor === color ? " toolActive" : ""));
          b.style.background = color;
          b.title = color;
          colorRow.appendChild(b);
        }
        wrap.appendChild(colorRow);

        sizeRow.className = "sizeRow";
        for (i = 0; i < widths.length; i++) {
          width = widths[i];
          sizeRow.appendChild(makeButton(String(width), (function(w) {
            return function() {
              if (playgent.sound) playgent.sound("ui.select");
              currentWidth = w;
              syncShapeDraft();
              renderControls();
            };
          })(width), currentWidth === width ? "toolActive" : ""));
        }
        wrap.appendChild(sizeRow);
      }
      function renderDrawerControls(box) {
        var wrap = document.createElement("div");
        var hint = document.createElement("div");
        wrap.className = "drawerTools";
        renderToolRows(wrap);
        hint.className = "hint";
        hint.textContent = "Draw on the canvas with the selected color and size.";
        wrap.appendChild(hint);
        box.appendChild(wrap);
      }
      function submitGuess() {
        var input = $("guessInput");
        var text = input ? input.value.trim() : "";
        if (!text) return;
        if (playgent.sound) playgent.sound("ui.confirm");
        playgent.submitAction({ type: "guess", text: text });
        input.value = "";
      }
      function renderGuessControls(box) {
        var row = document.createElement("div");
        var input = document.createElement("input");
        var btn = makeButton("Guess", submitGuess);
        var hint = document.createElement("div");
        row.className = "guessRow";
        input.id = "guessInput";
        input.placeholder = "Type your guess";
        input.autocomplete = "off";
        input.onkeydown = function(ev) { if (ev.key === "Enter") submitGuess(); };
        row.appendChild(input); row.appendChild(btn);
        box.appendChild(row);
        hint.className = "hint";
        hint.textContent = (view.guessesRemaining || 0) + " guesses left";
        box.appendChild(hint);
      }
      function renderControls() {
        var box = $("controls");
        var div;
        clear(box);
        if (view.phase === "draw" && view.myRole === "drawer" && hasDrawAction()) {
          renderDrawerControls(box);
          return;
        }
        if (view.phase === "draw" && view.myRole === "guesser" && hasAction("guess")) {
          renderGuessControls(box);
          return;
        }
        div = document.createElement("div");
        div.className = "hint";
        div.textContent = view.phase === "discussion" ? "Roast or compliment the sketch in chat." : "Waiting for the next turn.";
        box.appendChild(div);
      }
      function render() {
        setData();
        renderStatus();
        renderPlayers();
        renderCanvas();
        renderFeed();
        renderControls();
      }
      window.addEventListener("resize", function() { renderCanvas(); });
      playgent.onStateChange(function(nextView, nextActions, context) {
        view = nextView || {};
        legalActions = nextActions || [];
        myName = view.myName || (context && (context.name || context.playerName)) || "";
        var phase = view.phase || "";
        var round = view.round || 0;
        var myScore = view.scores && myName ? view.scores[myName] : null;
        if (lastSoundPhase && (phase !== lastSoundPhase || round !== lastSoundRound) && playgent.sound) {
          if (phase === "draw") playgent.sound("phase.change");
          else if (phase === "discussion") playgent.sound("info.reveal");
        }
        if (myScore != null && lastMyScore != null && myScore > lastMyScore && playgent.sound) {
          playgent.sound("score.tick");
        }
        if (phase === "gameOverDisplay" || phase === "gameOver") {
          var winners = winningNames();
          var gameOverSoundKey = "final:" + round + ":" + winners.join("|");
          if (gameOverSoundKey !== lastGameOverSoundKey && playgent.sound) {
            lastGameOverSoundKey = gameOverSoundKey;
            playgent.sound(winners.indexOf(myName) !== -1 ? "game.victory" : ((context && context.myId) ? "game.defeat" : "game.over"));
          }
        } else {
          lastGameOverSoundKey = "";
        }
        lastSoundPhase = phase;
        lastSoundRound = round;
        lastMyScore = myScore;
        clearLocalDrawingStateIfInactive();
        render();
      });
    })();
  </script>
</body>
</html>
