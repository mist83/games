<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  margin: 0;
  overflow: hidden;
  background: #07120f;
  color: #f8fafc;
  width: 100vw;
  height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
#game-root { position: fixed; inset: 0; overflow: hidden; }
#canvas-container { position: absolute; inset: 0; z-index: 1; }
#dom-overlay {
  position: absolute;
  inset: 0;
  z-index: 6;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
#top-hud {
  pointer-events: none;
  padding: max(10px, env(safe-area-inset-top)) 10px 0;
  display: grid;
}
#status-bar {
  margin: 0 auto;
  width: min(720px, calc(100vw - 20px));
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  align-items: center;
  padding: 8px 10px;
  border: 1px solid rgba(246, 196, 83, 0.2);
  border-radius: 8px;
  background: linear-gradient(180deg, rgba(10, 35, 30, 0.78), rgba(3, 10, 9, 0.74));
  backdrop-filter: blur(10px);
  box-shadow: 0 14px 40px rgba(0, 0, 0, 0.28);
}
.phase-copy { min-width: 0; }
#phase-title {
  font-size: clamp(13px, 3.4vw, 16px);
  font-weight: 900;
  letter-spacing: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#phase-sub {
  margin-top: 2px;
  font-size: 11px;
  color: #b8c7bd;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#dice-box {
  display: flex;
  gap: 5px;
  align-items: center;
  justify-content: flex-end;
  min-width: 54px;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-weight: 900;
}
.die {
  width: 26px;
  height: 26px;
  border-radius: 7px;
  display: grid;
  place-items: center;
  background: #f8fafc;
  color: #06110f;
  box-shadow: 0 5px 14px rgba(0, 0, 0, 0.28);
}
#bottom-ui {
  width: 100%;
  padding: 0 10px max(12px, env(safe-area-inset-bottom));
  display: grid;
  gap: 8px;
}
#info-panel {
  pointer-events: none;
  width: min(720px, calc(100vw - 20px));
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr;
  gap: 6px;
  padding: 8px 10px;
  border-radius: 8px;
  border: 1px solid rgba(248, 250, 252, 0.14);
  background: rgba(3, 10, 9, 0.72);
  backdrop-filter: blur(8px);
}
@media (min-width: 700px) {
  #info-panel {
    position: absolute;
    left: var(--board-info-left, 50%);
    top: var(--board-info-top, 20%);
    width: var(--board-info-width, min(460px, 50vw));
    margin: 0;
    transform: none;
    z-index: 5;
  }
}
#tile-line {
  min-height: 17px;
  color: #f8fafc;
  font-size: 13px;
  font-weight: 800;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#log-line {
  min-height: 15px;
  color: #b8c7bd;
  font-size: 11px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#action-tray {
  pointer-events: auto;
  width: min(720px, calc(100vw - 20px));
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(128px, 1fr));
  gap: 8px;
  max-height: 34vh;
  overflow-y: auto;
}
.action-btn {
  min-height: 50px;
  border: 1px solid rgba(255, 255, 255, 0.22);
  border-radius: 8px;
  padding: 10px 12px;
  font: inherit;
  font-size: 14px;
  font-weight: 900;
  color: #06110f;
  background: linear-gradient(180deg, #fff4b8, #f6c453);
  box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
  cursor: pointer;
}
.action-btn.secondary { color: #f8fafc; background: rgba(22, 36, 33, 0.92); }
.action-btn.money { background: linear-gradient(180deg, #bef7d5, #37d987); }
.action-btn.warn { background: linear-gradient(180deg, #ffd0c0, #ff7a59); }
.action-btn.danger { background: linear-gradient(180deg, #ffd1c5, #ff6f61); }
.action-btn:active { transform: scale(0.985); }
.empty-actions {
  min-height: 38px;
  display: grid;
  place-items: center;
  border-radius: 8px;
  color: #b8c7bd;
  background: rgba(3, 10, 9, 0.55);
  font-size: 13px;
  font-weight: 700;
}
#player-container { display: none; }
#center-board-panel {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: min(50vw, 390px);
  max-height: min(54vh, 430px);
  display: grid;
  gap: 6px;
  pointer-events: auto;
  z-index: 3;
  overflow: hidden;
}
.center-roster {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
  gap: 5px;
}
.mini-player {
  appearance: none;
  border-radius: 7px;
  padding: 6px 7px;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(235, 241, 232, 0.93));
  color: #121212;
  border: 2px solid #121212;
  min-width: 0;
  text-align: left;
  font: inherit;
  cursor: pointer;
}
.mini-player.active { outline: 3px solid #d83b2d; }
.mini-player.selected { box-shadow: 0 0 0 4px rgba(246, 196, 83, 0.9), 0 10px 24px rgba(0,0,0,0.25); }
.mini-player.out { opacity: 0.48; }
.mini-name { font-size: 10px; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mini-line { margin-top: 2px; font: 10px ui-monospace, SFMono-Regular, Menlo, monospace; color: #333; }
.player-detail {
  min-width: 0;
  max-height: 260px;
  overflow-y: auto;
  border: 2px solid #121212;
  border-radius: 8px;
  background: linear-gradient(180deg, #fffdf0, #e9f4df);
  color: #121212;
  padding: 9px;
  box-shadow: 0 18px 50px rgba(0,0,0,0.32);
}
.detail-top {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 8px;
  align-items: start;
}
.detail-name { font-size: 15px; font-weight: 950; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.detail-close {
  width: 28px;
  height: 28px;
  border: 2px solid #121212;
  border-radius: 6px;
  background: #121212;
  color: #fffdf0;
  font: inherit;
  font-weight: 950;
  cursor: pointer;
}
.detail-stats {
  margin-top: 7px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 5px;
}
.detail-stat {
  min-width: 0;
  border: 1px solid rgba(18,18,18,0.18);
  border-radius: 6px;
  padding: 5px;
  background: rgba(255,255,255,0.66);
}
.detail-stat span { display: block; font-size: 9px; font-weight: 900; color: #48524c; text-transform: uppercase; }
.detail-stat strong { display: block; margin-top: 2px; font: 12px ui-monospace, SFMono-Regular, Menlo, monospace; }
.detail-deeds { margin-top: 8px; display: grid; gap: 4px; }
.detail-deed {
  display: grid;
  grid-template-columns: 10px minmax(0, 1fr) auto;
  gap: 6px;
  align-items: center;
  border-radius: 5px;
  padding: 4px 5px;
  background: rgba(255,255,255,0.58);
  font-size: 10px;
  font-weight: 850;
}
.detail-deed.mortgaged { opacity: 0.62; }
.detail-deed .deed-swatch { width: 10px; height: 20px; }
.detail-deed-name { min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.detail-empty { margin-top: 8px; color: #48524c; font-size: 11px; font-weight: 850; }
.trade-notice {
  border-radius: 8px;
  border: 2px solid #121212;
  background: #fff7d6;
  color: #121212;
  padding: 8px;
  box-shadow: 0 10px 26px rgba(0,0,0,0.25);
}
.trade-title { font-size: 12px; font-weight: 900; color: #d83b2d; }
.trade-body { margin-top: 3px; font-size: 11px; line-height: 1.35; }
#modal-layer {
  position: absolute;
  inset: 0;
  z-index: 10;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 14px;
  background: rgba(0,0,0,0.35);
  pointer-events: auto;
}
#modal-layer.open { display: flex; }
.deed-card {
  width: min(360px, 92vw);
  border: 3px solid #111;
  background: linear-gradient(180deg, #fffaf0, #f5ebcf);
  color: #111;
  border-radius: 7px;
  padding: 10px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.48);
}
.deed-band {
  min-height: 62px;
  display: grid;
  place-items: center;
  border: 2px solid #111;
  color: #111;
  text-align: center;
  padding: 8px;
}
.deed-title { font-size: 18px; font-weight: 900; text-transform: uppercase; }
.deed-section { padding: 10px 6px 4px; font-size: 14px; }
.deed-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(0,0,0,0.12); }
.deed-foot { margin-top: 8px; display: flex; justify-content: space-between; gap: 8px; font-size: 12px; font-weight: 800; }
.debt-copy {
  margin-top: 10px;
  font-size: 13px;
  line-height: 1.35;
  font-weight: 800;
}
.debt-plan {
  margin-top: 10px;
  display: grid;
  gap: 5px;
}
.debt-step {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 8px;
  align-items: center;
  padding: 6px;
  border-radius: 5px;
  background: rgba(255,255,255,0.64);
  border: 1px solid rgba(17,17,17,0.18);
  font-size: 12px;
  font-weight: 850;
}
.debt-step span { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.modal-action.danger { background: linear-gradient(180deg, #ffd1c5, #ff7d6e); }
.modal-close {
  margin-top: 10px;
  width: 100%;
  min-height: 42px;
  border: 2px solid #111;
  border-radius: 4px;
  background: #111;
  color: #fff8df;
  font: inherit;
  font-weight: 900;
}
.modal-actions { margin-top: 10px; display: grid; gap: 6px; }
.modal-action {
  width: 100%;
  min-height: 42px;
  border: 2px solid #111;
  border-radius: 5px;
  background: linear-gradient(180deg, #bef7d5, #37d987);
  color: #06110f;
  font: inherit;
  font-weight: 950;
  cursor: pointer;
}
.mortgage-chip {
  display: inline-grid;
  place-items: center;
  padding: 2px 6px;
  border-radius: 999px;
  background: #121212;
  color: #fff8df;
  font-size: 10px;
  font-weight: 950;
}
#trade-panel {
  position: relative;
  z-index: 7;
  display: none;
  pointer-events: auto;
  width: min(720px, calc(100vw - 20px));
  margin: 0 auto;
  padding: 8px;
  border-radius: 8px;
  background: rgba(255, 248, 223, 0.96);
  color: #111;
  border: 2px solid #111;
  gap: 8px;
}
#trade-panel.open { display: grid; }
.trade-head {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(118px, 0.36fr) minmax(118px, 0.36fr);
  gap: 6px;
}
.trade-money-row {
  grid-template-columns: minmax(110px, 1fr) repeat(2, minmax(78px, 96px));
  align-items: end;
}
.trade-card-row {
  grid-template-columns: minmax(118px, 148px) minmax(0, 1fr);
  align-items: end;
}
.trade-head label, .trade-side-label { display: grid; gap: 3px; font-size: 10px; font-weight: 900; text-transform: uppercase; }
.trade-head input, .trade-head select {
  min-height: 34px;
  border: 1px solid #111;
  border-radius: 4px;
  padding: 6px;
  font: 12px ui-monospace, SFMono-Regular, Menlo, monospace;
}
.trade-columns { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
.trade-side {
  min-width: 0;
  display: grid;
  gap: 5px;
}
.deed-list {
  display: grid;
  gap: 5px;
  max-height: 124px;
  overflow-y: auto;
}
.deed-option {
  min-height: 34px;
  display: grid;
  grid-template-columns: 18px 12px minmax(0, 1fr) auto;
  align-items: center;
  gap: 6px;
  padding: 5px 6px;
  border: 1px solid rgba(17, 17, 17, 0.28);
  border-radius: 5px;
  background: rgba(255,255,255,0.58);
  font-size: 11px;
  font-weight: 800;
}
.deed-option input { width: 16px; height: 16px; }
.deed-option.disabled { opacity: 0.45; }
.deed-swatch {
  width: 10px;
  height: 22px;
  border: 1px solid rgba(17,17,17,0.45);
  border-radius: 3px;
}
.deed-name { min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.deed-meta { font: 10px ui-monospace, SFMono-Regular, Menlo, monospace; color: #333; }
.empty-deeds {
  min-height: 34px;
  display: grid;
  place-items: center;
  border: 1px dashed rgba(17, 17, 17, 0.28);
  border-radius: 5px;
  color: #555;
  font-size: 11px;
  font-weight: 800;
}
.trade-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.auction-bid-panel {
  pointer-events: auto;
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 6px;
  padding: 8px;
  border-radius: 8px;
  border: 2px solid #121212;
  background: rgba(255, 248, 223, 0.96);
  color: #121212;
}
.auction-bid-panel label {
  min-width: 0;
  display: grid;
  gap: 3px;
  font-size: 10px;
  font-weight: 950;
  text-transform: uppercase;
}
.auction-bid-panel input {
  min-height: 38px;
  border: 1px solid #121212;
  border-radius: 5px;
  padding: 7px;
  font: 13px ui-monospace, SFMono-Regular, Menlo, monospace;
}
.auction-bid-panel button { min-height: 38px; align-self: end; }
@media (max-width: 560px) {
  #center-board-panel { width: 56vw; max-height: 34vh; overflow: hidden; }
  .center-roster { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .mini-player { padding: 4px 5px; }
  .mini-line { display: none; }
  .player-detail { max-height: 150px; padding: 6px; }
  .detail-stats { grid-template-columns: 1fr; }
  .trade-head, .trade-columns { grid-template-columns: 1fr; }
  .trade-money-row { grid-template-columns: minmax(86px, 1fr) repeat(2, minmax(72px, 84px)); }
  .trade-card-row { grid-template-columns: minmax(112px, 138px) minmax(0, 1fr); }
  .auction-bid-panel { grid-template-columns: 1fr; }
  .deed-list { max-height: 86px; }
}
</style>

<div id="game-root">
  <div id="canvas-container" data-board></div>
  <div id="dom-overlay">
    <div id="top-hud">
      <div id="status-bar" data-turn-phase>
        <div class="phase-copy">
          <div id="phase-title">Loading Rentopoly</div>
          <div id="phase-sub">Preparing the board</div>
        </div>
        <div id="dice-box"><span class="die">-</span><span class="die">-</span></div>
      </div>
    </div>
    <div id="bottom-ui">
      <div id="info-panel">
        <div id="tile-line" data-market></div>
        <div id="log-line" data-resources></div>
      </div>
      <div id="trade-panel"></div>
      <div id="action-tray"></div>
    </div>
  </div>
  <div id="center-board-panel"></div>
  <div id="modal-layer"></div>
  <div id="player-container"></div>
  <div id="board-landmarks" style="display:none" data-current-player="" data-move-history=""></div>
</div>

<script>
(function() {
  var E2E_GAME_SLUG = "rentopoly";
  var E2E = window.__playgentE2EState || {
    version: 1,
    regions: [],
    lastPhase: "loading",
    lastStatus: "loading",
    lastPlayerId: "",
    lastCurrentPlayer: "",
    lastLegalActionCount: 0,
    lastVisibleLegalActionCount: 0,
    lastActions: [],
    lastRawActions: []
  };
  window.__playgentE2EState = E2E;

  function setE2EAttr(el, name, value) {
    if (!el) return;
    el.setAttribute(name, value == null ? "" : String(value));
  }

  function unwrapE2EAction(option) {
    if (option && typeof option === "object" && option.decision !== undefined) return option.decision;
    if (option && typeof option === "object" && option.action !== undefined) return option.action;
    return option;
  }

  function isVisibleE2EAction(action) {
    action = unwrapE2EAction(action);
    if (!action || typeof action !== "object") return false;
    if (action.type === "advance_phase" || action.type === "system" || action.type === "noop") return false;
    return true;
  }

  function getVisibleE2EActions(actions) {
    var out = [];
    for (var i = 0; actions && i < actions.length; i++) {
      if (isVisibleE2EAction(actions[i])) out.push(unwrapE2EAction(actions[i]));
    }
    return out;
  }

  function ensureE2ETelemetry() {
    var el = document.getElementById("e2e-telemetry");
    if (!el) {
      el = document.createElement("div");
      el.id = "e2e-telemetry";
      if (document.body) document.body.appendChild(el);
    }
    el.setAttribute("aria-hidden", "true");
    el.style.cssText = "position:fixed;width:1px;height:1px;overflow:hidden;opacity:0;pointer-events:none;left:0;top:0;";
    setE2EAttr(el, "data-game", E2E_GAME_SLUG);
    setE2EAttr(el, "data-phase", E2E.lastPhase);
    setE2EAttr(el, "data-status", E2E.lastStatus);
    setE2EAttr(el, "data-player", E2E.lastPlayerId || "spectator");
    return el;
  }

  function addUnique(list, el) {
    if (!el) return;
    for (var i = 0; i < list.length; i++) if (list[i] === el) return;
    list.push(el);
  }

  function getE2ERoots() {
    var roots = [];
    addUnique(roots, ensureE2ETelemetry());
    addUnique(roots, document.getElementById("telemetry"));
    addUnique(roots, document.getElementById("game"));
    addUnique(roots, document.getElementById("game-container"));
    addUnique(roots, document.querySelector("[data-board]"));
    return roots;
  }

  function getCurrentPlayerE2E(view) {
    if (!view) return "";
    return view.currentPlayer || view.currentPlayerId || view.currentActor || view.turn || "";
  }

  function updateE2EPlayers(players) {
    var telemetry = ensureE2ETelemetry();
    var host = document.getElementById("e2e-players");
    if (!host) {
      host = document.createElement("div");
      host.id = "e2e-players";
      telemetry.appendChild(host);
    }
    host.textContent = "";
    for (var i = 0; players && i < players.length; i++) {
      var p = players[i] || {};
      var span = document.createElement("span");
      setE2EAttr(span, "data-player", p.id || "");
      setE2EAttr(span, "data-player-name", p.name || p.id || "");
      span.textContent = p.name || p.id || "";
      host.appendChild(span);
    }
  }

  function updateE2ELandmarks(view, legalActions, context) {
    var visibleActions = getVisibleE2EActions(legalActions || []);
    var phase = context && context.gameOver ? "game-over" : (view && (view.phase || view.mode || view.stage) ? (view.phase || view.mode || view.stage) : "playing");
    var status = context && context.gameOver ? "game-over" : (visibleActions.length > 0 ? "your-turn" : "waiting");
    var playerId = context && context.myId ? context.myId : "spectator";
    var currentPlayer = getCurrentPlayerE2E(view);
    var roots = getE2ERoots();
    E2E.lastPhase = phase;
    E2E.lastStatus = status;
    E2E.lastPlayerId = playerId;
    E2E.lastCurrentPlayer = currentPlayer;
    E2E.lastRawActions = legalActions || [];
    E2E.lastActions = visibleActions;
    E2E.lastLegalActionCount = (legalActions || []).length;
    E2E.lastVisibleLegalActionCount = visibleActions.length;
    for (var i = 0; i < roots.length; i++) {
      setE2EAttr(roots[i], "data-game", E2E_GAME_SLUG);
      setE2EAttr(roots[i], "data-phase", phase);
      setE2EAttr(roots[i], "data-status", status);
      setE2EAttr(roots[i], "data-player", playerId);
      setE2EAttr(roots[i], "data-current-player", currentPlayer);
      if (view && view.round != null) setE2EAttr(roots[i], "data-round", view.round);
      if (view && view.turnNumber != null) setE2EAttr(roots[i], "data-turn", view.turnNumber);
    }
    updateE2EPlayers(context && context.players ? context.players : []);
  }

  function actionTypeForIndex(idx) {
    var raw = E2E.lastRawActions && E2E.lastRawActions[idx] ? unwrapE2EAction(E2E.lastRawActions[idx]) : null;
    return raw && raw.type ? raw.type : "choose";
  }

  function safeLabelFromNode(node) {
    var label = node.getAttribute("data-action-label") || node.getAttribute("aria-label") || node.title || node.textContent || node.value || "";
    return String(label).replace(/\s+/g, " ").trim().slice(0, 100);
  }

  function decorateE2EDOMControls() {
    var nodes = document.querySelectorAll("[data-action-idx], [data-action], button, [role='button'], input[type='button'], input[type='submit'], input:not([type='hidden']), select, textarea, [data-cell], [data-card], [data-card-id], [data-option-id], [data-brainrot], canvas");
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      if (node.hasAttribute("data-action") && !node.hasAttribute("data-action-idx")) {
        node.setAttribute("data-action-idx", node.getAttribute("data-action"));
      }
      if (node.hasAttribute("data-action-idx")) {

  playerIndex: function(id) {

    return 0;

  drawTokens: function(view, context) {
    var layer = Renderer.layers.tokens;
    var live = {};
    for (var i = 0; i < view.players.length; i++) {
      var p = view.players[i];
      live[p.id] = true;
      var node = Renderer.tokenNodes[p.id];
      if (!node) {
        node = Renderer.makeToken(p.id, i, context);
        Renderer.tokenNodes[p.id] = node;
        layer.addChild(node);
      }
      node.visible = !p.eliminated;
      var base = Renderer.tilePos(p.position);
      var dx = (i % 2 ? 1 : -1) * Renderer.layout.step * 0.16;
      var dy = (i > 1 ? 1 : -1) * Renderer.layout.step * 0.16;
      if (!node._placed) {
        node.x = base.x + dx;
        node.y = base.y + dy;
        node._placed = true;
      } else {
        Tween.to(node, { x: base.x + dx, y: base.y + dy }, 520, "backOut");
      }
      var active = p.id === view.currentActor;
      Tween.to(node.scale, { x: active ? 1.18 : 1, y: active ? 1.18 : 1 }, 260, "easeOut");
    }
    Object.keys(Renderer.tokenNodes).forEach(function(id) {
      if (!live[id]) Renderer.tokenNodes[id].visible = false;
    });
  },

  makeToken: function(id, index, context) {
    var c = new PIXI.Container();
    var r = Math.max(9, Renderer.layout.step * 0.17);
    var shadow = new PIXI.Graphics().circle(2, 4, r + 2).fill({ color: 0x000000, alpha: 0.38 });
    var body = new PIXI.Graphics().circle(0, 0, r).fill(PLAYER_COLORS[index % PLAYER_COLORS.length]).stroke({ color: 0xffffff, width: 2, alpha: 0.86 });
    var label = new PIXI.Text({ text: String(index + 1), style: { fontFamily: "Arial, sans-serif", fontSize: Math.max(10, r), fill: 0x06110f, fontWeight: "900" } });
    label.anchor.set(0.5);
    c.addChild(shadow, body, label);
    return c;
  },

  burst: function(x, y, color) {
    for (var i = 0; i < 18; i++) {
      var p = new PIXI.Graphics().circle(0, 0, 2 + (i % 3)).fill({ color: color || 0xf6c453, alpha: 0.9 });
      p.x = x;
      p.y = y;
      var angle = (i / 18) * Math.PI * 2;
      var dist = 26 + (i % 5) * 7;
      Renderer.layers.fx.addChild(p);
      Tween.to(p, { x: x + Math.cos(angle) * dist, y: y + Math.sin(angle) * dist, alpha: 0 }, 650, "easeOut", function() {
        if (this && this.parent) this.parent.removeChild(this);
      }.bind(p));
    }
  },

  moneyBurst: function(x, y, amount, color) {
    var tier = amount >= 200 ? 3 : amount >= 50 ? 2 : 1;
    var count = tier === 3 ? 34 : tier === 2 ? 24 : 14;
    var radius = tier === 3 ? 118 : tier === 2 ? 78 : 46;
    var headline = new PIXI.Text({
      text: "+" + money(amount),
      style: {
        fontFamily: "Arial, sans-serif",
        fontSize: tier === 3 ? 30 : tier === 2 ? 23 : 17,
        fill: 0xfff4b8,
        stroke: { color: 0x06110f, width: 5 },
        fontWeight: "900"
      }
    });
    headline.anchor.set(0.5);
    headline.x = x;
    headline.y = y - Renderer.layout.step * 0.35;
    Renderer.layers.fx.addChild(headline);
    Tween.to(headline, { y: headline.y - 36, alpha: 0 }, 900, "easeOut", function() {
      if (this && this.parent) this.parent.removeChild(this);
    }.bind(headline));
    for (var i = 0; i < count; i++) {
      var glyph = i % 4 === 0 ? "$" : String((i % 9) + 1);
      var chip = new PIXI.Text({
        text: glyph,
        style: {
          fontFamily: "Arial, sans-serif",
          fontSize: 12 + tier * 3 + (i % 3),
          fill: i % 3 === 0 ? 0x37d987 : i % 3 === 1 ? 0xf6c453 : 0xffffff,
          stroke: { color: 0x06110f, width: 3 },
          fontWeight: "900"
        }
      });
      chip.anchor.set(0.5);
      chip.x = x + (uiRandom() - 0.5) * 14;
      chip.y = y + (uiRandom() - 0.5) * 14;
      chip.rotation = (uiRandom() - 0.5) * 0.7;
      Renderer.layers.fx.addChild(chip);
      var angle = uiRandom() * Math.PI * 2;
      var dist = radius * (0.34 + uiRandom() * 0.72);
      Tween.to(chip, { x: x + Math.cos(angle) * dist, y: y + Math.sin(angle) * dist - 18, alpha: 0, rotation: chip.rotation + (uiRandom() - 0.5) * 2.4 }, 620 + tier * 120, "easeOut", function() {
        if (this && this.parent) this.parent.removeChild(this);
      }.bind(chip));
    }
  }
};

  var html = '<div style="font-weight:900;font-size:13px">Propose Trade</div>';
  html += '<div class="trade-head trade-money-row"><label>To<select id="trade-to">';
  for (var t = 0; t < targets.length; t++) html += '<option value="' + esc(targets[t].id) + '"' + (targets[t].id === targetId ? " selected" : "") + '>' + esc(playerName(targets[t].id, context)) + '</option>';
  html += '</select></label><label>Offer Cash<input id="trade-offer-cash" type="number" min="0" max="' + (my ? my.cash : 0) + '" step="1" value="' + esc(existingOfferCash ? existingOfferCash.value : "0") + '"></label>';
  var target = targets[0];
  for (var tp = 0; tp < targets.length; tp++) if (targets[tp].id === targetId) target = targets[tp];
  html += '<label>Request Cash<input id="trade-request-cash" type="number" min="0" max="' + target.cash + '" step="1" value="' + esc(existingRequestCash ? existingRequestCash.value : "0") + '"></label></div>';
  if (my && my.jailCards > 0) {
    html += '<div class="trade-head trade-card-row"><label>Offer Detention Cards<input id="trade-offer-cards" type="number" min="0" max="' + my.jailCards + '" step="1" value="' + esc(existingOfferCards ? existingOfferCards.value : "0") + '"></label><div></div></div>';
  }
  html += '<div class="trade-columns">';
  html += '<div class="trade-side"><div class="trade-side-label">You Give</div><div class="deed-list">' + renderDeedOptions(view, me, "offer", offerSelected) + '</div></div>';
  html += '<div class="trade-side"><div class="trade-side-label">You Receive</div><div class="deed-list">' + renderDeedOptions(view, targetId, "request", requestSelected) + '</div></div>';
  html += '</div>';
  html += '<div class="trade-actions"><button class="action-btn money" id="send-trade">Send Trade</button><button class="action-btn secondary" id="cancel-trade">Cancel</button></div>';
  panel.innerHTML = html;
  document.getElementById("trade-to").addEventListener("change", function() {
    renderTradePanel(view, legalActions, context);
  });
  document.getElementById("cancel-trade").addEventListener("click", function() { panel.classList.remove("open"); panel.innerHTML = ""; });
  document.getElementById("send-trade").addEventListener("click", function() {
    var offerCardsInput = document.getElementById("trade-offer-cards");
    playgent.submitAction({
      type: "propose_trade",
      to: document.getElementById("trade-to").value,
      offerCash: parseInt(document.getElementById("trade-offer-cash").value || "0", 10),
      requestCash: parseInt(document.getElementById("trade-request-cash").value || "0", 10),
      offerJailCards: offerCardsInput ? parseInt(offerCardsInput.value || "0", 10) : 0,
      offerTiles: selectedTradeValues("offer").join(","),
      requestTiles: selectedTradeValues("request").join(",")
    });
    panel.classList.remove("open");
  });
}
function phaseTitle(view, context) {
  if (view.phase === "roll") return playerName(view.currentActor, context) + " to roll";
  if (view.phase === "buy") return "Buy or auction";
  if (view.phase === "auction") return "Fast auction";
  if (view.phase === "trade") return "Trade proposal";
  if (view.phase === "debt") return "Cash shortfall";
  if (view.phase === "post_roll") return "Turn wrap-up";
  if (view.phase === "gameover") return "Game over";
  return view.phase;
}
function renderAuctionBidPanel(view, legalActions, context) {
  if (!view.auction) return "";
  var canBid = false;
  for (var i = 0; i < legalActions.length; i++) if (legalActions[i].type === "bid") canBid = true;
  if (!canBid) return "";
  var bidder = null;
  for (var p = 0; p < view.players.length; p++) if (view.players[p].id === context.myId) bidder = view.players[p];
  var min = (view.auction.highBid || 0) + 1;
  var max = bidder ? bidder.cash : min;
  if (max < min) return "";
  return '<div class="auction-bid-panel"><label>Custom Bid<input id="custom-bid-amount" type="number" min="' + min + '" max="' + max + '" data-min-bid="' + min + '" data-max-bid="' + max + '" step="1" value="' + min + '"></label><button class="action-btn money" id="custom-bid-button">Bid</button></div>';
}
function isTileFinanceAction(action) {
  return action.type === "mortgage" || action.type === "unmortgage" || action.type === "sell_building" || action.type === "build";
}
function renderDom(view, legalActions, context) {
  legalActions = (legalActions || []).map(unwrapAction);
  var overlay = document.getElementById("dom-overlay");
  overlay.setAttribute("data-phase", view.phase || "unknown");
  overlay.setAttribute("data-status", legalActions.length ? "your-turn" : (context.gameOver ? "game-over" : "waiting"));
  document.body.setAttribute("data-phase", view.phase || "unknown");
  document.body.setAttribute("data-status", legalActions.length ? "your-turn" : "waiting");

  document.getElementById("phase-title").textContent = phaseTitle(view, context);
  var sub = "Round " + view.round + "/" + view.maxRound + " - " + (legalActions.length ? "your move" : "watching " + playerName(view.currentActor, context));
  if (view.auction) sub = "High bid " + money(view.auction.highBid) + (view.auction.highBidder ? " by " + playerName(view.auction.highBidder, context) : "");
  if (view.debt) sub = playerName(view.debt.playerId, context) + " needs " + money(view.debt.shortfall);
  document.getElementById("phase-sub").textContent = sub;
  var dice = view.lastRoll ? [view.lastRoll.d1, view.lastRoll.d2] : ["-", "-"];
  document.getElementById("dice-box").innerHTML = '<span class="die">' + dice[0] + '</span><span class="die">' + dice[1] + '</span>';

  var tileLine = "";
  if (view.pendingTile != null) {
    var tile = view.tiles[view.pendingTile];
    tileLine = tile.name + (tile.owner ? " - owned by " + playerName(tile.owner, context) : tile.price ? " - " + money(tile.price) : "");
  } else if (view.phase === "roll") {
    var actor = view.players.filter(function(p) { return p.id === view.currentActor; })[0];
    tileLine = actor ? "At " + view.tiles[actor.position].name : "";
  }
  document.getElementById("tile-line").textContent = tileLine;
  document.getElementById("log-line").textContent = view.log && view.log.length ? formatLogLine(view.log[view.log.length - 1], context) : "";
  renderCenterPanel(view, context);

  var tray = document.getElementById("action-tray");
  if (legalActions.length === 0) {
    tray.innerHTML = '<div class="empty-actions">Waiting for the next city move</div>';
  } else {
    var html = renderAuctionBidPanel(view, legalActions, context);
    for (var a = 0; a < legalActions.length; a++) {
      if (isTileFinanceAction(legalActions[a])) continue;
      html += '<button class="' + classForAction(legalActions[a]) + '" data-action="' + a + '">' + esc(labelForAction(legalActions[a], view)) + '</button>';
    }
    tray.innerHTML = html || '<div class="empty-actions">Click one of your deeds to manage it</div>';
    var customBidButton = document.getElementById("custom-bid-button");
    if (customBidButton) {
      customBidButton.addEventListener("click", function() {
        var input = document.getElementById("custom-bid-amount");
        var minBid = parseInt(input.getAttribute("data-min-bid") || "0", 10);
        var maxBid = parseInt(input.getAttribute("data-max-bid") || "0", 10);
        var amount = parseInt(input.value || "0", 10);
        if (Number.isNaN(amount)) amount = minBid;
        amount = Math.max(minBid, Math.min(maxBid, amount));
        input.value = String(amount);
        playgent.submitAction({ type: "bid", amount: amount });
      });
    }
    var buttons = tray.querySelectorAll("[data-action]");
    for (var b = 0; b < buttons.length; b++) {
      buttons[b].addEventListener("click", function() {
        var idx = parseInt(this.getAttribute("data-action"), 10);
        if (!legalActions[idx]) return;
        if (legalActions[idx].type === "propose_trade") {
          var tradePanel = document.getElementById("trade-panel");
          tradePanel.classList.add("open");
          renderTradePanel(view, legalActions, context);
          return;
        }
        playgent.submitAction(legalActions[idx]);
      });
    }
  }
  renderTradePanel(view, legalActions, context);
  renderDebtModal(view, legalActions, context);

  var playerContainer = document.getElementById("player-container");
  playerContainer.innerHTML = "";
  for (var pc = 0; pc < view.players.length; pc++) {
    var span = document.createElement("span");
    span.setAttribute("data-player", playerName(view.players[pc].id, context));
    span.textContent = playerName(view.players[pc].id, context);
    playerContainer.appendChild(span);
  }
  var landmarks = document.getElementById("board-landmarks");
  landmarks.setAttribute("data-current-player", playerName(view.currentActor, context));
  landmarks.setAttribute("data-move-history", view.log ? view.log.map(function(line) { return formatLogLine(line, context); }).join(" | ") : "");
  landmarks.innerHTML = "";
  for (var cell = 0; cell < view.tiles.length; cell++) {
    var marker = document.createElement("span");
    marker.setAttribute("data-cell", String(cell));
    marker.textContent = view.tiles[cell].name;
    landmarks.appendChild(marker);
  }
  var patternCell = document.createElement("span");
  patternCell.setAttribute("data-cell", "r,c");
  patternCell.textContent = "board graph cells";
  landmarks.appendChild(patternCell);
}

(function boot() {
  var pending = null;
  var ready = false;
  function handle(view, legalActions, context) {
    if (!ready) {
      pending = { view: view, legalActions: legalActions, context: context };
      return;
    }
    var prev = Renderer.currentView;
    renderDom(view, legalActions, context || {});
    Renderer.render(view, legalActions, context || {});
    if (prev && prev.players && view.players) {
      var moved = false;
      for (var c = 0; c < view.players.length; c++) {
        var now = view.players[c];
        var before = null;
        for (var bp = 0; bp < prev.players.length; bp++) if (prev.players[bp].id === now.id) before = prev.players[bp];
        if (before && now.position !== before.position) moved = true;
        if (before && now.cash > before.cash) {
          var gain = now.cash - before.cash;
          var cashPos = Renderer.tilePos(now.position);
          Renderer.moneyBurst(cashPos.x, cashPos.y, gain, PLAYER_COLORS[Renderer.playerIndex(now.id)]);
          if (playgent.sound) playgent.sound(gain >= 100 ? "coin.sell" : "coin.pickup");
        }
        if (before && !before.eliminated && now.eliminated && playgent.sound) {
          playgent.sound("negative.sting");
        }
      }
      if (moved && playgent.sound) playgent.sound("board.move");
    }
    if (prev && view.log && prev.log && view.log.length > 0 && view.log[view.log.length - 1] !== prev.log[prev.log.length - 1]) {
      var actor = view.currentActor || view.currentPlayer;
      var pp = null;
      for (var i = 0; i < view.players.length; i++) if (view.players[i].id === actor) pp = view.players[i];
      if (pp) {
        var pos = Renderer.tilePos(pp.position);
        Renderer.burst(pos.x, pos.y, PLAYER_COLORS[Renderer.playerIndex(pp.id)]);
      }
      var newestLog = view.log[view.log.length - 1] || "";
      if (playgent.sound && newestLog.indexOf("drew:") !== -1) playgent.sound("card.draw");
      if (playgent.sound && newestLog.indexOf("needs $") !== -1 && newestLog.indexOf("stay solvent") !== -1) playgent.sound("negative.warning");
      if (playgent.sound && newestLog.indexOf("won ") !== -1 && newestLog.indexOf(" at auction") !== -1) playgent.sound("board.place");
      if (playgent.sound && newestLog.indexOf("bought ") !== -1) playgent.sound("board.place");
    }
    if (prev && prev.phase !== "gameover" && view.phase === "gameover" && playgent.sound) {
      if (view.winner && context && view.winner === context.myId) playgent.sound("game.victory");
      else if (view.winner) playgent.sound("game.defeat");
      else playgent.sound("game.over");
    }
    if (prev && prev.currentActor !== view.currentActor && view.currentActor && context && view.currentActor === context.myId && playgent.sound) {
      playgent.sound("turn.start");
    }
  }
  playgent.onStateChange(handle);
  if (playgent.onAction) {
    playgent.onAction(function(action) {
      if (action.type === "buy" || action.type === "bid" || action.type === "build" || action.type === "unmortgage") playgent.sound && playgent.sound("coin.purchase");
      if (action.type === "sell_building" || action.type === "mortgage") playgent.sound && playgent.sound("coin.sell");
      if (action.type === "roll" || action.type === "roll_jail" || action.type === "roll_again") playgent.sound && playgent.sound("dice.roll");
      if (action.type === "pay_bail") playgent.sound && playgent.sound("coin.purchase");
      if (action.type === "use_jail_card") playgent.sound && playgent.sound("card.place");
      if (action.type === "raise_cash") playgent.sound && playgent.sound("coin.sell");
      if (action.type === "pay_debt") playgent.sound && playgent.sound("coin.purchase");
      if (action.type === "declare_bankruptcy") playgent.sound && playgent.sound("negative.sting");
      if (action.type === "accept_trade") playgent.sound && playgent.sound("ui.success");
      if (action.type === "reject_trade" || action.type === "pass" || action.type === "end_turn") playgent.sound && playgent.sound("ui.cancel");
      if (action.type === "propose_trade") playgent.sound && playgent.sound("ui.confirm");
    });
  }
  function start() {
    if (typeof PIXI === "undefined") { setTimeout(start, 40); return; }
    Renderer.init().then(function() {
      ready = true;
      if (pending) {
        handle(pending.view, pending.legalActions, pending.context);
        pending = null;
      }
    });
  }
  start();
})();
</script>
