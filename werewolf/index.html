<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  margin: 0; overflow: hidden; background: #0f0f1a;
  height: 100vh; width: 100vw;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #e2e8f0;
  user-select: none; -webkit-tap-highlight-color: transparent;
}

/* ── Layered backgrounds (crossfade) + canvas + DOM ── */
#bg-base, #bg-crossfade {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
}
#bg-base       { z-index: 0; background: linear-gradient(to bottom, #0f0f1a, #0f0f1a); }
#bg-crossfade  { z-index: 1; opacity: 0; transition: opacity 3s ease; }
#bg-crossfade.no-transition { transition: none; }
#canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }
#dom-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 3;
  pointer-events: none; display: flex; flex-direction: column; align-items: center;
}

/* ── Player circle avatars ── */
.ww-avatar {
  position: absolute; width: 48px; height: 48px; border-radius: 50%;
  background: #1a1a2e; border: 2px solid #334155;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity 0.5s, border-color 0.3s;
}
.ww-avatar.dead { opacity: 0.3; animation: none; }
.ww-avatar.me { box-shadow: 0 0 8px rgba(168, 85, 247, 0.4); }
.ww-avatar.alive { animation: breathe 3s ease-in-out infinite; }
@keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.06); } }
.ww-letter { font-size: 18px; font-weight: 800; color: #e2e8f0; line-height: 1; }
.ww-name {
  position: absolute; bottom: -20px; font-size: 13px; font-weight: 600;
  color: #e2e8f0; white-space: nowrap; text-align: center;
  max-width: 90px; overflow: hidden; text-overflow: ellipsis;
  text-shadow: 0 1px 3px rgba(0,0,0,0.6);
}
.ww-role-label {
  position: absolute; bottom: -30px; font-size: 9px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.05em;
  white-space: nowrap; text-align: center;
}
.ww-check {
  position: absolute; top: -2px; right: -2px; width: 16px; height: 16px;
  background: #166534; color: #22c55e; border-radius: 50%;
  font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700;
}

/* ── Action tray ── */
#action-tray {
  position: absolute; bottom: 16px; left: 16px; right: 16px;
  display: flex; flex-direction: column; gap: 8px; align-items: center;
  pointer-events: auto; max-width: 420px; margin: 0 auto;
  z-index: 10; max-height: 50vh; overflow-y: auto;
}
.ww-btn {
  width: 100%; padding: 14px 24px; font-size: 16px; font-weight: 700;
  font-family: inherit; border: none; border-radius: 12px; cursor: pointer;
  transition: background 0.15s, transform 0.1s, opacity 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent; min-height: 48px;
  text-align: center; color: #e2e8f0; background: #1a1a2e; border: 2px solid #334155;
}
.ww-btn:active:not(:disabled) { transform: scale(0.97); }
.ww-btn:disabled { opacity: 0.4; cursor: default; }
.ww-btn:hover:not(:disabled) { border-color: #475569; background: #1e2d4a; }
.ww-btn.wolf:hover:not(:disabled) { border-color: #ef4444; background: #2a1010; }
.ww-btn.seer:hover:not(:disabled) { border-color: #a855f7; background: #2d1b69; }
.ww-btn.doctor:hover:not(:disabled) { border-color: #22c55e; background: #0a2a1a; }
.ww-btn.skip { background: transparent; border: 2px dashed #334155; color: #94a3b8; }
.ww-btn.skip:hover:not(:disabled) { border-color: #94a3b8; color: #e2e8f0; }

/* ── Center content ── */
#center-content {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  text-align: center; pointer-events: none; max-width: 320px; width: 90%;
}
.result-text { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
.result-sub { font-size: 14px; color: #94a3b8; }
.result-kill { color: #ef4444; }
.result-save { color: #22c55e; }
.result-none { color: #94a3b8; }
.gameover-title { font-size: 28px; font-weight: 900; letter-spacing: 0.03em; }
.gameover-title.wolves { color: #ef4444; }
.gameover-title.village { color: #fcd34d; }

/* ── Role reveal card ── */
.role-card { perspective: 600px; width: 180px; height: 100px; margin: 0 auto 12px; cursor: pointer; pointer-events: auto; }
.role-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s; transform-style: preserve-3d; }
.role-card.flipped .role-card-inner { transform: rotateY(180deg); }
.role-card-face, .role-card-back {
  position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
  border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 800;
}
.role-card-face { background: #334155; color: #94a3b8; font-size: 32px; }
.role-card-back { background: #1a1a2e; transform: rotateY(180deg); text-transform: uppercase; letter-spacing: 0.05em; font-size: 20px; }

/* ── Phase header ── */
#phase-header {
  position: absolute; top: 12px; left: 16px; right: 16px;
  display: flex; justify-content: space-between; align-items: center; pointer-events: none;
}
.phase-label { font-size: 13px; font-weight: 600; color: #94a3b8; }
.timer-display { font-size: 20px; font-weight: 700; color: #a855f7; min-width: 36px; text-align: center; }
.timer-display.urgent { color: #ef4444; }

/* ── Discussion hint ── */
.discuss-hint { font-size: 15px; color: #ffffff; margin-top: 8px; animation: pulse 2s ease-in-out infinite; text-shadow: 0 1px 4px rgba(0,0,0,0.5); }
@keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }

/* ── Timer ring ── */
#timer-ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
#timer-ring circle.track { fill: none; stroke: #1a1a2e; stroke-width: 2; }
#timer-ring circle.progress { fill: none; stroke: #a855f7; stroke-width: 2; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }

/* ── Seer history ── */
.seer-history {
  font-size: 12px; color: #a855f7; margin-top: 12px; line-height: 1.8;
  background: rgba(26, 26, 46, 0.8); border-radius: 10px; padding: 10px 14px;
  text-align: left; display: flex; flex-direction: column; gap: 4px;
}
.seer-history-title { font-size: 11px; font-weight: 700; color: #a855f7; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
.seer-entry { display: flex; justify-content: space-between; align-items: center; }
.seer-entry-name { color: #e2e8f0; }
.seer-entry-wolf { color: #ef4444; font-weight: 700; }
.seer-entry-safe { color: #60a5fa; font-weight: 700; }

/* ── Vote history ── */
#vote-history-area {
  position: absolute; top: 36px; left: 16px;
  pointer-events: auto; max-width: 280px; z-index: 5;
}
.vh-toggle { background: none; border: none; color: #94a3b8; font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer; padding: 4px 0; display: block; }
.vh-toggle:hover { color: #e2e8f0; }
.vh-content { display: none; font-size: 11px; color: #94a3b8; line-height: 1.6; max-height: 180px; overflow-y: auto; margin-top: 4px; background: rgba(26, 26, 46, 0.9); border-radius: 8px; padding: 8px 12px; }
.vh-content.open { display: block; }

/* ── No-canvas fallback ── */
body.no-canvas #canvas-container { display: none; }
body.no-canvas { background: #0f0f1a; }
body.no-canvas.phase-night { background: #0a0a1f; }
body.no-canvas.phase-day { background: #1a1508; }
</style>

<div id="bg-base"></div>
<div id="bg-crossfade"></div>
<div id="canvas-container"></div>
<div id="dom-overlay">
  <div id="phase-header">
    <span class="phase-label" id="phase-label"></span>
    <span class="timer-display" id="timer-display"></span>
  </div>
  <div id="center-content"></div>
  <div id="vote-history-area"></div>
  <div id="action-tray"></div>
</div>

<script>
(function() {
  var E2E_GAME_SLUG = "werewolf";
  var E2E = window.__playgentE2EState || {
    version: 1,
    regions: [],
    lastPhase: "loading",
    lastStatus: "loading",
    lastPlayerId: "",
    lastCurrentPlayer: "",
    lastLegalActionCount: 0,
    lastVisibleLegalActionCount: 0,
    lastActions: [],
    lastRawActions: []
  };
  window.__playgentE2EState = E2E;

  function setE2EAttr(el, name, value) {
    if (!el) return;
    el.setAttribute(name, value == null ? "" : String(value));
  }

  function unwrapE2EAction(option) {
    if (option && typeof option === "object" && option.decision !== undefined) return option.decision;
    if (option && typeof option === "object" && option.action !== undefined) return option.action;
    return option;
  }

  function isVisibleE2EAction(action) {
    action = unwrapE2EAction(action);
    if (!action || typeof action !== "object") return false;
    if (action.type === "advance_phase" || action.type === "system" || action.type === "noop") return false;
    return true;
  }

  function getVisibleE2EActions(actions) {
    var out = [];
    for (var i = 0; actions && i < actions.length; i++) {
      if (isVisibleE2EAction(actions[i])) out.push(unwrapE2EAction(actions[i]));
    }
    return out;
  }

  function ensureE2ETelemetry() {
    var el = document.getElementById("e2e-telemetry");
    if (!el) {
      el = document.createElement("div");
      el.id = "e2e-telemetry";
      if (document.body) document.body.appendChild(el);
    }
    el.setAttribute("aria-hidden", "true");
    el.style.cssText = "position:fixed;width:1px;height:1px;overflow:hidden;opacity:0;pointer-events:none;left:0;top:0;";
    setE2EAttr(el, "data-game", E2E_GAME_SLUG);
    setE2EAttr(el, "data-phase", E2E.lastPhase);
    setE2EAttr(el, "data-status", E2E.lastStatus);
    setE2EAttr(el, "data-player", E2E.lastPlayerId || "spectator");
    return el;
  }

  function addUnique(list, el) {
    if (!el) return;
    for (var i = 0; i < list.length; i++) if (list[i] === el) return;
    list.push(el);
  }

  function getE2ERoots() {
    var roots = [];
    addUnique(roots, ensureE2ETelemetry());
    addUnique(roots, document.getElementById("telemetry"));
    addUnique(roots, document.getElementById("game"));
    addUnique(roots, document.getElementById("game-container"));
    addUnique(roots, document.querySelector("[data-board]"));
    return roots;
  }

  function getCurrentPlayerE2E(view) {
    if (!view) return "";
    return view.currentPlayer || view.currentPlayerId || view.currentActor || view.turn || "";
  }

  function updateE2EPlayers(players) {
    var telemetry = ensureE2ETelemetry();
    var host = document.getElementById("e2e-players");
    if (!host) {
      host = document.createElement("div");
      host.id = "e2e-players";
      telemetry.appendChild(host);
    }
    host.textContent = "";
    for (var i = 0; players && i < players.length; i++) {
      var p = players[i] || {};
      var span = document.createElement("span");
      setE2EAttr(span, "data-player", p.id || "");
      setE2EAttr(span, "data-player-name", p.name || p.id || "");
      span.textContent = p.name || p.id || "";
      host.appendChild(span);
    }
  }

  function updateE2ELandmarks(view, legalActions, context) {
    var visibleActions = getVisibleE2EActions(legalActions || []);
    var phase = context && context.gameOver ? "game-over" : (view && (view.phase || view.mode || view.stage) ? (view.phase || view.mode || view.stage) : "playing");
    var status = context && context.gameOver ? "game-over" : (visibleActions.length > 0 ? "your-turn" : "waiting");
    var playerId = context && context.myId ? context.myId : "spectator";
    var currentPlayer = getCurrentPlayerE2E(view);
    var roots = getE2ERoots();
    E2E.lastPhase = phase;
    E2E.lastStatus = status;
    E2E.lastPlayerId = playerId;
    E2E.lastCurrentPlayer = currentPlayer;
    E2E.lastRawActions = legalActions || [];
    E2E.lastActions = visibleActions;
    E2E.lastLegalActionCount = (legalActions || []).length;
    E2E.lastVisibleLegalActionCount = visibleActions.length;
    for (var i = 0; i < roots.length; i++) {
      setE2EAttr(roots[i], "data-game", E2E_GAME_SLUG);
      setE2EAttr(roots[i], "data-phase", phase);
      setE2EAttr(roots[i], "data-status", status);
      setE2EAttr(roots[i], "data-player", playerId);
      setE2EAttr(roots[i], "data-current-player", currentPlayer);
      if (view && view.round != null) setE2EAttr(roots[i], "data-round", view.round);
      if (view && view.turnNumber != null) setE2EAttr(roots[i], "data-turn", view.turnNumber);
    }
    updateE2EPlayers(context && context.players ? context.players : []);
  }

  function actionTypeForIndex(idx) {
    var raw = E2E.lastRawActions && E2E.lastRawActions[idx] ? unwrapE2EAction(E2E.lastRawActions[idx]) : null;
    return raw && raw.type ? raw.type : "choose";
  }

  function safeLabelFromNode(node) {
    var label = node.getAttribute("data-action-label") || node.getAttribute("aria-label") || node.title || node.textContent || node.value || "";
    return String(label).replace(/\s+/g, " ").trim().slice(0, 100);
  }

  function decorateE2EDOMControls() {
    var nodes = document.querySelectorAll("[data-action-idx], [data-action], button, [role='button'], input[type='button'], input[type='submit'], input:not([type='hidden']), select, textarea, [data-cell], [data-card], [data-card-id], [data-option-id], [data-brainrot], canvas");
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      if (node.hasAttribute("data-action") && !node.hasAttribute("data-action-idx")) {
        node.setAttribute("data-action-idx", node.getAttribute("data-action"));
      }
      if (node.hasAttribute("data-action-idx")) {
        var idx = parseInt(node.getAttribute("data-action-idx"), 10);
        if (!isNaN(idx) && !node.hasAttribute("data-action-type")) node.setAttribute("data-action-type", actionTypeForIndex(idx));
        if (!node.hasAttribute("data-action-label")) node.setAttribute("data-action-label", safeLabelFromNode(node));
      }
      if (node.hasAttribute("data-cell") && !node.getAttribute("aria-label")) {
        node.setAttribute("aria-label", "cell " + node.getAttribute("data-cell"));
      }
      if ((node.hasAttribute("data-card") || node.hasAttribute("data-card-id")) && !node.getAttribute("aria-label")) {
        node.setAttribute("aria-label", "card " + (node.getAttribute("data-card") || node.getAttribute("data-card-id")));
      }
      if (node.tagName === "CANVAS" && !node.getAttribute("aria-label")) {
        node.setAttribute("aria-label", E2E_GAME_SLUG + " canvas");
      }
    }
  }

  function e2eBeginFrame(view, legalActions, context) {
    E2E.regions = [];
    updateE2ELandmarks(view || {}, legalActions || [], context || {});
  }

  function e2eAfterRender() {
    decorateE2EDOMControls();
  }

  function isVisibleE2ENode(node) {
    if (!node || !node.getBoundingClientRect) return false;
    var rect = node.getBoundingClientRect();
    if (rect.width <= 0 || rect.height <= 0) return false;
    if (rect.right <= 0 || rect.bottom <= 0 || rect.left >= window.innerWidth || rect.top >= window.innerHeight) return false;
    var style = window.getComputedStyle ? window.getComputedStyle(node) : null;
    if (style && (style.display === "none" || style.visibility === "hidden" || style.opacity === "0")) return false;
    if (node.disabled || node.getAttribute("aria-disabled") === "true") return false;
    return true;
  }

  function regionKindForNode(node) {
    if (node.tagName === "CANVAS") return "canvas";
    if (node.tagName === "INPUT" || node.tagName === "SELECT" || node.tagName === "TEXTAREA") return "input";
    if (node.hasAttribute("data-cell")) return "cell";
    if (node.hasAttribute("data-card") || node.hasAttribute("data-card-id")) return "card";
    return "button";
  }

  function getDOMActionRegions() {
    decorateE2EDOMControls();
    var nodes = document.querySelectorAll("[data-action-idx], button, [role='button'], input[type='button'], input[type='submit'], input:not([type='hidden']), select, textarea, [data-cell], [data-card], [data-card-id], [data-option-id], [data-brainrot], canvas");
    var out = [];
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      if (!isVisibleE2ENode(node)) continue;
      var r = clipE2ERect(node.getBoundingClientRect());
      if (!r) continue;
      var id = node.id || node.getAttribute("data-action-idx") || node.getAttribute("data-cell") || node.getAttribute("data-card") || node.getAttribute("data-card-id") || node.getAttribute("data-option-id") || node.getAttribute("data-brainrot") || ("control-" + i);
      out.push({
        id: String(id),
        kind: regionKindForNode(node),
        label: safeLabelFromNode(node),
        actionType: node.getAttribute("data-action-type") || "",
        selector: node.id ? ("#" + node.id) : "",
        rect: { x: r.left, y: r.top, width: r.width, height: r.height },
        center: { x: r.left + r.width / 2, y: r.top + r.height / 2 }
      });
    }
    return out;
  }

  function clipE2ERect(rect) {
    if (!rect) return null;
    var x = Number(rect.x != null ? rect.x : rect.left) || 0;
    var y = Number(rect.y != null ? rect.y : rect.top) || 0;
    var width = Number(rect.width) || 0;
    var height = Number(rect.height) || 0;
    var left = Math.max(0, x);
    var top = Math.max(0, y);
    var right = Math.min(window.innerWidth, x + width);
    var bottom = Math.min(window.innerHeight, y + height);
    if (right - left <= 0 || bottom - top <= 0) return null;
    return { x: left, y: top, width: right - left, height: bottom - top };
  }

  function e2eRegisterRegion(region) {
    if (!region || !region.id || !region.rect) return;
    var r = clipE2ERect(region.rect);
    if (!r || r.width == null || r.height == null) return;
    var item = {
      id: String(region.id),
      kind: region.kind || "button",
      label: region.label || "",
      actionType: region.actionType || "",
      rect: { x: Number(r.x) || 0, y: Number(r.y) || 0, width: Number(r.width) || 0, height: Number(r.height) || 0 },
      center: region.center || { x: (Number(r.x) || 0) + (Number(r.width) || 0) / 2, y: (Number(r.y) || 0) + (Number(r.height) || 0) / 2 }
    };
    for (var i = 0; i < E2E.regions.length; i++) {
      if (E2E.regions[i].id === item.id) {
        E2E.regions[i] = item;
        return;
      }
    }
    E2E.regions.push(item);
  }

  function e2eCanvasRect(localRect, app) {
    var canvas = app && app.canvas ? app.canvas : document.querySelector("canvas");
    var screen = app && app.screen ? app.screen : null;
    if (!canvas || !localRect) return null;
    var canvasRect = canvas.getBoundingClientRect();
    var screenW = screen && screen.width ? screen.width : canvasRect.width;
    var screenH = screen && screen.height ? screen.height : canvasRect.height;
    var sx = canvasRect.width / (screenW || canvasRect.width || 1);
    var sy = canvasRect.height / (screenH || canvasRect.height || 1);
    return {
      x: canvasRect.left + localRect.x * sx,
      y: canvasRect.top + localRect.y * sy,
      width: localRect.width * sx,
      height: localRect.height * sy
    };
  }

  function e2ePixiBounds(displayObject, app) {
    if (!displayObject || !displayObject.getBounds) return null;
    var b = displayObject.getBounds();
    return e2eCanvasRect({ x: b.x, y: b.y, width: b.width, height: b.height }, app);
  }

  function getE2ECanvasInfo() {
    var canvas = document.querySelector("canvas");
    if (!canvas) return null;
    var rect = canvas.getBoundingClientRect();
    return { selector: "canvas", width: rect.width, height: rect.height };
  }

  function getAllE2ERegions() {
    var out = E2E.regions.slice();
    var dom = getDOMActionRegions();
    var seen = {};
    var merged = [];
    for (var i = 0; i < out.length; i++) { seen[out[i].id] = true; merged.push(out[i]); }
    for (var j = 0; j < dom.length; j++) {
      if (!seen[dom[j].id]) merged.push(dom[j]);
    }
    return merged;
  }

  function runE2ELayoutChecks() {
    var failures = [];
    var regions = getAllE2ERegions();
    var canvas = getE2ECanvasInfo();
    if (E2E.lastVisibleLegalActionCount > 0 && regions.length === 0) {
      failures.push({ severity: "error", message: "active legal actions did not create visible controls" });
    }
    if (canvas && (canvas.width <= 0 || canvas.height <= 0)) {
      failures.push({ severity: "error", message: "canvas has empty bounds" });
    }
    for (var i = 0; i < regions.length; i++) {
      var region = regions[i];
      var r = region.rect;
      if (!r) {
        failures.push({ severity: "error", message: region.id + " has no rect" });
        continue;
      }
      if (r.width <= 0 || r.height <= 0) failures.push({ severity: "error", message: region.id + " has empty bounds" });
      if (r.x < -1 || r.y < -1 || r.x + r.width > window.innerWidth + 1 || r.y + r.height > window.innerHeight + 1) {
        failures.push({ severity: "error", message: region.id + " is offscreen" });
      }
      if (region.kind !== "canvas" && (r.width < 36 || r.height < 36)) {
        failures.push({ severity: "warning", message: region.id + " is a small touch target" });
      }
    }
    return failures;
  }

  window.__playgentE2EBegin = e2eBeginFrame;
  window.__playgentE2EAfterRender = e2eAfterRender;
  window.__playgentE2ERegisterRegion = e2eRegisterRegion;
  window.__playgentE2ECanvasRect = e2eCanvasRect;
  window.__playgentE2EPixiBounds = e2ePixiBounds;
  window.__playgentE2ERunLayoutChecks = runE2ELayoutChecks;
  window.__playgentE2E = {
    version: 1,
    getSnapshot: function() {
      return {
        phase: E2E.lastPhase,
        status: E2E.lastStatus,
        playerId: E2E.lastPlayerId,
        currentPlayer: E2E.lastCurrentPlayer,
        legalActionCount: E2E.lastVisibleLegalActionCount,
        regionCount: getAllE2ERegions().length,
        canvas: getE2ECanvasInfo()
      };
    },
    getInteractiveRegions: function() { return getAllE2ERegions(); },
    checkLayout: function() { return runE2ELayoutChecks(); }
  };

  if (typeof window.__playgentCheckLayout !== "function") {
    window.__playgentCheckLayout = function() { return runE2ELayoutChecks(); };
  }

  function patchPlaygentE2E() {
    if (!window.playgent || !window.playgent.onStateChange || window.playgent.__e2ePatched) return false;
    var original = window.playgent.onStateChange;
    window.playgent.onStateChange = function(cb) {
      return original.call(window.playgent, function(view, legalActions, context) {
        e2eBeginFrame(view, legalActions, context || {});
        var result = cb.apply(this, arguments);
        e2eAfterRender();
        return result;
      });
    };
    window.playgent.__e2ePatched = true;
    return true;
  }

  ensureE2ETelemetry();
  decorateE2EDOMControls();
  if (!patchPlaygentE2E()) {
    var tries = 0;
    var timer = setInterval(function() {
      tries++;
      if (patchPlaygentE2E() || tries > 80) clearInterval(timer);
    }, 50);
  }
}());
</script>

<script>
/* ===================================================================
   Werewolf — Hybrid PixiJS Atmosphere + DOM Gameplay
   Architecture: PixiJS canvas (atmosphere, particles, vote bolts)
   layered behind DOM (player circle, buttons, text, results).
   =================================================================== */

var _app = null;
var _timerInterval = null;
var _timerRemaining = 0;
var _voteHistoryOpen = false;
var _canvasReady = false;
var _lastRenderedPhase = null;
var _lastCenterHtml = null;

/* ══════════════════════════════════════
   SHARED HELPERS
   ══════════════════════════════════════ */

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function playerName(id, players) {
  for (var i = 0; i < players.length; i++) {
    if (players[i].id === id) return players[i].name || id;
  }
  return id;
}

function unwrapAction(option) {
  if (option && typeof option === 'object' && option.decision !== undefined) return option.decision;
  if (option && typeof option === 'object' && option.action !== undefined) return option.action;
  return option;
}

var PHASE_LABELS = {
  roleReveal: 'Role Reveal',
  day_discussion: function(r) { return 'Day ' + r + ' \u2014 Discussion'; },
  day_vote: function(r) { return 'Day ' + r + ' \u2014 Vote'; },
  day_result: function(r) { return 'Day ' + r + ' \u2014 Result'; },
  night: function(r) { return 'Night ' + r; },
  night_result: function(r) { return 'Night ' + r + ' \u2014 Result'; },
  gameOver: 'Game Over'
};

function phaseLabel(phase, round) {
  var label = PHASE_LABELS[phase];
  if (!label) return phase;
  return typeof label === 'function' ? label(round) : label;
}

var ROLE_DESCS = {
  werewolf: 'Choose a villager to eliminate each night. Blend in by day.',
  seer: 'Investigate one player each night to learn their true role.',
  doctor: 'Protect one player each night from the werewolves.',
  villager: 'Find and eliminate the werewolves before they outnumber you.'
};

/* ══════════════════════════════════════
   TIMER
   ══════════════════════════════════════ */

function startTimer(seconds) {
  if (_timerInterval) clearInterval(_timerInterval);
  _timerRemaining = seconds || 0;
  renderTimer();
  _timerInterval = setInterval(tickTimer, 1000);
}

function renderTimer() {
  var remaining = Math.max(0, _timerRemaining);
  var el = document.getElementById('timer-display');
  if (el) {
    el.textContent = remaining + 's';
    el.classList.toggle('urgent', remaining <= 5);
  }
  var ring = document.querySelector('#timer-ring circle.progress');
  if (ring && ring._totalSeconds) {
    var circ = parseFloat(ring.getAttribute('data-circ') || 0);
    ring.style.strokeDashoffset = circ * (1 - remaining / ring._totalSeconds);
  }
}

function tickTimer() {
  renderTimer();
  if (_timerRemaining > 0) _timerRemaining--;
}

/* ══════════════════════════════════════
   HTML BUILDERS (small, composable)
   ══════════════════════════════════════ */

function buildSeerHistory(history, players) {
  if (!history || history.length === 0) return '';
  var h = '<div class="seer-history"><div class="seer-history-title">Investigations</div>';
  for (var i = 0; i < history.length; i++) {
    var e = history[i];
    var cls = e.role === 'werewolf' ? 'seer-entry-wolf' : 'seer-entry-safe';
    h += '<div class="seer-entry"><span class="seer-entry-name">' + esc(playerName(e.target, players)) + '</span> <span class="' + cls + '">' + esc(e.role) + '</span></div>';
  }
  return h + '</div>';
}

function buildVoteHistory(history, players) {
  if (!history || history.length === 0) return '';
  var h = '<button class="vh-toggle" id="vh-toggle">' + (_voteHistoryOpen ? '\u25BC' : '\u25B6') + ' Votes (' + history.length + ')</button>';
  h += '<div class="vh-content' + (_voteHistoryOpen ? ' open' : '') + '" id="vh-content">';
  for (var r = 0; r < history.length; r++) {
    var e = history[r];
    var vkeys = Object.keys(e.votes);
    var parts = [];
    for (var v = 0; v < vkeys.length; v++) {
      var tgt = e.votes[vkeys[v]];
      parts.push(esc(playerName(vkeys[v], players)) + '\u2192' + esc(tgt === 'skip' ? 'skip' : playerName(tgt, players)));
    }
    h += '<div>R' + e.round + ': ' + parts.join(', ');
    if (e.eliminated) h += ' <span style="color:#ef4444">' + esc(playerName(e.eliminated, players)) + ' out</span>';
    h += '</div>';
  }
  return h + '</div>';
}

function buildTimerRing() {
  var r = 60;
  var circ = 2 * Math.PI * r;
  return '<svg id="timer-ring" width="' + (r*2+8) + '" height="' + (r*2+8) + '">' +
    '<circle class="track" cx="' + (r+4) + '" cy="' + (r+4) + '" r="' + r + '"/>' +
    '<circle class="progress" cx="' + (r+4) + '" cy="' + (r+4) + '" r="' + r + '" ' +
    'stroke-dasharray="' + circ + '" stroke-dashoffset="0" data-circ="' + circ + '" ' +
    'transform="rotate(-90 ' + (r+4) + ' ' + (r+4) + ')"/></svg>';
}

/* ══════════════════════════════════════
   PHASE RENDERERS (dispatch table)
   ══════════════════════════════════════ */

var PhaseView = {
  roleReveal: function(ctx) {
    if (ctx.isSpectator || ctx.isDead) return '<div class="result-text" style="color:#94a3b8">Roles are being revealed...</div>';
    var role = ctx.myRole;
    var color = C.roleCss(role);
    var h = '<div class="role-card" id="role-card"><div class="role-card-inner">' +
      '<div class="role-card-face">?</div>' +
      '<div class="role-card-back" style="color:' + color + ';border:2px solid ' + color + '">' + esc(role.toUpperCase()) +
      '<div style="font-size:11px;font-weight:400;color:#94a3b8;margin-top:4px">' + (ROLE_DESCS[role] || '') + '</div>' +
      '</div></div></div>';
    if (role === 'werewolf' && ctx.view.werewolves) {
      var names = [];
      for (var i = 0; i < ctx.view.werewolves.length; i++) {
        if (ctx.view.werewolves[i] !== ctx.myId) names.push(esc(playerName(ctx.view.werewolves[i], ctx.players)));
      }
      if (names.length > 0) h += '<div style="color:#ef4444;font-size:13px;font-weight:600;margin-top:8px">Pack: ' + names.join(', ') + '</div>';
    }
    return h;
  },

  day_discussion: function(ctx) {
    var h = buildTimerRing() + '<div class="discuss-hint">Discuss in chat</div>';
    if (ctx.myRole && !ctx.isDead) h += '<div style="font-size:12px;color:' + C.roleCss(ctx.myRole) + ';margin-top:4px;font-weight:700">' + esc(ctx.myRole) + '</div>';
    if (ctx.myRole === 'seer') h += buildSeerHistory(ctx.view.seerHistory, ctx.players);
    return h;
  },

  day_vote: function() { return ''; }, /* actions handled in tray */

  day_result: function(ctx) {
    if (ctx.view.eliminated) {
      var name = playerName(ctx.view.eliminated, ctx.players);
      var role = ctx.view.eliminatedRole || 'unknown';
      return '<div class="result-text result-kill">' + esc(name) + ' was eliminated!</div>' +
        '<div class="result-sub" style="color:' + C.roleCss(role) + '">' + esc(role).toUpperCase() + '</div>';
    }
    return '<div class="result-text result-none">No one was eliminated.</div>';
  },

  night: function(ctx) {
    if (ctx.isSpectator || ctx.isDead) {
      return '<div class="result-text" style="color:#6366f1">Night Falls</div><div class="result-sub">Watching the action unfold...</div>';
    }
    var role = ctx.myRole;
    if (role === 'werewolf' && ctx.view.myWolfVote) return '<div class="result-text" style="color:#ef4444">Target chosen</div><div class="result-sub">Waiting for others...</div>';
    if (role === 'seer' && ctx.view.seerTarget) {
      var sr = ctx.view.seerResult;
      return '<div class="result-text" style="color:' + C.roleCss(sr) + '">' + esc(playerName(ctx.view.seerTarget, ctx.players)) + ' is ' + esc(sr) + '</div>' + buildSeerHistory(ctx.view.seerHistory, ctx.players);
    }
    if (role === 'doctor' && ctx.actions.length === 0) return '<div class="result-text" style="color:#22c55e">Protection sent</div>';
    if (role === 'villager') return '<div style="font-size:24px;margin-bottom:8px">\uD83C\uDF19</div><div class="result-sub">The village sleeps...</div>';
    return '';
  },

  night_result: function(ctx) {
    if (ctx.view.nightKill) {
      var name = playerName(ctx.view.nightKill, ctx.players);
      var role = ctx.view.killedRole || (ctx.view.roles && ctx.view.roles[ctx.view.nightKill]) || null;
      var h = '<div class="result-text result-kill">' + esc(name) + ' was killed!</div>';
      if (role) h += '<div class="result-sub" style="color:' + C.roleCss(role) + '">' + esc(role).toUpperCase() + '</div>';
      return h;
    }
    return '<div class="result-text result-save">Nobody died!</div><div class="result-sub">The doctor saved them.</div>';
  },

  gameOver: function(ctx) {
    var wolves = 0;
    if (ctx.view.roles && ctx.view.alive) {
      var pids = ctx.view.players || [];
      for (var i = 0; i < pids.length; i++) {
        if (ctx.view.alive[pids[i]] && ctx.view.roles[pids[i]] === 'werewolf') wolves++;
      }
    }
    return wolves > 0
      ? '<div class="gameover-title wolves">The Werewolves Win</div>'
      : '<div class="gameover-title village">The Village Survives</div>';
  }
};

/* ══════════════════════════════════════
   RENDER DOM (called by SceneDirector)
   ══════════════════════════════════════ */

function renderDom(view, legalActions, context) {
  legalActions = (legalActions || []).map(unwrapAction);
  var phase = view.phase;
  var players = context.players || [];
  var myId = context.myId;
  var isSpectator = !myId || (view.players || []).indexOf(myId) === -1;
  var isDead = myId && view.alive && !view.alive[myId];
  var myRole = view.myRole || null;

  /* Filter system actions from visible list */
  var actions = [];
  for (var i = 0; i < legalActions.length; i++) {
    if (legalActions[i].type !== 'advance_phase') actions.push(legalActions[i]);
  }

  /* Phase header + timer */
  document.getElementById('phase-label').textContent = phaseLabel(phase, view.round);
  if (phase !== _lastRenderedPhase) {
    if (playgent.sound) {
      if (phase === 'roleReveal') playgent.sound('info.secret');
      else if (phase === 'night') playgent.sound('phase.night');
      else if (phase === 'day_discussion' || phase === 'day_vote') playgent.sound('phase.day');
      else if (phase === 'day_result' || phase === 'night_result') playgent.sound('info.reveal');
      else if (phase === 'gameOver') playgent.sound(context.gameOver && context.gameOver.winners && context.gameOver.winners.indexOf(myId) !== -1 ? 'game.victory' : (myId ? 'game.defeat' : 'game.over'));
      else playgent.sound('phase.change');
    }
    startTimer(C.PHASE_TIMEOUTS[phase] || 0);
    _lastRenderedPhase = phase;
  }

  /* No-canvas fallback */
  if (!_canvasReady) {
    document.body.classList.toggle('phase-night', phase === 'night' || phase === 'night_result');
    document.body.classList.toggle('phase-day', C.isDay(phase));
  }

  /* Center content: dispatch to phase renderer */
  var ctx = { view: view, players: players, myId: myId, myRole: myRole, isSpectator: isSpectator, isDead: isDead, actions: actions };
  var renderer = PhaseView[phase];
  var centerHtml = renderer ? renderer(ctx) : '';
  if (centerHtml !== _lastCenterHtml) {
    document.getElementById('center-content').innerHTML = centerHtml;
    _lastCenterHtml = centerHtml;
  }

  /* Wire role card flip */
  var card = document.getElementById('role-card');
  if (card && !card._wired) { card._wired = true; setTimeout(function() { card.classList.add('flipped'); }, 600); }

  /* Wire timer ring */
  var ring = document.querySelector('#timer-ring circle.progress');
  if (ring) {
    ring._totalSeconds = C.PHASE_TIMEOUTS[phase] || 90;
    renderTimer();
  }

  /* Vote history */
  var vhArea = document.getElementById('vote-history-area');
  if (phase !== 'roleReveal' && view.voteHistory && view.voteHistory.length > 0) {
    vhArea.innerHTML = buildVoteHistory(view.voteHistory, players);
    var toggle = document.getElementById('vh-toggle');
    if (toggle) toggle.addEventListener('click', function() {
      _voteHistoryOpen = !_voteHistoryOpen;
      var c = document.getElementById('vh-content');
      if (c) c.classList.toggle('open', _voteHistoryOpen);
      toggle.textContent = (_voteHistoryOpen ? '\u25BC' : '\u25B6') + ' Votes (' + view.voteHistory.length + ')';
    });
  } else {
    vhArea.innerHTML = '';
  }

  /* Action tray */
  var tray = document.getElementById('action-tray');
  tray.innerHTML = buildActionTray(phase, view, actions, myRole, isDead, isSpectator, players);
  wireActionButtons(tray, actions);

  /* Data attributes */
  var overlay = document.getElementById('dom-overlay');
  overlay.setAttribute('data-phase', phase || 'unknown');
  overlay.setAttribute('data-status', actions.length > 0 ? 'your-turn' : (context.gameOver ? 'game-over' : 'waiting'));
}

function buildActionTray(phase, view, actions, myRole, isDead, isSpectator, players) {
  if (isDead || isSpectator) return '';

  if (phase === 'day_vote') {
    if (view.myVote !== undefined) {
      var name = view.myVote === 'skip' ? 'Skip' : playerName(view.myVote, players);
      return '<div style="text-align:center;color:#a855f7;font-weight:700;font-size:14px;pointer-events:none">Voted: ' + esc(name) + '</div>';
    }
    var h = '';
    for (var i = 0; i < actions.length; i++) {
      if (actions[i].type !== 'day_vote') continue;
      var tgt = actions[i].target;
      var label = tgt === 'skip' ? 'Skip Vote' : playerName(tgt, players);
      var cls = tgt === 'skip' ? 'ww-btn skip' : 'ww-btn';
      h += '<button class="' + cls + '" data-action-idx="' + i + '">' + esc(label) + '</button>';
    }
    if (myRole === 'seer') h += buildSeerHistory(view.seerHistory, players);
    return h;
  }

  if (phase === 'night' && actions.length > 0) {
    var roleClass = myRole === 'werewolf' ? 'wolf' : myRole === 'seer' ? 'seer' : 'doctor';
    var actionWord = myRole === 'werewolf' ? 'Target' : myRole === 'seer' ? 'Investigate' : 'Protect';
    var h2 = '<div style="text-align:center;color:' + C.roleCss(myRole) + ';font-size:13px;font-weight:700;margin-bottom:4px;pointer-events:none">' + actionWord + '</div>';
    for (var j = 0; j < actions.length; j++) {
      h2 += '<button class="ww-btn ' + roleClass + '" data-action-idx="' + j + '">' + esc(playerName(actions[j].target, players)) + '</button>';
    }
    if (myRole === 'doctor' && view.lastDoctorTarget) {
      h2 += '<div style="font-size:11px;color:#64748b;text-align:center;pointer-events:none">Cannot protect ' + esc(playerName(view.lastDoctorTarget, players)) + ' again</div>';
    }
    return h2;
  }

  return '';
}

function wireActionButtons(tray, actions) {
  var btns = tray.querySelectorAll('[data-action-idx]');
  for (var i = 0; i < btns.length; i++) {
    (function(btn) {
      btn.addEventListener('click', function() {
        var idx = parseInt(btn.getAttribute('data-action-idx'), 10);
        if (actions[idx]) {
          if (playgent.sound) {
            if (actions[idx].type === 'day_vote') playgent.sound('social.vote');
            else if (actions[idx].type === 'werewolf_kill') playgent.sound('combat.attack');
            else if (actions[idx].type === 'seer_investigate') playgent.sound('info.secret');
            else if (actions[idx].type === 'doctor_protect') playgent.sound('magic.shield');
            else playgent.sound('ui.confirm');
          }
          playgent.submitAction(actions[idx]);
        }
      });
    })(btns[i]);
  }
}

/* ══════════════════════════════════════
   PIXI INITIALIZATION
   ══════════════════════════════════════ */

function initCanvas() {
  var container = document.getElementById('canvas-container');
  var app = new PIXI.Application();
  _app = app;

  return app.init({
    resizeTo: container, antialias: true,
    resolution: Math.min(window.devicePixelRatio || 1, 2),
    autoDensity: true, backgroundAlpha: 0,
  }).then(function() {
    container.appendChild(app.canvas);
    _canvasReady = true;

    var w = app.screen.width;
    var h = app.screen.height;

    var world = new PIXI.Container();
    world.label = 'gameWorld';
    app.stage.addChild(world);

    var atmoLayer = new PIXI.Container();
    var voteLayer = new PIXI.Container();
    var fxLayer = new PIXI.Container();
    fxLayer.interactiveChildren = false;
    world.addChild(atmoLayer, voteLayer, fxLayer);

    Atmosphere.create(atmoLayer, w, h);
    VoteLines.create(voteLayer);
    Effects.create(fxLayer, world);
    SceneDirector._w = w;
    SceneDirector._h = h;

    app.ticker.add(function(ticker) {
      var dt = ticker.deltaTime;
      Tween.update(dt);
      Atmosphere.update(dt);
      Effects.update(dt);
      VoteLines.update();
    });

    var resizeTimer = null;
    app.renderer.on('resize', function(rw, rh) {
      if (resizeTimer) clearTimeout(resizeTimer);
      resizeTimer = setTimeout(function() {
        PlayerCircle.recalculate();
        VoteLines.redraw();
        Atmosphere.resize(rw, rh);
        SceneDirector.resize(rw, rh);
      }, 100);
    });
  });
}

/* ══════════════════════════════════════
   BOOTSTRAP
   ══════════════════════════════════════ */

PlayerCircle.create(document.getElementById('dom-overlay'));
PlayerCircle._w = window.innerWidth;
PlayerCircle._h = window.innerHeight;

SceneDirector._renderDom = renderDom;
SceneDirector._w = window.innerWidth;
SceneDirector._h = window.innerHeight;

try { initCanvas().catch(function() { document.body.classList.add('no-canvas'); }); }
catch (e) { document.body.classList.add('no-canvas'); }

playgent.onStateChange(function(view, legalActions, context) {
  SceneDirector.handleStateChange(view, legalActions, context);
});
</script>
