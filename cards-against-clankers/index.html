<style>
  * {
    box-sizing: border-box;
  }

  :root {
    --ink: #090909;
    --paper: #f7f1df;
    --paper-2: #efe2bf;
    --acid: #b8ff2c;
    --cyan: #37d8ff;
    --red: #ff3f4f;
    --amber: #ffb21e;
    --violet: #8f5cff;
    --steel: #2a3036;
    --muted: #9ba2a8;
    --line: rgba(247, 241, 223, 0.18);
  }

  html,
  body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background:
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(0deg, rgba(255,255,255,0.018) 1px, transparent 1px),
      radial-gradient(circle at 50% 0%, #34312b 0%, #111315 42%, #050505 100%);
    background-size: 34px 34px, 34px 34px, 100% 100%;
    color: var(--paper);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  button,
  input {
    font: inherit;
  }

  button {
    -webkit-tap-highlight-color: transparent;
  }

  .shell {
    width: 100%;
    height: 100dvh;
    min-height: 100dvh;
    display: grid;
    grid-template-rows: max-content max-content minmax(0, 1fr);
    overflow: hidden;
    position: relative;
  }

  .shell::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.14;
    background:
      repeating-linear-gradient(0deg, transparent 0, transparent 6px, rgba(255,255,255,0.16) 7px),
      linear-gradient(120deg, transparent 0 28%, rgba(184,255,44,0.25) 28.2% 28.6%, transparent 29%);
    mix-blend-mode: screen;
  }

  .topbar {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: center;
    gap: 12px;
    padding: 12px 16px 8px;
    border-bottom: 1px solid var(--line);
    background: rgba(5, 5, 5, 0.72);
    backdrop-filter: blur(10px);
  }

  .brand {
    min-width: 0;
  }

  .kicker {
    color: var(--acid);
    font-size: 10px;
    line-height: 1;
    font-weight: 900;
    letter-spacing: 0;
    text-transform: uppercase;
  }

  .title {
    margin-top: 4px;
    color: var(--paper);
    font-size: clamp(18px, 3.6vw, 34px);
    line-height: 1;
    font-weight: 950;
    letter-spacing: 0;
    text-transform: uppercase;
    text-shadow: 0 0 22px rgba(55, 216, 255, 0.28);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .roundbox {
    display: grid;
    justify-items: end;
    gap: 4px;
    color: var(--paper);
    font-weight: 850;
    font-size: 12px;
    white-space: nowrap;
  }

  .judge-pill {
    min-height: 28px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    border: 1px solid rgba(255, 178, 30, 0.55);
    background: rgba(255, 178, 30, 0.12);
    color: var(--amber);
    font-size: 12px;
    font-weight: 900;
    text-transform: uppercase;
  }

  .score-strip {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 8px 16px;
    min-height: 48px;
    overflow: hidden;
    border-bottom: 1px solid var(--line);
    background: rgba(14, 15, 16, 0.82);
  }

  .score-pill {
    min-width: 0;
    height: 31px;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 4px 8px 4px 4px;
    border: 1px solid rgba(247, 241, 223, 0.16);
    background: rgba(247, 241, 223, 0.07);
    color: var(--paper);
    font-size: 12px;
    font-weight: 800;
    white-space: nowrap;
  }

  .score-pill.me {
    border-color: rgba(55, 216, 255, 0.72);
    box-shadow: 0 0 0 1px rgba(55, 216, 255, 0.12), 0 0 20px rgba(55, 216, 255, 0.14);
  }

  .avatar {
    width: 23px;
    height: 23px;
    display: inline-grid;
    place-items: center;
    background: var(--steel);
    color: #fff;
    font-size: 11px;
    line-height: 1;
    font-weight: 950;
  }

  .score-name {
    max-width: 82px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .score-value {
    color: var(--acid);
    font-variant-numeric: tabular-nums;
  }

  .arena {
    position: relative;
    z-index: 1;
    min-height: 0;
    display: grid;
    grid-template-columns: minmax(270px, 0.82fr) minmax(350px, 1.18fr);
    gap: 16px;
    padding: 16px;
    overflow: hidden;
  }

  .prompt-zone,
  .play-zone {
    min-height: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .prompt-card {
    position: relative;
    min-height: 288px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 18px;
    padding: 24px;
    background: #030303;
    border: 1px solid #333;
    color: #fff;
    box-shadow:
      0 20px 45px rgba(0,0,0,0.38),
      inset 0 0 0 5px #0b0b0b,
      inset 0 0 0 6px rgba(247,241,223,0.11);
    transform: rotate(-1.2deg);
    overflow: hidden;
  }

  .prompt-card::after {
    content: "CAC";
    position: absolute;
    right: 18px;
    bottom: 12px;
    color: rgba(255,255,255,0.12);
    font-size: 52px;
    font-weight: 950;
    letter-spacing: 0;
  }

  .prompt-label {
    color: var(--acid);
    font-size: 11px;
    font-weight: 950;
    text-transform: uppercase;
  }

  .prompt-text {
    position: relative;
    z-index: 1;
    font-size: clamp(21px, 4.4vw, 38px);
    line-height: 1.05;
    font-weight: 950;
    letter-spacing: 0;
  }

  .blank {
    color: var(--acid);
    text-shadow: 0 0 18px rgba(184, 255, 44, 0.45);
  }

  .pick-tag {
    position: relative;
    z-index: 1;
    align-self: flex-start;
    padding: 8px 10px;
    color: #050505;
    background: var(--acid);
    font-size: 12px;
    line-height: 1;
    font-weight: 950;
    text-transform: uppercase;
  }

  .status-stack {
    display: grid;
    gap: 9px;
    padding-top: 4px;
  }

  .phase-line {
    color: var(--paper-2);
    font-size: 14px;
    font-weight: 800;
  }

  .phase-line strong {
    color: var(--cyan);
  }

  .submit-track {
    display: flex;
    gap: 7px;
    flex-wrap: wrap;
  }

  .submit-dot {
    width: 28px;
    height: 28px;
    display: inline-grid;
    place-items: center;
    border: 1px solid rgba(247, 241, 223, 0.2);
    background: rgba(247, 241, 223, 0.06);
    color: var(--muted);
    font-size: 10px;
    font-weight: 950;
  }

  .submit-dot.done {
    color: #050505;
    background: var(--acid);
    border-color: var(--acid);
    box-shadow: 0 0 18px rgba(184, 255, 44, 0.22);
  }

  .panel-title {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    color: var(--paper);
    font-size: 13px;
    font-weight: 950;
    text-transform: uppercase;
  }

  .micro {
    color: var(--muted);
    font-size: 12px;
    font-weight: 800;
    text-transform: none;
  }

  .hand-grid,
  .answer-grid {
    min-height: 0;
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 9px;
  }

  .hand-card,
  .answer-card {
    min-width: 0;
    min-height: 112px;
    position: relative;
    padding: 12px;
    border: 1px solid rgba(0,0,0,0.22);
    background: var(--paper);
    color: #111;
    text-align: left;
    font-size: 14px;
    line-height: 1.18;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 12px 26px rgba(0,0,0,0.28);
    transition: transform 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
  }

  .hand-card:nth-child(2n) {
    transform: rotate(0.7deg);
  }

  .hand-card:nth-child(3n) {
    transform: rotate(-0.7deg);
  }

  .hand-card:active,
  .answer-card:active {
    transform: scale(0.98);
  }

  .hand-card.selected {
    color: #050505;
    border-color: var(--acid);
    box-shadow: 0 0 0 3px rgba(184,255,44,0.5), 0 18px 36px rgba(0,0,0,0.4);
  }

  .select-badge {
    position: absolute;
    right: 8px;
    bottom: 8px;
    width: 24px;
    height: 24px;
    display: none;
    place-items: center;
    color: #050505;
    background: var(--acid);
    font-size: 12px;
    font-weight: 950;
  }

  .hand-card.selected .select-badge {
    display: grid;
  }

  .action-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: center;
    gap: 10px;
  }

  .locked-copy {
    color: var(--paper-2);
    font-size: 14px;
    line-height: 1.3;
    font-weight: 750;
  }

  .primary-btn {
    min-height: 48px;
    min-width: 150px;
    border: 0;
    padding: 0 16px;
    color: #050505;
    background: var(--acid);
    font-size: 13px;
    font-weight: 950;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 12px 28px rgba(184, 255, 44, 0.22);
  }

  .primary-btn:disabled {
    color: rgba(247,241,223,0.5);
    background: rgba(247,241,223,0.12);
    box-shadow: none;
    cursor: default;
  }

  .answer-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .answer-card {
    min-height: 110px;
    background: #111;
    color: var(--paper);
    border-color: rgba(247,241,223,0.16);
  }

  .answer-card.winner {
    border-color: var(--acid);
    box-shadow: 0 0 0 2px rgba(184,255,44,0.55), 0 20px 42px rgba(184,255,44,0.18);
  }

  .answer-card.selectable:hover,
  .answer-card.selected {
    border-color: var(--cyan);
    box-shadow: 0 0 0 2px rgba(55,216,255,0.42), 0 16px 35px rgba(0,0,0,0.32);
  }

  .option-kicker {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    color: var(--cyan);
    font-size: 11px;
    font-weight: 950;
    text-transform: uppercase;
  }

  .author-chip {
    color: #050505;
    background: var(--amber);
    padding: 3px 6px;
    font-size: 10px;
    font-weight: 950;
  }

  .answer-line + .answer-line {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid rgba(247,241,223,0.16);
  }

  .waiting-block {
    min-height: 224px;
    display: grid;
    place-items: center;
    padding: 24px;
    border: 1px dashed rgba(247,241,223,0.24);
    background:
      linear-gradient(135deg, rgba(255,63,79,0.13), transparent 45%),
      rgba(247,241,223,0.045);
    color: var(--paper-2);
    text-align: center;
    font-size: 18px;
    line-height: 1.25;
    font-weight: 900;
  }

  .leaderboard {
    display: grid;
    gap: 9px;
  }

  .leader-row {
    min-height: 54px;
    display: grid;
    grid-template-columns: 42px minmax(0, 1fr) auto;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border: 1px solid rgba(247,241,223,0.16);
    background: rgba(247,241,223,0.07);
    font-weight: 900;
  }

  .rank {
    color: var(--amber);
    font-size: 18px;
    font-weight: 950;
  }

  .leader-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .leader-score {
    color: var(--acid);
    font-size: 18px;
    font-variant-numeric: tabular-nums;
  }

  .confetti {
    position: fixed;
    top: -12px;
    width: 8px;
    height: 12px;
    z-index: 30;
    pointer-events: none;
    animation: fall 2600ms linear forwards;
  }

  @keyframes fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(104vh) rotate(540deg); opacity: 0; }
  }

  .hidden-roster {
    display: none;
  }

  @media (max-width: 760px) {
    .topbar {
      padding: 10px 11px 7px;
      grid-template-columns: minmax(0, 1fr) auto;
    }

    .title {
      font-size: 18px;
    }

    .kicker {
      font-size: 9px;
    }

    .score-strip {
      padding: 6px 10px;
      gap: 5px;
      min-height: 42px;
    }

    .score-pill {
      height: 28px;
      gap: 5px;
      padding-right: 6px;
      font-size: 11px;
    }

    .score-name {
      display: none;
    }

    .arena {
      grid-template-columns: 1fr;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 10px;
      padding: 10px;
    }

    .prompt-zone {
      gap: 8px;
    }

    .prompt-card {
      min-height: 188px;
      padding: 18px;
      transform: rotate(-0.7deg);
    }

    .prompt-card::after {
      font-size: 38px;
    }

    .prompt-text {
      font-size: 24px;
      line-height: 1.04;
    }

    .phase-line {
      font-size: 12px;
    }

    .submit-dot {
      width: 24px;
      height: 24px;
      font-size: 9px;
    }

    .play-zone {
      gap: 9px;
      overflow: hidden;
    }

    .hand-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
    }

    .hand-card {
      min-height: 68px;
      padding: 9px;
      font-size: 12px;
      line-height: 1.12;
      box-shadow: 0 8px 18px rgba(0,0,0,0.24);
    }

    .answer-grid {
      grid-template-columns: 1fr;
      gap: 7px;
    }

    .answer-card {
      min-height: 64px;
      padding: 9px;
      font-size: 12px;
      line-height: 1.13;
    }

    .option-kicker {
      margin-bottom: 5px;
      font-size: 10px;
    }

    .action-row {
      grid-template-columns: 1fr;
      gap: 7px;
    }

    .primary-btn {
      width: 100%;
      min-height: 44px;
    }

    .waiting-block {
      min-height: 142px;
      padding: 16px;
      font-size: 15px;
    }
  }

  @media (max-width: 390px) {
    .prompt-text {
      font-size: 22px;
    }

    .hand-card {
      font-size: 11px;
    }
  }
</style>

<div class="shell" id="shell">
  <div class="topbar">
    <div class="brand">
      <div class="kicker">Clankerfights after dark</div>
      <div class="title">Cards Against Clankers</div>
    </div>
    <div class="roundbox">
      <div id="round-label">Round 1/8</div>
      <div class="judge-pill" id="judge-label">Judge</div>
    </div>
  </div>
  <div class="score-strip" id="score-strip"></div>
  <main class="arena" id="arena" data-phase="" data-status="">
    <section class="prompt-zone">
      <div class="prompt-card">
        <div class="prompt-label">Black card</div>
        <div class="prompt-text" id="prompt-text"></div>
        <div class="pick-tag" id="pick-tag">Pick 1</div>
      </div>
      <div class="status-stack">
        <div class="phase-line" id="phase-line"></div>
        <div class="submit-track" id="submit-track"></div>
      </div>
    </section>
    <section class="play-zone" id="play-zone"></section>
  </main>
  <div class="hidden-roster" id="hidden-roster"></div>
</div>

<script>
(function() {
  var E2E_GAME_SLUG = "cards-against-clankers";
  var E2E = window.__playgentE2EState || {
    version: 1,
    regions: [],
    lastPhase: "loading",
    lastStatus: "loading",
    lastPlayerId: "",
    lastCurrentPlayer: "",
    lastLegalActionCount: 0,
    lastVisibleLegalActionCount: 0,
    lastActions: [],
    lastRawActions: []
  };
  window.__playgentE2EState = E2E;

  function setE2EAttr(el, name, value) {
    if (!el) return;
    el.setAttribute(name, value == null ? "" : String(value));
  }

  function unwrapE2EAction(option) {
    if (option && typeof option === "object" && option.decision !== undefined) return option.decision;
    if (option && typeof option === "object" && option.action !== undefined) return option.action;
    return option;
  }

  function isVisibleE2EAction(action) {
    action = unwrapE2EAction(action);
    if (!action || typeof action !== "object") return false;
    if (action.type === "advance_phase" || action.type === "system" || action.type === "noop") return false;
    return true;
  }

  function getVisibleE2EActions(actions) {
    var out = [];
    for (var i = 0; actions && i < actions.length; i++) {
      if (isVisibleE2EAction(actions[i])) out.push(unwrapE2EAction(actions[i]));
    }
    return out;
  }

  function ensureE2ETelemetry() {
    var el = document.getElementById("e2e-telemetry");
    if (!el) {
      el = document.createElement("div");
      el.id = "e2e-telemetry";
      if (document.body) document.body.appendChild(el);
    }
    el.setAttribute("aria-hidden", "true");
    el.style.cssText = "position:fixed;width:1px;height:1px;overflow:hidden;opacity:0;pointer-events:none;left:0;top:0;";
    setE2EAttr(el, "data-game", E2E_GAME_SLUG);
    setE2EAttr(el, "data-phase", E2E.lastPhase);
    setE2EAttr(el, "data-status", E2E.lastStatus);
    setE2EAttr(el, "data-player", E2E.lastPlayerId || "spectator");
    return el;
  }

  function addUnique(list, el) {
    if (!el) return;
    for (var i = 0; i < list.length; i++) if (list[i] === el) return;
    list.push(el);
  }

  function getE2ERoots() {
    var roots = [];
    addUnique(roots, ensureE2ETelemetry());
    addUnique(roots, document.getElementById("telemetry"));
    addUnique(roots, document.getElementById("game"));
    addUnique(roots, document.getElementById("game-container"));
    addUnique(roots, document.querySelector("[data-board]"));
    return roots;
  }

  function getCurrentPlayerE2E(view) {
    if (!view) return "";
    return view.currentPlayer || view.currentPlayerId || view.currentActor || view.turn || "";
  }

  function updateE2EPlayers(players) {
    var telemetry = ensureE2ETelemetry();
    var host = document.getElementById("e2e-players");
    if (!host) {
      host = document.createElement("div");
      host.id = "e2e-players";
      telemetry.appendChild(host);
    }
    host.textContent = "";
    for (var i = 0; players && i < players.length; i++) {
      var p = players[i] || {};
      var span = document.createElement("span");
      setE2EAttr(span, "data-player", p.id || "");
      setE2EAttr(span, "data-player-name", p.name || p.id || "");
      span.textContent = p.name || p.id || "";
      host.appendChild(span);
    }
  }

  function updateE2ELandmarks(view, legalActions, context) {
    var visibleActions = getVisibleE2EActions(legalActions || []);
    var phase = context && context.gameOver ? "game-over" : (view && (view.phase || view.mode || view.stage) ? (view.phase || view.mode || view.stage) : "playing");
    var status = context && context.gameOver ? "game-over" : (visibleActions.length > 0 ? "your-turn" : "waiting");
    var playerId = context && context.myId ? context.myId : "spectator";
    var currentPlayer = getCurrentPlayerE2E(view);
    var roots = getE2ERoots();
    E2E.lastPhase = phase;
    E2E.lastStatus = status;
    E2E.lastPlayerId = playerId;
    E2E.lastCurrentPlayer = currentPlayer;
    E2E.lastRawActions = legalActions || [];
    E2E.lastActions = visibleActions;
    E2E.lastLegalActionCount = (legalActions || []).length;
    E2E.lastVisibleLegalActionCount = visibleActions.length;
    for (var i = 0; i < roots.length; i++) {
      setE2EAttr(roots[i], "data-game", E2E_GAME_SLUG);
      setE2EAttr(roots[i], "data-phase", phase);
      setE2EAttr(roots[i], "data-status", status);
      setE2EAttr(roots[i], "data-player", playerId);
      setE2EAttr(roots[i], "data-current-player", currentPlayer);
      if (view && view.round != null) setE2EAttr(roots[i], "data-round", view.round);
      if (view && view.turnNumber != null) setE2EAttr(roots[i], "data-turn", view.turnNumber);
    }
    updateE2EPlayers(context && context.players ? context.players : []);
  }

  function actionTypeForIndex(idx) {
    var raw = E2E.lastRawActions && E2E.lastRawActions[idx] ? unwrapE2EAction(E2E.lastRawActions[idx]) : null;
    return raw && raw.type ? raw.type : "choose";
  }

  function safeLabelFromNode(node) {
    var label = node.getAttribute("data-action-label") || node.getAttribute("aria-label") || node.title || node.textContent || node.value || "";
    return String(label).replace(/\s+/g, " ").trim().slice(0, 100);
  }

  function decorateE2EDOMControls() {
    var nodes = document.querySelectorAll("[data-action-idx], [data-action], button, [role='button'], input[type='button'], input[type='submit'], input:not([type='hidden']), select, textarea, [data-cell], [data-card], [data-card-id], [data-option-id], [data-brainrot], canvas");
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      if (node.hasAttribute("data-action") && !node.hasAttribute("data-action-idx")) {
        node.setAttribute("data-action-idx", node.getAttribute("data-action"));
      }
      if (node.hasAttribute("data-action-idx")) {
        var idx = parseInt(node.getAttribute("data-action-idx"), 10);
        if (!isNaN(idx) && !node.hasAttribute("data-action-type")) node.setAttribute("data-action-type", actionTypeForIndex(idx));
        if (!node.hasAttribute("data-action-label")) node.setAttribute("data-action-label", safeLabelFromNode(node));
      }
      if (node.hasAttribute("data-cell") && !node.getAttribute("aria-label")) {
        node.setAttribute("aria-label", "cell " + node.getAttribute("data-cell"));
      }
      if ((node.hasAttribute("data-card") || node.hasAttribute("data-card-id")) && !node.getAttribute("aria-label")) {
        node.setAttribute("aria-label", "card " + (node.getAttribute("data-card") || node.getAttribute("data-card-id")));
      }
      if (node.tagName === "CANVAS" && !node.getAttribute("aria-label")) {
        node.setAttribute("aria-label", E2E_GAME_SLUG + " canvas");
      }
    }
  }

  function e2eBeginFrame(view, legalActions, context) {
    E2E.regions = [];
    updateE2ELandmarks(view || {}, legalActions || [], context || {});
  }

  function e2eAfterRender() {
    decorateE2EDOMControls();
  }

  function isVisibleE2ENode(node) {
    if (!node || !node.getBoundingClientRect) return false;
    var rect = node.getBoundingClientRect();
    if (rect.width <= 0 || rect.height <= 0) return false;
    if (rect.right <= 0 || rect.bottom <= 0 || rect.left >= window.innerWidth || rect.top >= window.innerHeight) return false;
    var style = window.getComputedStyle ? window.getComputedStyle(node) : null;
    if (style && (style.display === "none" || style.visibility === "hidden" || style.opacity === "0")) return false;
    if (node.disabled || node.getAttribute("aria-disabled") === "true") return false;
    return true;
  }

  function regionKindForNode(node) {
    if (node.tagName === "CANVAS") return "canvas";
    if (node.tagName === "INPUT" || node.tagName === "SELECT" || node.tagName === "TEXTAREA") return "input";
    if (node.hasAttribute("data-cell")) return "cell";
    if (node.hasAttribute("data-card") || node.hasAttribute("data-card-id")) return "card";
    return "button";
  }

  function getDOMActionRegions() {
    decorateE2EDOMControls();
    var nodes = document.querySelectorAll("[data-action-idx], button, [role='button'], input[type='button'], input[type='submit'], input:not([type='hidden']), select, textarea, [data-cell], [data-card], [data-card-id], [data-option-id], [data-brainrot], canvas");
    var out = [];
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      if (!isVisibleE2ENode(node)) continue;
      var r = clipE2ERect(node.getBoundingClientRect());
      if (!r) continue;
      var id = node.id || node.getAttribute("data-action-idx") || node.getAttribute("data-cell") || node.getAttribute("data-card") || node.getAttribute("data-card-id") || node.getAttribute("data-option-id") || node.getAttribute("data-brainrot") || ("control-" + i);
      out.push({
        id: String(id),
        kind: regionKindForNode(node),
        label: safeLabelFromNode(node),
        actionType: node.getAttribute("data-action-type") || "",
        selector: node.id ? ("#" + node.id) : "",
        rect: { x: r.left, y: r.top, width: r.width, height: r.height },
        center: { x: r.left + r.width / 2, y: r.top + r.height / 2 }
      });
    }
    return out;
  }

  function clipE2ERect(rect) {
    if (!rect) return null;
    var x = Number(rect.x != null ? rect.x : rect.left) || 0;
    var y = Number(rect.y != null ? rect.y : rect.top) || 0;
    var width = Number(rect.width) || 0;
    var height = Number(rect.height) || 0;
    var left = Math.max(0, x);
    var top = Math.max(0, y);
    var right = Math.min(window.innerWidth, x + width);
    var bottom = Math.min(window.innerHeight, y + height);
    if (right - left <= 0 || bottom - top <= 0) return null;
    return { x: left, y: top, width: right - left, height: bottom - top };
  }

  function e2eRegisterRegion(region) {
    if (!region || !region.id || !region.rect) return;
    var r = clipE2ERect(region.rect);
    if (!r || r.width == null || r.height == null) return;
    var item = {
      id: String(region.id),
      kind: region.kind || "button",
      label: region.label || "",
      actionType: region.actionType || "",
      rect: { x: Number(r.x) || 0, y: Number(r.y) || 0, width: Number(r.width) || 0, height: Number(r.height) || 0 },
      center: region.center || { x: (Number(r.x) || 0) + (Number(r.width) || 0) / 2, y: (Number(r.y) || 0) + (Number(r.height) || 0) / 2 }
    };
    for (var i = 0; i < E2E.regions.length; i++) {
      if (E2E.regions[i].id === item.id) {
        E2E.regions[i] = item;
        return;
      }
    }
    E2E.regions.push(item);
  }

  function e2eCanvasRect(localRect, app) {
    var canvas = app && app.canvas ? app.canvas : document.querySelector("canvas");
    var screen = app && app.screen ? app.screen : null;
    if (!canvas || !localRect) return null;
    var canvasRect = canvas.getBoundingClientRect();
    var screenW = screen && screen.width ? screen.width : canvasRect.width;
    var screenH = screen && screen.height ? screen.height : canvasRect.height;
    var sx = canvasRect.width / (screenW || canvasRect.width || 1);
    var sy = canvasRect.height / (screenH || canvasRect.height || 1);
    return {
      x: canvasRect.left + localRect.x * sx,
      y: canvasRect.top + localRect.y * sy,
      width: localRect.width * sx,
      height: localRect.height * sy
    };
  }

  function e2ePixiBounds(displayObject, app) {
    if (!displayObject || !displayObject.getBounds) return null;
    var b = displayObject.getBounds();
    return e2eCanvasRect({ x: b.x, y: b.y, width: b.width, height: b.height }, app);
  }

  function getE2ECanvasInfo() {
    var canvas = document.querySelector("canvas");
    if (!canvas) return null;
    var rect = canvas.getBoundingClientRect();
    return { selector: "canvas", width: rect.width, height: rect.height };
  }

  function getAllE2ERegions() {
    var out = E2E.regions.slice();
    var dom = getDOMActionRegions();
    var seen = {};
    var merged = [];
    for (var i = 0; i < out.length; i++) { seen[out[i].id] = true; merged.push(out[i]); }
    for (var j = 0; j < dom.length; j++) {
      if (!seen[dom[j].id]) merged.push(dom[j]);
    }
    return merged;
  }

  function runE2ELayoutChecks() {
    var failures = [];
    var regions = getAllE2ERegions();
    var canvas = getE2ECanvasInfo();
    if (E2E.lastVisibleLegalActionCount > 0 && regions.length === 0) {
      failures.push({ severity: "error", message: "active legal actions did not create visible controls" });
    }
    if (canvas && (canvas.width <= 0 || canvas.height <= 0)) {
      failures.push({ severity: "error", message: "canvas has empty bounds" });
    }
    for (var i = 0; i < regions.length; i++) {
      var region = regions[i];
      var r = region.rect;
      if (!r) {
        failures.push({ severity: "error", message: region.id + " has no rect" });
        continue;
      }
      if (r.width <= 0 || r.height <= 0) failures.push({ severity: "error", message: region.id + " has empty bounds" });
      if (r.x < -1 || r.y < -1 || r.x + r.width > window.innerWidth + 1 || r.y + r.height > window.innerHeight + 1) {
        failures.push({ severity: "error", message: region.id + " is offscreen" });
      }
      if (region.kind !== "canvas" && (r.width < 36 || r.height < 36)) {
        failures.push({ severity: "warning", message: region.id + " is a small touch target" });
      }
    }
    return failures;
  }

  window.__playgentE2EBegin = e2eBeginFrame;
  window.__playgentE2EAfterRender = e2eAfterRender;
  window.__playgentE2ERegisterRegion = e2eRegisterRegion;
  window.__playgentE2ECanvasRect = e2eCanvasRect;
  window.__playgentE2EPixiBounds = e2ePixiBounds;
  window.__playgentE2ERunLayoutChecks = runE2ELayoutChecks;
  window.__playgentE2E = {
    version: 1,
    getSnapshot: function() {
      return {
        phase: E2E.lastPhase,
        status: E2E.lastStatus,
        playerId: E2E.lastPlayerId,
        currentPlayer: E2E.lastCurrentPlayer,
        legalActionCount: E2E.lastVisibleLegalActionCount,
        regionCount: getAllE2ERegions().length,
        canvas: getE2ECanvasInfo()
      };
    },
    getInteractiveRegions: function() { return getAllE2ERegions(); },
    checkLayout: function() { return runE2ELayoutChecks(); }
  };

  if (typeof window.__playgentCheckLayout !== "function") {
    window.__playgentCheckLayout = function() { return runE2ELayoutChecks(); };
  }

  function patchPlaygentE2E() {
    if (!window.playgent || !window.playgent.onStateChange || window.playgent.__e2ePatched) return false;
    var original = window.playgent.onStateChange;
    window.playgent.onStateChange = function(cb) {
      return original.call(window.playgent, function(view, legalActions, context) {
        e2eBeginFrame(view, legalActions, context || {});
        var result = cb.apply(this, arguments);
        e2eAfterRender();
        return result;
      });
    };
    window.playgent.__e2ePatched = true;
    return true;
  }

  ensureE2ETelemetry();
  decorateE2EDOMControls();
  if (!patchPlaygentE2E()) {
    var tries = 0;
    var timer = setInterval(function() {
      tries++;
      if (patchPlaygentE2E() || tries > 80) clearInterval(timer);
    }, 50);
  }
}());
</script>

<script>
(function () {
  var COLORS = ["#ff3f4f", "#37d8ff", "#b8ff2c", "#ffb21e", "#8f5cff", "#ff7ad9", "#58ffc9", "#f77622"];
  var LETTERS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  var selectedCards = [];
  var selectedOption = null;
  var lastPhase = "";
  var lastRound = 0;
  var lastDealSoundKey = "";
  var lastGameOverSoundKey = "";
  var visualSeed = 42069;

  function escapeHtml(value) {
    return String(value == null ? "" : value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function visualRandom() {
    visualSeed = (visualSeed * 48271) % 2147483647;
    return visualSeed / 2147483647;
  }

  function playerName(id, ctx) {
    var players = (ctx && ctx.players) || [];
    var i;
    for (i = 0; i < players.length; i++) {
      if (players[i].id === id) return players[i].name || id;
    }
    return id || "Spectator";
  }

  function playerInitial(id, ctx) {
    return playerName(id, ctx).charAt(0).toUpperCase();
  }

  function playerColor(id, view) {
    var players = view.players || [];
    var i = players.indexOf(id);
    if (i < 0) i = 0;
    return COLORS[i % COLORS.length];
  }

  function formatPrompt(text) {
    return escapeHtml(text).replace(/____/g, '<span class="blank">____</span>');
  }

  function optionText(option) {
    var texts = option.texts || [];
    var html = "";
    var i;
    for (i = 0; i < texts.length; i++) {
      html += '<div class="answer-line">' + escapeHtml(texts[i]) + "</div>";
    }
    return html;
  }

  function renderScores(view, ctx) {
    var strip = document.getElementById("score-strip");
    var html = "";
    var ids = view.players || [];
    var i, id, cls;
    for (i = 0; i < ids.length; i++) {
      id = ids[i];
      cls = "score-pill" + (id === ctx.myId ? " me" : "");
      html += '<div class="' + cls + '">';
      html += '<span class="avatar" style="background:' + playerColor(id, view) + '">' + escapeHtml(playerInitial(id, ctx)) + "</span>";
      html += '<span class="score-name">' + escapeHtml(playerName(id, ctx)) + "</span>";
      html += '<span class="score-value">' + ((view.scores && view.scores[id]) || 0) + "</span>";
      html += "</div>";
    }
    strip.innerHTML = html;
  }

  function renderRoster(view, ctx) {
    var roster = document.getElementById("hidden-roster");
    var players = (ctx && ctx.players) || [];
    var html = "";
    var i;
    for (i = 0; i < players.length; i++) {
      html += '<span data-player="' + escapeHtml(players[i].id) + '">' + escapeHtml(players[i].name || players[i].id) + "</span>";
    }
    roster.innerHTML = html;
  }

  function renderSubmitTrack(view, ctx) {
    var track = document.getElementById("submit-track");
    var ids = view.players || [];
    var html = "";
    var i, id, cls, label;
    for (i = 0; i < ids.length; i++) {
      id = ids[i];
      if (id === view.judgeId) continue;
      cls = "submit-dot" + (view.submitted && view.submitted[id] ? " done" : "");
      label = playerInitial(id, ctx);
      html += '<span class="' + cls + '" title="' + escapeHtml(playerName(id, ctx)) + '">' + escapeHtml(label) + "</span>";
    }
    track.innerHTML = html;
  }

  function updateSelectedCards(root, pick) {
    var cards = root.querySelectorAll(".hand-card");
    var i, id, pos, badge;
    for (i = 0; i < cards.length; i++) {
      id = Number(cards[i].getAttribute("data-card-id"));
      pos = selectedCards.indexOf(id);
      badge = cards[i].querySelector(".select-badge");
      if (pos >= 0) {
        cards[i].classList.add("selected");
        if (badge) badge.textContent = String(pos + 1);
      } else {
        cards[i].classList.remove("selected");
        if (badge) badge.textContent = "";
      }
    }
    var btn = document.getElementById("submit-btn");
    var count = document.getElementById("select-count");
    if (count) count.textContent = String(selectedCards.length) + "/" + String(pick);
    if (btn) btn.disabled = selectedCards.length !== pick;
  }

  function renderSubmit(view, legalActions, ctx) {
    var zone = document.getElementById("play-zone");
    var pick = (view.prompt && view.prompt.pick) || 1;
    var canSubmit = legalActions && legalActions.length > 0 && !view.isJudge;
    var hand = view.myHand || [];
    var html = "";
    var i, card;

    selectedCards = [];
    selectedOption = null;

    if (canSubmit) {
      html += '<div class="panel-title"><span>Your white cards</span><span class="micro" id="select-count">0/' + pick + "</span></div>";
      html += '<div class="hand-grid" id="hand-grid">';
      for (i = 0; i < hand.length; i++) {
        card = hand[i];
        html += '<button class="hand-card" data-card-id="' + card.id + '" type="button">';
        html += escapeHtml(card.text);
        html += '<span class="select-badge"></span>';
        html += "</button>";
      }
      html += "</div>";
      html += '<div class="action-row">';
      html += '<div class="locked-copy">Pick the card' + (pick > 1 ? "s in order" : "") + ' that will make the judge question their life.</div>';
      html += '<button class="primary-btn" id="submit-btn" type="button" disabled>Submit filth</button>';
      html += "</div>";
      zone.innerHTML = html;

      var grid = document.getElementById("hand-grid");
      var buttons = grid.querySelectorAll(".hand-card");
      for (i = 0; i < buttons.length; i++) {
        buttons[i].addEventListener("click", function () {
          var id = Number(this.getAttribute("data-card-id"));
          var pos = selectedCards.indexOf(id);
          if (pos >= 0) {
            selectedCards.splice(pos, 1);
          } else {
            if (selectedCards.length >= pick) selectedCards.shift();
            selectedCards.push(id);
          }
          if (playgent.sound) playgent.sound("ui.select");
          updateSelectedCards(zone, pick);
        });
      }

      document.getElementById("submit-btn").addEventListener("click", function () {
        if (selectedCards.length === pick) {
          if (playgent.sound) playgent.sound("card.place");
          playgent.submitAction({ type: "submit", cardIds: selectedCards.slice() });
          this.disabled = true;
        }
      });
    } else {
      var mine = view.mySubmission && view.mySubmission.texts ? view.mySubmission.texts.join(" / ") : "";
      html += '<div class="waiting-block">';
      if (view.isJudge) {
        html += "You are judging. Let the clankers embarrass themselves.";
      } else if (mine) {
        html += "Locked in: " + escapeHtml(mine);
      } else {
        html += "Waiting for the other cowards to submit.";
      }
      html += "</div>";
      zone.innerHTML = html;
    }
  }

  function updateSelectedOption(root) {
    var cards = root.querySelectorAll(".answer-card");
    var i;
    for (i = 0; i < cards.length; i++) {
      if (cards[i].getAttribute("data-option-id") === selectedOption) cards[i].classList.add("selected");
      else cards[i].classList.remove("selected");
    }
    var btn = document.getElementById("judge-btn");
    if (btn) btn.disabled = !selectedOption;
  }

  function renderJudge(view, legalActions, ctx) {
    var zone = document.getElementById("play-zone");
    var canJudge = view.isJudge && legalActions && legalActions.length > 0;
    var options = view.options || [];
    var html = "";
    var i, option, tag;

    selectedCards = [];
    selectedOption = null;

    html += '<div class="panel-title"><span>Anonymous answers</span><span class="micro">' + (canJudge ? "Judge's pick" : "Judge is choosing") + "</span></div>";
    html += '<div class="answer-grid" id="answer-grid">';
    for (i = 0; i < options.length; i++) {
      option = options[i];
      tag = LETTERS.charAt(i);
      html += '<button class="answer-card' + (canJudge ? " selectable" : "") + '" data-option-id="' + escapeHtml(option.id) + '" type="button"' + (canJudge ? "" : " disabled") + ">";
      html += '<div class="option-kicker"><span>Answer ' + escapeHtml(tag) + "</span></div>";
      html += optionText(option);
      html += "</button>";
    }
    html += "</div>";
    if (canJudge) {
      html += '<div class="action-row">';
      html += '<div class="locked-copy">Reward the answer that makes the room worse.</div>';
      html += '<button class="primary-btn" id="judge-btn" type="button" disabled>Crown trash</button>';
      html += "</div>";
    } else {
      html += '<div class="locked-copy">The judge is reading these with increasing personal concern.</div>';
    }
    zone.innerHTML = html;

    if (canJudge) {
      var cards = zone.querySelectorAll(".answer-card");
      for (i = 0; i < cards.length; i++) {
        cards[i].addEventListener("click", function () {
          selectedOption = this.getAttribute("data-option-id");
          if (playgent.sound) playgent.sound("ui.select");
          updateSelectedOption(zone);
        });
      }
      document.getElementById("judge-btn").addEventListener("click", function () {
        if (selectedOption) {
          if (playgent.sound) playgent.sound("ui.confirm");
          playgent.submitAction({ type: "judge_pick", optionId: selectedOption });
          this.disabled = true;
        }
      });
    }
  }

  function renderReveal(view, ctx) {
    var zone = document.getElementById("play-zone");
    var options = view.options || [];
    var html = "";
    var i, option, author;
    html += '<div class="panel-title"><span>Damage report</span><span class="micro">Point awarded</span></div>';
    html += '<div class="answer-grid">';
    for (i = 0; i < options.length; i++) {
      option = options[i];
      author = option.authorId ? playerName(option.authorId, ctx) : "Unknown";
      html += '<div class="answer-card' + (option.isWinner ? " winner" : "") + '">';
      html += '<div class="option-kicker"><span>' + (option.isWinner ? "Winner" : "Collateral damage") + '</span><span class="author-chip">' + escapeHtml(author) + "</span></div>";
      html += optionText(option);
      html += "</div>";
    }
    html += "</div>";
    zone.innerHTML = html;
  }

  function renderGameOver(view, ctx) {
    var zone = document.getElementById("play-zone");
    var ids = (view.players || []).slice();
    ids.sort(function (a, b) {
      return ((view.scores && view.scores[b]) || 0) - ((view.scores && view.scores[a]) || 0);
    });
    var html = "";
    var i, id;
    html += '<div class="panel-title"><span>Final leaderboard</span><span class="micro">The least dignified wins</span></div>';
    html += '<div class="leaderboard">';
    for (i = 0; i < ids.length; i++) {
      id = ids[i];
      html += '<div class="leader-row">';
      html += '<div class="rank">#' + (i + 1) + "</div>";
      html += '<div class="leader-name">' + escapeHtml(playerName(id, ctx)) + "</div>";
      html += '<div class="leader-score">' + ((view.scores && view.scores[id]) || 0) + "</div>";
      html += "</div>";
    }
    html += "</div>";
    zone.innerHTML = html;
  }

  function spawnConfetti() {
    var colors = ["#b8ff2c", "#37d8ff", "#ff3f4f", "#ffb21e", "#8f5cff", "#f7f1df"];
    var i, piece;
    for (i = 0; i < 42; i++) {
      piece = document.createElement("div");
      piece.className = "confetti";
      piece.style.left = String(Math.floor(visualRandom() * 100)) + "vw";
      piece.style.background = colors[Math.floor(visualRandom() * colors.length)];
      piece.style.animationDelay = String(Math.floor(visualRandom() * 900)) + "ms";
      piece.style.transform = "rotate(" + Math.floor(visualRandom() * 180) + "deg)";
      document.body.appendChild(piece);
      setTimeout((function (el) {
        return function () {
          if (el && el.parentNode) el.parentNode.removeChild(el);
        };
      })(piece), 3600);
    }
  }

  function shouldCelebrateHand(view, ctx) {
    return !!(view && ctx && ctx.myId && view.winnerId && view.winnerId === ctx.myId);
  }

  function winningPlayers(view) {
    var ids = view.players || [];
    var winners = [];
    var best = -1;
    var i, id, score;
    for (i = 0; i < ids.length; i++) {
      id = ids[i];
      score = (view.scores && view.scores[id]) || 0;
      if (score > best) {
        best = score;
        winners = [id];
      } else if (score === best) {
        winners.push(id);
      }
    }
    return winners;
  }

  function setPhaseLine(view, ctx, legalActions) {
    var phase = view.phase || "submit";
    var line = document.getElementById("phase-line");
    var judgeName = playerName(view.judgeId, ctx);
    if (phase === "submit") {
      if (view.isJudge) line.innerHTML = '<strong>' + escapeHtml(judgeName) + "</strong> is judging. Everyone else is making terrible choices.";
      else if (legalActions && legalActions.length > 0) line.innerHTML = "Pick your worst best answer for <strong>" + escapeHtml(judgeName) + "</strong>.";
      else line.innerHTML = "Your shame is locked. Waiting on the table.";
    } else if (phase === "judge") {
      line.innerHTML = '<strong>' + escapeHtml(judgeName) + "</strong> is choosing the winner.";
    } else if (phase === "reveal") {
      line.innerHTML = "The masks are off. Someone gets a point.";
    } else {
      line.innerHTML = "Final scores. Dignity not found.";
    }
  }

  playgent.onStateChange(function (view, legalActions, ctx) {
    var phase = view.phase || "submit";
    var arena = document.getElementById("arena");
    arena.setAttribute("data-phase", phase);
    arena.setAttribute("data-status", legalActions && legalActions.length > 0 ? "your-turn" : (ctx.gameOver ? "game-over" : "waiting"));

    document.getElementById("round-label").textContent = "Round " + (view.round || 1) + "/" + (view.maxRounds || 8);
    document.getElementById("judge-label").textContent = "Judge: " + playerName(view.judgeId, ctx);
    document.getElementById("prompt-text").innerHTML = formatPrompt(view.prompt ? view.prompt.text : "");
    document.getElementById("pick-tag").textContent = "Pick " + ((view.prompt && view.prompt.pick) || 1);

    renderScores(view, ctx);
    renderRoster(view, ctx);
    renderSubmitTrack(view, ctx);
    setPhaseLine(view, ctx, legalActions);

    if (phase !== lastPhase || view.round !== lastRound) {
      if (phase === "submit") {
        renderSubmit(view, legalActions, ctx);
        var dealKey = (view.round || 0) + ":" + (view.judgeId || "") + ":" + ((view.myHand && view.myHand.length) || 0);
        if (!view.isJudge && view.myHand && view.myHand.length > 0 && dealKey !== lastDealSoundKey && playgent.sound) {
          lastDealSoundKey = dealKey;
          playgent.sound("card.deal.fast");
        }
      }
      else if (phase === "judge") renderJudge(view, legalActions, ctx);
      else if (phase === "reveal") {
        renderReveal(view, ctx);
        if (shouldCelebrateHand(view, ctx)) spawnConfetti();
        if (playgent.sound) {
          playgent.sound("card.flip");
          if (view.winnerId) {
            setTimeout(function () {
              if (playgent.sound) playgent.sound(view.winnerId === ctx.myId ? "positive.clean" : "score.tick");
            }, 120);
          }
        }
      } else {
        renderGameOver(view, ctx);
        if (phase === "gameOverDisplay" || phase === "gameOver") {
          var winners = winningPlayers(view);
          var gameOverKey = "final:" + (view.round || 0) + ":" + winners.join("|");
          if (gameOverKey !== lastGameOverSoundKey && playgent.sound) {
            lastGameOverSoundKey = gameOverKey;
            playgent.sound(winners.indexOf(ctx.myId) !== -1 ? "game.victory" : (ctx.myId ? "game.defeat" : "game.over"));
          }
        }
      }
    } else if (phase === "submit") {
      renderSubmitTrack(view, ctx);
      if (!(legalActions && legalActions.length > 0)) renderSubmit(view, legalActions, ctx);
    } else if (phase === "judge" && !(legalActions && legalActions.length > 0)) {
      renderJudge(view, legalActions, ctx);
    }

    lastPhase = phase;
    lastRound = view.round || 0;
  });
})();
</script>
