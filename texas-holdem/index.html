<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  margin: 0; overflow: hidden; background: #0a0e1a;
  height: 100vh; width: 100vw;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  user-select: none; -webkit-tap-highlight-color: transparent;
}
#game-container { width: 100%; height: 100%; position: fixed; top: 0; left: 0; }
</style>

<div id="game-container"></div>

<script>
(function() {
  var E2E_GAME_SLUG = "texas-holdem";
  var E2E = window.__playgentE2EState || {
    version: 1,
    regions: [],
    lastPhase: "loading",
    lastStatus: "loading",
    lastPlayerId: "",
    lastCurrentPlayer: "",
    lastLegalActionCount: 0,
    lastVisibleLegalActionCount: 0,
    lastActions: [],
    lastRawActions: []
  };
  window.__playgentE2EState = E2E;

  function setE2EAttr(el, name, value) {
    if (!el) return;
    el.setAttribute(name, value == null ? "" : String(value));
  }

  function unwrapE2EAction(option) {
    if (option && typeof option === "object" && option.decision !== undefined) return option.decision;
    if (option && typeof option === "object" && option.action !== undefined) return option.action;
    return option;
  }

  function isVisibleE2EAction(action) {
    action = unwrapE2EAction(action);
    if (!action || typeof action !== "object") return false;
    if (action.type === "advance_phase" || action.type === "system" || action.type === "noop") return false;
    return true;
  }

  function getVisibleE2EActions(actions) {
    var out = [];
    for (var i = 0; actions && i < actions.length; i++) {
      if (isVisibleE2EAction(actions[i])) out.push(unwrapE2EAction(actions[i]));
    }
    return out;
  }

  function ensureE2ETelemetry() {
    var el = document.getElementById("e2e-telemetry");
    if (!el) {
      el = document.createElement("div");
      el.id = "e2e-telemetry";
      if (document.body) document.body.appendChild(el);
    }
    el.setAttribute("aria-hidden", "true");
    el.style.cssText = "position:fixed;width:1px;height:1px;overflow:hidden;opacity:0;pointer-events:none;left:0;top:0;";
    setE2EAttr(el, "data-game", E2E_GAME_SLUG);
    setE2EAttr(el, "data-phase", E2E.lastPhase);
    setE2EAttr(el, "data-status", E2E.lastStatus);
    setE2EAttr(el, "data-player", E2E.lastPlayerId || "spectator");
    return el;
  }

  function addUnique(list, el) {
    if (!el) return;
    for (var i = 0; i < list.length; i++) if (list[i] === el) return;
    list.push(el);
  }

  function getE2ERoots() {
    var roots = [];
    addUnique(roots, ensureE2ETelemetry());
    addUnique(roots, document.getElementById("telemetry"));
    addUnique(roots, document.getElementById("game"));
    addUnique(roots, document.getElementById("game-container"));
    addUnique(roots, document.querySelector("[data-board]"));
    return roots;
  }

  function getCurrentPlayerE2E(view) {
    if (!view) return "";
    return view.currentPlayer || view.currentPlayerId || view.currentActor || view.turn || "";
  }

  function updateE2EPlayers(players) {
    var telemetry = ensureE2ETelemetry();
    var host = document.getElementById("e2e-players");
    if (!host) {
      host = document.createElement("div");
      host.id = "e2e-players";
      telemetry.appendChild(host);
    }
    host.textContent = "";
    for (var i = 0; players && i < players.length; i++) {
      var p = players[i] || {};
      var span = document.createElement("span");
      setE2EAttr(span, "data-player", p.id || "");
      setE2EAttr(span, "data-player-name", p.name || p.id || "");
      span.textContent = p.name || p.id || "";
      host.appendChild(span);
    }
  }

  function updateE2ELandmarks(view, legalActions, context) {
    var visibleActions = getVisibleE2EActions(legalActions || []);
    var phase = context && context.gameOver ? "game-over" : (view && (view.phase || view.mode || view.stage) ? (view.phase || view.mode || view.stage) : "playing");
    var status = context && context.gameOver ? "game-over" : (visibleActions.length > 0 ? "your-turn" : "waiting");
    var playerId = context && context.myId ? context.myId : "spectator";
    var currentPlayer = getCurrentPlayerE2E(view);
    var roots = getE2ERoots();
    E2E.lastPhase = phase;
    E2E.lastStatus = status;
    E2E.lastPlayerId = playerId;
    E2E.lastCurrentPlayer = currentPlayer;
    E2E.lastRawActions = legalActions || [];
    E2E.lastActions = visibleActions;
    E2E.lastLegalActionCount = (legalActions || []).length;
    E2E.lastVisibleLegalActionCount = visibleActions.length;
    for (var i = 0; i < roots.length; i++) {
      setE2EAttr(roots[i], "data-game", E2E_GAME_SLUG);
      setE2EAttr(roots[i], "data-phase", phase);
      setE2EAttr(roots[i], "data-status", status);
      setE2EAttr(roots[i], "data-player", playerId);
      setE2EAttr(roots[i], "data-current-player", currentPlayer);
      if (view && view.round != null) setE2EAttr(roots[i], "data-round", view.round);
      if (view && view.turnNumber != null) setE2EAttr(roots[i], "data-turn", view.turnNumber);
    }
    updateE2EPlayers(context && context.players ? context.players : []);
  }

  function actionTypeForIndex(idx) {
    var raw = E2E.lastRawActions && E2E.lastRawActions[idx] ? unwrapE2EAction(E2E.lastRawActions[idx]) : null;
    return raw && raw.type ? raw.type : "choose";
  }

  function safeLabelFromNode(node) {
    var label = node.getAttribute("data-action-label") || node.getAttribute("aria-label") || node.title || node.textContent || node.value || "";
    return String(label).replace(/\s+/g, " ").trim().slice(0, 100);
  }

  function decorateE2EDOMControls() {
    var nodes = document.querySelectorAll("[data-action-idx], [data-action], button, [role='button'], input[type='button'], input[type='submit'], input:not([type='hidden']), select, textarea, [data-cell], [data-card], [data-card-id], [data-option-id], [data-brainrot], canvas");
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      if (node.hasAttribute("data-action") && !node.hasAttribute("data-action-idx")) {
        node.setAttribute("data-action-idx", node.getAttribute("data-action"));
      }
      if (node.hasAttribute("data-action-idx")) {
        var idx = parseInt(node.getAttribute("data-action-idx"), 10);
        if (!isNaN(idx) && !node.hasAttribute("data-action-type")) node.setAttribute("data-action-type", actionTypeForIndex(idx));
        if (!node.hasAttribute("data-action-label")) node.setAttribute("data-action-label", safeLabelFromNode(node));
      }
      if (node.hasAttribute("data-cell") && !node.getAttribute("aria-label")) {
        node.setAttribute("aria-label", "cell " + node.getAttribute("data-cell"));
      }
      if ((node.hasAttribute("data-card") || node.hasAttribute("data-card-id")) && !node.getAttribute("aria-label")) {
        node.setAttribute("aria-label", "card " + (node.getAttribute("data-card") || node.getAttribute("data-card-id")));
      }
      if (node.tagName === "CANVAS" && !node.getAttribute("aria-label")) {
        node.setAttribute("aria-label", E2E_GAME_SLUG + " canvas");
      }
    }
  }

  function e2eBeginFrame(view, legalActions, context) {
    E2E.regions = [];
    updateE2ELandmarks(view || {}, legalActions || [], context || {});
  }

  function e2eAfterRender() {
    decorateE2EDOMControls();
  }

  function isVisibleE2ENode(node) {
    if (!node || !node.getBoundingClientRect) return false;
    var rect = node.getBoundingClientRect();
    if (rect.width <= 0 || rect.height <= 0) return false;
    if (rect.right <= 0 || rect.bottom <= 0 || rect.left >= window.innerWidth || rect.top >= window.innerHeight) return false;
    var style = window.getComputedStyle ? window.getComputedStyle(node) : null;
    if (style && (style.display === "none" || style.visibility === "hidden" || style.opacity === "0")) return false;
    if (node.disabled || node.getAttribute("aria-disabled") === "true") return false;
    return true;
  }

  function regionKindForNode(node) {
    if (node.tagName === "CANVAS") return "canvas";
    if (node.tagName === "INPUT" || node.tagName === "SELECT" || node.tagName === "TEXTAREA") return "input";
    if (node.hasAttribute("data-cell")) return "cell";
    if (node.hasAttribute("data-card") || node.hasAttribute("data-card-id")) return "card";
    return "button";
  }

  function getDOMActionRegions() {
    decorateE2EDOMControls();
    var nodes = document.querySelectorAll("[data-action-idx], button, [role='button'], input[type='button'], input[type='submit'], input:not([type='hidden']), select, textarea, [data-cell], [data-card], [data-card-id], [data-option-id], [data-brainrot], canvas");
    var out = [];
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      if (!isVisibleE2ENode(node)) continue;
      var r = clipE2ERect(node.getBoundingClientRect());
      if (!r) continue;
      var id = node.id || node.getAttribute("data-action-idx") || node.getAttribute("data-cell") || node.getAttribute("data-card") || node.getAttribute("data-card-id") || node.getAttribute("data-option-id") || node.getAttribute("data-brainrot") || ("control-" + i);
      out.push({
        id: String(id),
        kind: regionKindForNode(node),
        label: safeLabelFromNode(node),
        actionType: node.getAttribute("data-action-type") || "",
        selector: node.id ? ("#" + node.id) : "",
        rect: { x: r.left, y: r.top, width: r.width, height: r.height },
        center: { x: r.left + r.width / 2, y: r.top + r.height / 2 }
      });
    }
    return out;
  }

  function clipE2ERect(rect) {
    if (!rect) return null;
    var x = Number(rect.x != null ? rect.x : rect.left) || 0;
    var y = Number(rect.y != null ? rect.y : rect.top) || 0;
    var width = Number(rect.width) || 0;
    var height = Number(rect.height) || 0;
    var left = Math.max(0, x);
    var top = Math.max(0, y);
    var right = Math.min(window.innerWidth, x + width);
    var bottom = Math.min(window.innerHeight, y + height);
    if (right - left <= 0 || bottom - top <= 0) return null;
    return { x: left, y: top, width: right - left, height: bottom - top };
  }

  function e2eRegisterRegion(region) {
    if (!region || !region.id || !region.rect) return;
    var r = clipE2ERect(region.rect);
    if (!r || r.width == null || r.height == null) return;
    var item = {
      id: String(region.id),
      kind: region.kind || "button",
      label: region.label || "",
      actionType: region.actionType || "",
      rect: { x: Number(r.x) || 0, y: Number(r.y) || 0, width: Number(r.width) || 0, height: Number(r.height) || 0 },
      center: region.center || { x: (Number(r.x) || 0) + (Number(r.width) || 0) / 2, y: (Number(r.y) || 0) + (Number(r.height) || 0) / 2 }
    };
    for (var i = 0; i < E2E.regions.length; i++) {
      if (E2E.regions[i].id === item.id) {
        E2E.regions[i] = item;
        return;
      }
    }
    E2E.regions.push(item);
  }

  function e2eCanvasRect(localRect, app) {
    var canvas = app && app.canvas ? app.canvas : document.querySelector("canvas");
    var screen = app && app.screen ? app.screen : null;
    if (!canvas || !localRect) return null;
    var canvasRect = canvas.getBoundingClientRect();
    var screenW = screen && screen.width ? screen.width : canvasRect.width;
    var screenH = screen && screen.height ? screen.height : canvasRect.height;
    var sx = canvasRect.width / (screenW || canvasRect.width || 1);
    var sy = canvasRect.height / (screenH || canvasRect.height || 1);
    return {
      x: canvasRect.left + localRect.x * sx,
      y: canvasRect.top + localRect.y * sy,
      width: localRect.width * sx,
      height: localRect.height * sy
    };
  }

  function e2ePixiBounds(displayObject, app) {
    if (!displayObject || !displayObject.getBounds) return null;
    var b = displayObject.getBounds();
    return e2eCanvasRect({ x: b.x, y: b.y, width: b.width, height: b.height }, app);
  }

  function getE2ECanvasInfo() {
    var canvas = document.querySelector("canvas");
    if (!canvas) return null;
    var rect = canvas.getBoundingClientRect();
    return { selector: "canvas", width: rect.width, height: rect.height };
  }

  function getAllE2ERegions() {
    var out = E2E.regions.slice();
    var dom = getDOMActionRegions();
    var seen = {};
    var merged = [];
    for (var i = 0; i < out.length; i++) { seen[out[i].id] = true; merged.push(out[i]); }
    for (var j = 0; j < dom.length; j++) {
      if (!seen[dom[j].id]) merged.push(dom[j]);
    }
    return merged;
  }

  function runE2ELayoutChecks() {
    var failures = [];
    var regions = getAllE2ERegions();
    var canvas = getE2ECanvasInfo();
    if (E2E.lastVisibleLegalActionCount > 0 && regions.length === 0) {
      failures.push({ severity: "error", message: "active legal actions did not create visible controls" });
    }
    if (canvas && (canvas.width <= 0 || canvas.height <= 0)) {
      failures.push({ severity: "error", message: "canvas has empty bounds" });
    }
    for (var i = 0; i < regions.length; i++) {
      var region = regions[i];
      var r = region.rect;
      if (!r) {
        failures.push({ severity: "error", message: region.id + " has no rect" });
        continue;
      }
      if (r.width <= 0 || r.height <= 0) failures.push({ severity: "error", message: region.id + " has empty bounds" });
      if (r.x < -1 || r.y < -1 || r.x + r.width > window.innerWidth + 1 || r.y + r.height > window.innerHeight + 1) {
        failures.push({ severity: "error", message: region.id + " is offscreen" });
      }
      if (region.kind !== "canvas" && (r.width < 36 || r.height < 36)) {
        failures.push({ severity: "warning", message: region.id + " is a small touch target" });
      }
    }
    return failures;
  }

  window.__playgentE2EBegin = e2eBeginFrame;
  window.__playgentE2EAfterRender = e2eAfterRender;
  window.__playgentE2ERegisterRegion = e2eRegisterRegion;
  window.__playgentE2ECanvasRect = e2eCanvasRect;
  window.__playgentE2EPixiBounds = e2ePixiBounds;
  window.__playgentE2ERunLayoutChecks = runE2ELayoutChecks;
  window.__playgentE2E = {
    version: 1,
    getSnapshot: function() {
      return {
        phase: E2E.lastPhase,
        status: E2E.lastStatus,
        playerId: E2E.lastPlayerId,
        currentPlayer: E2E.lastCurrentPlayer,
        legalActionCount: E2E.lastVisibleLegalActionCount,
        regionCount: getAllE2ERegions().length,
        canvas: getE2ECanvasInfo()
      };
    },
    getInteractiveRegions: function() { return getAllE2ERegions(); },
    checkLayout: function() { return runE2ELayoutChecks(); }
  };

  if (typeof window.__playgentCheckLayout !== "function") {
    window.__playgentCheckLayout = function() { return runE2ELayoutChecks(); };
  }

  function patchPlaygentE2E() {
    if (!window.playgent || !window.playgent.onStateChange || window.playgent.__e2ePatched) return false;
    var original = window.playgent.onStateChange;
    window.playgent.onStateChange = function(cb) {
      return original.call(window.playgent, function(view, legalActions, context) {
        e2eBeginFrame(view, legalActions, context || {});
        var result = cb.apply(this, arguments);
        e2eAfterRender();
        return result;
      });
    };
    window.playgent.__e2ePatched = true;
    return true;
  }

  ensureE2ETelemetry();
  decorateE2EDOMControls();
  if (!patchPlaygentE2E()) {
    var tries = 0;
    var timer = setInterval(function() {
      tries++;
      if (patchPlaygentE2E() || tries > 80) clearInterval(timer);
    }, 50);
  }
}());
</script>

<script>
/* ===================================================================
   Texas Hold'em — PixiJS Renderer
   Community card animation OWNS card state during reveal sequences.
   TableView.update skips cards in the _animatingCards set.
   =================================================================== */

var Renderer = {
  app: null,
  gameWorld: null,
  hudLayer: null,
  _prevView: null,
  _myId: null,
  _lastPhase: null,
  _lastLegalActions: [],
  _lastContext: null,
  /** Set of card indices currently being animated. TableView.update skips these. */
  _animatingCards: {},

  init: function() {
    var container = document.getElementById('game-container');
    var app = new PIXI.Application();
    Renderer.app = app;

    return app.init({
      resizeTo: container,
      antialias: true,
      resolution: Math.min(window.devicePixelRatio || 1, 2),
      autoDensity: true,
      background: C.BG,
    }).then(function() {
      container.appendChild(app.canvas);

      var w = app.screen.width;
      var h = app.screen.height;
      Layout.update(w, h);

      /* ── Scene graph ── */
      var gameWorld = new PIXI.Container();
      gameWorld.label = 'gameWorld';
      var hudLayer = new PIXI.Container();
      hudLayer.label = 'hudLayer';
      app.stage.addChild(gameWorld, hudLayer);
      Renderer.gameWorld = gameWorld;
      Renderer.hudLayer = hudLayer;

      var tableLayer = new PIXI.Container();
      var communityLayer = new PIXI.Container();
      var playerLayer = new PIXI.Container();
      var cardLayer = new PIXI.Container();
      var chipLayer = new PIXI.Container();
      var fxLayer = new PIXI.Container();
      fxLayer.interactiveChildren = false;
      gameWorld.addChild(tableLayer, communityLayer, playerLayer, cardLayer, chipLayer, fxLayer);

      TableView.create(tableLayer, communityLayer, w, h);
      ActionBar.create(hudLayer, w, h);
      EffectPool.create(fxLayer);
      ChipAnim.init(chipLayer);
      ScreenShake.init(gameWorld);
      AllInEffect.create(fxLayer, w, h);
      ShowdownBanner.create(hudLayer);

      Renderer._playerLayer = playerLayer;
      Renderer._chipLayer = chipLayer;

      app.ticker.add(Renderer._tick);
      app.renderer.on('resize', Renderer._onResize);

      /* Force full redraw when returning to the tab.
         Tab switches can invalidate GPU textures (FillGradient, cached render groups).
         Without this, cards show as blank rectangles because _buildCard creates
         empty Text objects and no state update arrives to reapply card data. */
      document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'visible') {
          Renderer._forceRedraw();
        }
      });
    });
  },

  /** Invalidate all cached Graphics and force a complete re-render.
      Called on tab return to recover from GPU texture loss. */
  _forceRedraw: function() {
    var w = Renderer.app.screen.width;
    var h = Renderer.app.screen.height;
    Layout.update(w, h);
    TableView.reposition(w, h);

    /* Invalidate PlayerNode draw caches so internalDrawSeat rebuilds Graphics */
    var keys = Object.keys(PlayerNode.internalNodes);
    for (var i = 0; i < keys.length; i++) {
      var node = PlayerNode.internalNodes[keys[i]];
      node.internalDrawnW = 0;
      node.internalDrawnH = 0;
      node.internalDrawnScale = 0;
    }

    /* Re-render current state if available */
    if (Renderer._prevView && Renderer._lastContext) {
      PlayerNode.repositionAll(Renderer._prevView, Renderer._myId);
      /* Re-run full state update to reapply card data and visuals */
      var view = Renderer._prevView;
      var ctx = Renderer._lastContext;
      TableView.update(view, {});
      if (view.players) {
        for (var ni = 0; ni < view.players.length; ni++) {
          var pd = view.players[ni];
          if (pd.id === Renderer._myId) continue;
          var pn = PlayerNode.internalNodes[pd.id];
          if (pn) PlayerNode.updateFromView(pn, pd, view, ctx, view.turn === pd.id);
        }
      }
      ActionBar.update(view, Renderer._lastLegalActions, ctx);
    }
  },

  _tick: function(ticker) {
    Tween.update(ticker.deltaTime);
    EffectPool.update(ticker.deltaTime);
    ScreenShake.update();
  },

  _onResize: function(w, h) {
    Layout.update(w, h);
    TableView.reposition(w, h);
    ActionBar.reposition(w, h);
    AllInEffect.reposition(w, h);
    ShowdownBanner.reposition(w, h);
    if (Renderer._prevView) {
      PlayerNode.repositionAll(Renderer._prevView, Renderer._myId);
      if (Renderer._lastContext) {
        ActionBar.update(Renderer._prevView, Renderer._lastLegalActions, Renderer._lastContext);
      }
    }
  },

  /**
   * Update ActionBar hand name for active player during all-in runout.
   * SpectatorOdds handles PlayerNode labels; this covers only the player's own ActionBar.
   */
  _updateProgressiveActionBar: function(revealedCount) {
    var view = Renderer._prevView;
    if (!view || !view.revealedHands) return;
    var cc = view.communityCards ? view.communityCards.slice(0, revealedCount) : [];
    if (cc.length < 3) return;

    var myId = Renderer._myId;
    var players = [];
    var ids = Object.keys(view.revealedHands);
    for (var i = 0; i < ids.length; i++) {
      var rh = view.revealedHands[ids[i]];
      if (rh && rh.cards && rh.cards.length >= 2) {
        players.push({ id: ids[i], cards: rh.cards });
      }
    }
    if (players.length < 2) return;

    try {
      var probs = HandEval.winProbability(players, cc);
      if (probs[myId]) {
        ActionBar.internalMyHandName.text = probs[myId].handName + ' (' + probs[myId].pct + '%)';
        ActionBar.internalMyHandName.visible = true;
      }
    } catch (e) { /* noop */ }
  },

  _playVisiblePlayerActionSounds: function(prev, view, myId) {
    if (!prev || !prev.players || !view.players || typeof playgent === 'undefined' || !playgent.sound) return;
    for (var i = 0; i < view.players.length; i++) {
      var pp = view.players[i];
      if (!pp || pp.id === myId) continue;
      var prevP = null;
      for (var j = 0; j < prev.players.length; j++) {
        if (prev.players[j].id === pp.id) { prevP = prev.players[j]; break; }
      }
      if (!prevP) continue;
      if (pp.folded && !prevP.folded) {
        playgent.sound('ui.cancel');
      } else if (pp.allIn && !prevP.allIn) {
        playgent.sound('combat.heavy');
      } else if ((pp.totalBet || 0) > (prevP.totalBet || 0)) {
        playgent.sound('coin.purchase');
      } else if (view.lastAction && view.lastAction[pp.id] === 'CHECK' &&
          (!prev.lastAction || prev.lastAction[pp.id] !== 'CHECK')) {
        playgent.sound('ui.confirm');
      }
    }
  },

  /**
   * Animate community card reveals with real tension.
   *
   * All-in runout timing (each card face visible ~6s before next street):
   *   Flop: 3 cards rapid-fire (200ms apart), flip, hold 6000ms
   *   Turn: deal + flip, hold 6000ms
   *   River: deal + flip (sparks), hold until showdown result
   *
   * Normal deals (1-3 cards at a time) use shorter stagger.
   */
  _animateCommunityCards: function(view, prevCCLen, newCCLen) {
    var totalDuration = 0;
    var isAllInRunout = prevCCLen === 0 && newCCLen === 5;
    var HOLD_TIME = 6000; /* ms each street is visible before next */
    var DEAL_FLY = 400;   /* ms card flies from deck to position */
    var FLIP_TIME = C.FLIP_HALF * 2; /* ~300ms total flip */
    var w = Renderer.app.screen.width;
    var h = Renderer.app.screen.height;

    var delays = [];
    for (var ci = prevCCLen; ci < newCCLen; ci++) {
      var d;
      if (isAllInRunout) {
        if (ci < 3) {
          /* Flop: 3 cards staggered 250ms */
          d = ci * 250;
        } else if (ci === 3) {
          /* Turn: after flop deals (750ms) + flop flip (300ms) + 6s hold */
          d = 3 * 250 + DEAL_FLY + FLIP_TIME + HOLD_TIME;
        } else {
          /* River: after turn deal + flip + 6s hold */
          d = 3 * 250 + DEAL_FLY + FLIP_TIME + HOLD_TIME + DEAL_FLY + FLIP_TIME + HOLD_TIME;
        }
      } else {
        d = (ci - prevCCLen) * C.DEAL_STAGGER;
      }
      delays.push(d);
      Renderer._animatingCards[ci] = true;
    }

    for (var ci = prevCCLen; ci < newCCLen; ci++) {
      var card = TableView.getCard(ci);
      if (!card) continue;

      card.setCard(view.communityCards[ci]);
      card.showBack();
      card.visible = true;

      var targetX = Layout.communityX(ci, 5);
      var targetY = Layout.communityY();
      card.x = Layout.deckX();
      card.y = Layout.deckY();
      card.scale.set(0.5);
      card.alpha = 0;

      var delay = delays[ci - prevCCLen];
      var flipDelay = isAllInRunout ? 100 : 0;
      if (!isAllInRunout) {
        if (ci >= 3 && newCCLen === 4) flipDelay = C.TURN_PAUSE;
        if (ci >= 4) flipDelay = C.RIVER_PAUSE;
      }

      var cardDuration = delay + DEAL_FLY + flipDelay + FLIP_TIME;
      if (cardDuration > totalDuration) totalDuration = cardDuration;

      (function(c, tx, ty, d, fd, idx, isFlop, isRunout, cw, ch) {
        setTimeout(function() {
          /* Pre-deal tension pulse for turn and river during all-in */
          if (isRunout && idx >= 3) {
            ScreenShake.shake(1.5);
          }
          if (typeof playgent !== 'undefined' && playgent.sound) playgent.sound('card.deal');

          Tween.to(c, { x: tx, y: ty, alpha: 1 }, DEAL_FLY, 'easeOut');
          Tween.to(c.scale, { x: 1, y: 1 }, DEAL_FLY, 'backOut', function() {
            setTimeout(function() {
              if (typeof playgent !== 'undefined' && playgent.sound) playgent.sound('card.flip');
              c.flip(true, function() {
                /* Card revealed — sparks burst */
                EffectPool.emitSparks(tx, ty, idx >= 3 ? 12 : 5, C.GOLD);
                delete Renderer._animatingCards[idx];
                /* Progressive hand/odds update after each card reveal */
                SpectatorOdds.onCardRevealed(idx + 1);
                Renderer._updateProgressiveActionBar(idx + 1);
              });
              /* Flop slam shake */
              if (isFlop && idx === 0) ScreenShake.shake(3);
              /* River dramatic shake */
              if (idx === 4) ScreenShake.shake(5);
            }, fd);
          });
        }, d);
      })(card, targetX, targetY, delay, flipDelay, ci, prevCCLen === 0, isAllInRunout, w, h);
    }

    return totalDuration;
  },

  onStateChange: function(view, legalActions, context) {
    var myId = context.myId;
    Renderer._myId = myId;
    Renderer._lastLegalActions = legalActions;
    Renderer._lastContext = context;
    var prev = Renderer._prevView;
    var w = Renderer.app.screen.width;
    var h = Renderer.app.screen.height;
    var isSD = view.phase === 'showdown';

    /* ── Community card reveal ── */
    var prevCCLen = prev && prev.communityCards ? prev.communityCards.length : 0;
    var newCCLen = view.communityCards ? view.communityCards.length : 0;
    var revealDuration = 0;
    if (prev && newCCLen > prevCCLen) {
      revealDuration = Renderer._animateCommunityCards(view, prevCCLen, newCCLen);
    }
    Renderer._playVisiblePlayerActionSounds(prev, view, myId);

    /* ── Detect new all-in ── */
    if (prev && view.players) {
      for (var ai = 0; ai < view.players.length; ai++) {
        var pp = view.players[ai];
        var prevP = null;
        if (prev.players) {
          for (var pi = 0; pi < prev.players.length; pi++) {
            if (prev.players[pi].id === pp.id) { prevP = prev.players[pi]; break; }
          }
        }
        if (pp.allIn && prevP && !prevP.allIn) {
          AllInEffect.play(w, h);
        }
      }
    }

    /* ── Showdown result ── */
    if (isSD && view.result && !(prev && prev.result)) {
      if (typeof playgent !== 'undefined' && playgent.sound) {
        if (view.result.winners && view.result.winners.indexOf(myId) !== -1) playgent.sound('coin.pickup');
        else if (myId) playgent.sound('negative.light');
        else playgent.sound('game.over');
      }
      /* Wait for card animations to finish, then show celebration */
      var celebrationDelay = Math.max(revealDuration + 500, 800);

      setTimeout(function() {
        ShowdownBanner.show(view, context, w, h);
      }, celebrationDelay);

      if (view.result.winners && view.result.winners.length > 0) {
        var _wId = view.result.winners[0];
        var _wNode = PlayerNode.internalNodes[_wId];
        var _wIsMe = _wId === myId;
        var _wX = _wIsMe ? w / 2 : (_wNode ? _wNode.x : w / 2);
        var _wY = _wIsMe ? Layout.myCardsY() : (_wNode ? _wNode.y : h * 0.4);

        /* Chips fly to winner */
        setTimeout(function() {
          ChipAnim.potToWinner(_wX, _wY, Math.ceil(view.result.pot / 50));
        }, celebrationDelay + 200);

        /* Coin rain: only visible to the winner and true spectators (not losers).
           True spectator = myId not in view.players at all. Eliminated players
           are still in view.players with eliminated:true, so they don't count. */
        if (!view.result.byFold) {
          var _isTrueSpectator = !view.players.some(function(p) { return p.id === myId; });
          if (_wIsMe || _isTrueSpectator) {
            setTimeout(function() {
              EffectPool.coinRainOnWinner(w / 2, w * 0.6, 22);
              ScreenShake.shake(4);
            }, celebrationDelay + 500);
          }
        }
      }
    }

    /* Hide showdown elements when leaving showdown phase */
    if (!isSD && Renderer._lastPhase === 'showdown') {
      ShowdownBanner.hide();
      /* Clear hand labels between hands (SpectatorOdds will re-show on next update) */
      var nodeKeys = Object.keys(PlayerNode.internalNodes);
      for (var nk = 0; nk < nodeKeys.length; nk++) {
        var n = PlayerNode.internalNodes[nodeKeys[nk]];
        if (n.internalWinPct) n.internalWinPct.visible = false;
        if (n.internalHandName) n.internalHandName.visible = false;
      }
    }

    /* ── Update views (immediate, but respects _animatingCards) ── */
    TableView.update(view, Renderer._animatingCards);

    /* Player nodes — REPOSITION FIRST (sets x/y and _quadrant),
       THEN update from view (uses _quadrant for card/info layout) */
    if (view.players) {
      /* Step 1: Create nodes (no layout yet) */
      for (var ni = 0; ni < view.players.length; ni++) {
        var pd = view.players[ni];
        if (pd.id === myId) continue;
        var node = PlayerNode.getOrCreate(pd.id, Renderer._playerLayer);
        if (node.internalBetChip && !node.internalBetChip.parent) {
          Renderer._chipLayer.addChild(node.internalBetChip);
        }
      }
      /* Step 2: Position nodes and assign quadrants */
      PlayerNode.repositionAll(view, myId);
      /* Step 3: Now update visuals using correct quadrants */
      for (var ni2 = 0; ni2 < view.players.length; ni2++) {
        var pd2 = view.players[ni2];
        if (pd2.id === myId) continue;
        var node2 = PlayerNode.internalNodes[pd2.id];
        if (node2) PlayerNode.updateFromView(node2, pd2, view, context, view.turn === pd2.id);
      }
      /* Step 4: Update bet chip positions using final node coordinates */
      for (var bi = 0; bi < view.players.length; bi++) {
        var bpd = view.players[bi];
        if (bpd.id === myId) continue;
        var bnode = PlayerNode.internalNodes[bpd.id];
        if (bnode && bnode.internalBetChip && bnode.internalBetChip.visible) {
          var betPos = Layout.betChipPos(bnode.x, bnode.y, bnode);
          bnode.internalBetChip.x = betPos.x;
          bnode.internalBetChip.y = betPos.y;
        }
      }
    }

    /* Spectator odds: unified module handles all phases (pre-flop through showdown) */
    SpectatorOdds.update(view, context);

    ActionBar.update(view, legalActions, context);

    if (view.phase === 'gameover' && Renderer._lastPhase !== 'gameover' && typeof playgent !== 'undefined' && playgent.sound) {
      playgent.sound(view.gameWinner === myId ? 'game.victory' : (myId ? 'game.defeat' : 'game.over'));
    }

    Renderer._prevView = JSON.parse(JSON.stringify(view));
    Renderer._lastPhase = view.phase;
  }
};

/* ===== INITIALIZATION ===== */
(function() {
  var _pendingState = null;
  var _pendingActions = null;
  var _pendingCtx = null;
  var _ready = false;

  function onState(view, legalActions, context) {
    if (_ready) {
      Renderer.onStateChange(view, legalActions, context);
    } else {
      _pendingState = view;
      _pendingActions = legalActions;
      _pendingCtx = context;
    }
  }

  if (typeof playgent !== 'undefined' && playgent.onStateChange) {
    playgent.onStateChange(onState);
  } else {
    var pCheck = setInterval(function() {
      if (typeof playgent !== 'undefined' && playgent.onStateChange) {
        clearInterval(pCheck);
        playgent.onStateChange(onState);
      }
    }, 50);
  }

  function tryInit() {
    if (typeof PIXI === 'undefined') { setTimeout(tryInit, 50); return; }
    Renderer.init().then(function() {
      _ready = true;
      if (_pendingState) {
        Renderer.onStateChange(_pendingState, _pendingActions, _pendingCtx);
        _pendingState = null;
      }
    }).catch(function(err) {
      var container = document.getElementById('game-container');
      var wrapper = document.createElement('div');
      wrapper.style.cssText = 'color:#ff6666;padding:20px;font-family:monospace;font-size:14px;';
      var title = document.createElement('p');
      title.textContent = 'Failed to initialize game renderer';
      title.style.fontWeight = 'bold';
      var msg = document.createElement('p');
      msg.style.cssText = 'margin-top:8px;color:#aaa;';
      msg.textContent = err.message || String(err);
      wrapper.appendChild(title);
      wrapper.appendChild(msg);
      container.textContent = '';
      container.appendChild(wrapper);
    });
  }
  tryInit();
})();

window.__playgentCheckLayout = function() {
  var failures = window.__playgentE2E ? window.__playgentE2E.checkLayout() : [];
  if (Renderer && Renderer._lastLegalActions && Renderer._lastLegalActions.length > 0) {
    if (!ActionBar || !ActionBar.internalButtons || ActionBar.internalButtons.length === 0) {
      failures.push('active legal actions did not create visible action buttons');
    }
  }
  return failures;
};
</script>
