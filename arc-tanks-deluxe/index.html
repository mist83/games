<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #030307;
  color: #f7f3d2;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
#game-container {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  background: #05050c;
}
#fallback {
  position: fixed;
  inset: 0;
  display: none;
  place-items: center;
  padding: 20px;
  z-index: 10;
  background: #101724;
}
#select-panel {
  position: fixed;
  left: 50%;
  top: 54px;
  transform: translateX(-50%);
  width: min(1180px, calc(100vw - 18px));
  max-height: calc(100vh - 78px);
  display: grid;
  grid-template-rows: auto minmax(0, 1fr);
  gap: 8px;
  padding: 9px;
  border: 2px solid #8b8b8b;
  border-radius: 4px;
  background: linear-gradient(180deg, #424242 0%, #202020 56%, #090909 100%);
  box-shadow: 0 16px 44px rgba(0, 0, 0, 0.62);
  z-index: 6;
}
#select-panel[hidden] { display: none; }
.select-head {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 12px;
  padding: 3px 7px 7px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.18);
}
.select-head strong {
  color: #f7f3d2;
  text-align: center;
  font-family: Georgia, "Times New Roman", serif;
  font-size: 24px;
  font-weight: 950;
  letter-spacing: 0;
  text-shadow: 0 2px 0 #000;
}
.select-head span {
  color: #ffd166;
  font-size: 12px;
  font-weight: 900;
  text-transform: uppercase;
}
.weapon-shop-layout {
  min-height: 0;
  display: grid;
  grid-template-columns: minmax(170px, 230px) minmax(0, 1fr) minmax(170px, 230px);
  gap: 9px;
}
.shop-center {
  min-height: 0;
  display: grid;
  grid-template-rows: auto minmax(0, 1fr) auto;
  gap: 7px;
}
.shop-prompt {
  color: #f7f3d2;
  text-align: center;
  font-size: 13px;
  font-weight: 950;
  text-shadow: 0 2px 0 #000;
}
#select-grid {
  min-height: 0;
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 6px;
  overflow: auto;
  padding: 4px;
  border: 2px inset #161616;
  background: #060606;
}
.weapon-card {
  min-width: 0;
  min-height: 52px;
  display: grid;
  grid-template-columns: 18px minmax(0, 1fr) auto;
  grid-template-rows: 1fr auto;
  gap: 2px 6px;
  align-items: center;
  padding: 6px;
  border: 1px solid #303030;
  border-radius: 2px;
  background: linear-gradient(180deg, #111, #050505);
  color: #f7f3d2;
  font: inherit;
  text-align: left;
  cursor: default;
}
.weapon-card.pickable {
  border-color: #f0d878;
  cursor: pointer;
}
.weapon-card.p1 {
  border-color: #4aa3ff;
  background: linear-gradient(180deg, #102845, #050914);
}
.weapon-card.p2 {
  border-color: #ff5b4d;
  background: linear-gradient(180deg, #481210, #130404);
}
.weapon-card:disabled {
  opacity: 0.72;
}
.weapon-card strong,
.weapon-card span,
.weapon-card em {
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.weapon-icon,
.weapon-dot {
  display: block;
  width: 13px;
  height: 13px;
  border: 1px solid #f7f3d2;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #fff4b0 0%, #ff9f1a 38%, #7f1f09 100%);
  box-shadow: 0 0 0 1px #000;
}
.weapon-card .weapon-icon {
  grid-row: 1 / 3;
}
.weapon-card strong {
  min-width: 0;
  font-size: 12px;
  line-height: 1.15;
  font-weight: 950;
}
.weapon-card span {
  color: #9fd4c0;
  font-size: 10px;
  font-weight: 850;
}
.weapon-card em {
  justify-self: end;
  color: #ffd166;
  font-size: 10px;
  font-style: normal;
  font-weight: 950;
}
#select-random {
  justify-self: center;
  min-width: 130px;
  min-height: 36px;
  border: 2px outset #8b8b8b;
  border-radius: 3px;
  background: linear-gradient(180deg, #e9e9e9, #777 55%, #222);
  color: #050505;
  font-size: 13px;
  font-weight: 950;
  cursor: pointer;
}
#select-random:disabled {
  opacity: 0.48;
  cursor: wait;
}
.loadout-box {
  min-height: 0;
  overflow: auto;
  padding: 8px;
  border: 2px solid rgba(245, 238, 204, 0.28);
  border-radius: 3px;
  background: #050505;
}
.loadout-box.p1 { border-color: #3f9fff; }
.loadout-box.p2 { border-color: #ff4a3a; }
.loadout-box h3 {
  margin: 0 0 7px;
  color: #ffd166;
  font-size: 12px;
  font-weight: 950;
  text-transform: uppercase;
}
.loadout-line {
  display: grid;
  grid-template-columns: 16px minmax(0, 1fr);
  gap: 5px;
  align-items: center;
  min-height: 21px;
  color: #ecf5df;
  font-size: 11px;
  line-height: 1.26;
  font-weight: 760;
}
.loadout-line span:last-child {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.loadout-empty {
  color: #909090;
  font-size: 11px;
  font-weight: 850;
}
#action-panel {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  display: grid;
  grid-template-columns: minmax(158px, 1.25fr) 38px minmax(92px, 0.72fr) 38px 38px minmax(92px, 0.72fr) 38px 38px minmax(92px, 0.72fr) 38px minmax(78px, 0.58fr);
  gap: 6px;
  align-items: end;
  padding: 8px 11px 10px;
  border-top: 3px solid #8c8c8c;
  background: linear-gradient(180deg, #4b4b4b 0%, #252525 42%, #090909 100%);
  box-shadow: 0 -14px 44px rgba(0, 0, 0, 0.55);
  z-index: 5;
}
#action-panel[hidden] { display: none; }
#shot-recap {
  position: absolute;
  left: 11px;
  bottom: calc(100% + 6px);
  max-width: min(420px, calc(100vw - 22px));
  padding: 6px 9px;
  border: 1px solid rgba(245, 238, 204, 0.24);
  border-radius: 5px;
  color: #f7f3d2;
  background: rgba(8, 8, 8, 0.86);
  box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
  font-size: 11px;
  font-weight: 900;
  text-transform: uppercase;
}
#shot-recap[hidden] { display: none; }
.control-field {
  min-width: 0;
  display: grid;
  gap: 5px;
}
.control-field label {
  color: #d7d7d7;
  font-size: 10px;
  font-weight: 900;
  text-transform: uppercase;
}
#weapon-select,
.control-field input,
#fire-button,
.step-button {
  width: 100%;
  min-height: 43px;
  border-radius: 7px;
  font: inherit;
}
#weapon-select,
.control-field input {
  border: 2px inset #5d5d5d;
  background: #050505;
  color: #f7f3d2;
}
#weapon-select {
  padding: 0 10px;
  font-size: 13px;
  font-weight: 850;
}
#weapon-readout {
  min-height: 30px;
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 5px;
}
#weapon-readout span {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  padding: 5px 6px;
  border: 1px solid rgba(245, 238, 204, 0.12);
  border-radius: 5px;
  color: #e5e5e5;
  background: rgba(245, 238, 204, 0.04);
  font-size: 10px;
  font-weight: 850;
}
.range-value {
  color: #ffd166;
  font-weight: 950;
}
.step-button {
  border: 1px solid rgba(245, 238, 204, 0.22);
  background: linear-gradient(180deg, #787878, #222);
  color: #f7f3d2;
  font-size: 20px;
  font-weight: 950;
  cursor: pointer;
}
#fire-button {
  border: 0;
  background: linear-gradient(180deg, #ffe18a, #ff6f1e 52%, #b31408);
  color: #130700;
  font-size: 14px;
  font-weight: 950;
  font-style: italic;
  cursor: pointer;
}
#fire-button:disabled {
  opacity: 0.55;
  cursor: wait;
}
#telemetry {
  position: fixed;
  width: 1px;
  height: 1px;
  overflow: hidden;
  opacity: 0;
  pointer-events: none;
}
@media (max-width: 760px) {
  #select-panel {
    top: 42px;
    max-height: calc(100vh - 54px);
  }
  .weapon-shop-layout {
    grid-template-columns: 1fr 1fr;
  }
  .shop-center {
    grid-column: 1 / -1;
    grid-row: 1;
  }
  .loadout-box.p1 { grid-column: 1; grid-row: 2; }
  .loadout-box.p2 { grid-column: 2; grid-row: 2; }
  #select-grid {
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }
  .weapon-card {
    min-height: 47px;
    padding: 6px;
  }
  .weapon-card strong { font-size: 10px; }
  .weapon-card span { font-size: 9px; }
  #action-panel {
    grid-template-columns: 36px minmax(0, 1fr) 36px 36px minmax(0, 1fr) 64px;
    gap: 6px;
    padding: 8px;
  }
  #weapon-field {
    grid-column: 1 / -1;
    grid-row: 1;
  }
  #weapon-readout {
    display: none;
  }
  #move-left {
    grid-column: 1;
    grid-row: 2;
  }
  #move-field {
    grid-column: 2;
    grid-row: 2;
  }
  #move-right {
    grid-column: 3;
    grid-row: 2;
  }
  #angle-down {
    grid-column: 4;
    grid-row: 2;
  }
  #angle-field {
    grid-column: 5;
    grid-row: 2;
  }
  #angle-up {
    grid-column: 6;
    grid-row: 2;
  }
  #power-down {
    grid-column: 1;
    grid-row: 3;
  }
  #power-field {
    grid-column: 2 / 5;
    grid-row: 3;
  }
  #power-up {
    grid-column: 5;
    grid-row: 3;
  }
  #fire-button {
    grid-column: 6;
    grid-row: 3;
    min-height: 43px;
    font-size: 11px;
    padding: 0 4px;
  }
  .step-button,
  #weapon-select,
  .control-field input,
  #fire-button {
    min-height: 38px;
  }
  .control-field {
    gap: 3px;
  }
  .control-field label {
    font-size: 8px;
  }
}
@media (max-width: 430px) {
  #select-grid { gap: 4px; }
  .control-field label { font-size: 9px; }
}
</style>

<div id="game-container" data-board></div>
<div id="fallback">Arc Tanks Deluxe renderer is loading.</div>
<div id="select-panel" hidden>
  <div class="select-head">
    <strong id="select-title">Weapon Shop</strong>
    <span id="select-status">Draft</span>
  </div>
  <div class="weapon-shop-layout">
    <div class="loadout-box p1">
      <h3 id="loadout-p1-title">P1 (0/10)</h3>
      <div id="loadout-p1"></div>
    </div>
    <div class="shop-center">
      <div class="shop-prompt">Select a Weapon:</div>
      <div id="select-grid" aria-label="Selectable weapons"></div>
      <button id="select-random" type="button">Random All</button>
    </div>
    <div class="loadout-box p2">
      <h3 id="loadout-p2-title">P2 (0/10)</h3>
      <div id="loadout-p2"></div>
    </div>
  </div>
</div>
<div id="action-panel" hidden>
  <div id="shot-recap" hidden aria-hidden="true"></div>
  <div class="control-field" id="weapon-field">
    <label for="weapon-select">Weapon <span id="weapon-count"></span></label>
    <select id="weapon-select" aria-label="Weapon"></select>
    <div id="weapon-readout" aria-hidden="true"></div>
  </div>
  <button id="move-left" class="step-button" type="button" aria-label="Move left">-</button>
  <div class="control-field" id="move-field">
    <label for="move-input">Move <span class="range-value" id="move-value">0</span> <span id="move-fuel"></span></label>
    <input id="move-input" type="range" min="-64" max="64" step="1" value="0" aria-label="Move">
  </div>
  <button id="move-right" class="step-button" type="button" aria-label="Move right">+</button>
  <button id="angle-down" class="step-button" type="button" aria-label="Decrease angle">-</button>
  <div class="control-field" id="angle-field">
    <label for="angle-input">Angle <span class="range-value" id="angle-value">45</span></label>
    <input id="angle-input" type="range" min="5" max="85" step="1" value="45" aria-label="Angle">
  </div>
  <button id="angle-up" class="step-button" type="button" aria-label="Increase angle">+</button>
  <button id="power-down" class="step-button" type="button" aria-label="Decrease power">-</button>
  <div class="control-field" id="power-field">
    <label for="power-input">Power <span class="range-value" id="power-value">82</span></label>
    <input id="power-input" type="range" min="20" max="100" step="1" value="82" aria-label="Power">
  </div>
  <button id="power-up" class="step-button" type="button" aria-label="Increase power">+</button>
  <button id="fire-button" type="button">FIRE</button>
</div>
<div id="telemetry" data-phase="loading" data-status="loading" data-player="spectator"></div>
