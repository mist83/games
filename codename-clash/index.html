<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #101411;
    --ink: #15110c;
    --paper: #f3dfb4;
    --paper-2: #dcc28c;
    --cream: #fff1cf;
    --red: #e73f4d;
    --red-dark: #6f1721;
    --blue: #23bfd2;
    --blue-dark: #104a57;
    --neutral: #b98f52;
    --assassin: #070707;
    --green: #62d68a;
    --amber: #f8b94b;
    --muted: #9a8e77;
    --panel: rgba(24, 28, 22, 0.9);
    --line: rgba(255, 231, 179, 0.2);
  }

  body {
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    background:
      linear-gradient(135deg, rgba(231, 63, 77, 0.16), transparent 28%),
      linear-gradient(315deg, rgba(35, 191, 210, 0.15), transparent 30%),
      repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.025) 0 1px, transparent 1px 42px),
      repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.018) 0 1px, transparent 1px 42px),
      var(--bg);
    color: var(--cream);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  button, input {
    font: inherit;
  }

  button {
    -webkit-tap-highlight-color: transparent;
  }

  #app {
    position: relative;
    isolation: isolate;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    display: grid;
    grid-template-rows: auto minmax(0, 1fr);
    overflow: hidden;
  }

  #app::before {
    content: "";
    position: absolute;
    inset: 0;
    z-index: -2;
    background:
      linear-gradient(180deg, rgba(255, 238, 194, 0.05), transparent 18%, rgba(0, 0, 0, 0.26)),
      repeating-linear-gradient(115deg, transparent 0 26px, rgba(255, 238, 194, 0.035) 26px 27px);
  }

  #app::after {
    content: "";
    position: absolute;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    opacity: 0.45;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.045), transparent);
    animation: scanSweep 6s linear infinite;
  }

  @keyframes scanSweep {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  .topbar {
    min-height: 88px;
    display: grid;
    grid-template-columns: minmax(220px, 1fr) auto minmax(220px, 1fr);
    align-items: center;
    gap: 14px;
    padding: 12px 18px;
    border-bottom: 1px solid var(--line);
    background: rgba(10, 13, 10, 0.82);
    box-shadow: 0 14px 40px rgba(0, 0, 0, 0.36);
  }

  .brand {
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .crest {
    width: 52px;
    height: 52px;
    flex: 0 0 auto;
    filter: drop-shadow(0 0 16px rgba(248, 185, 75, 0.28));
  }

  .title {
    font-size: 19px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: 0;
    color: var(--cream);
  }

  .phase-line {
    margin-top: 7px;
    min-height: 18px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .score-strip {
    display: grid;
    grid-template-columns: 128px 42px 128px;
    align-items: center;
    gap: 8px;
  }

  .team-score {
    min-width: 0;
    height: 58px;
    border: 1px solid var(--line);
    border-radius: 8px;
    display: grid;
    grid-template-columns: 8px minmax(0, 1fr);
    overflow: hidden;
    background: rgba(255, 241, 207, 0.08);
    box-shadow: inset 0 0 24px rgba(0, 0, 0, 0.22);
    transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
  }

  .team-score.active {
    border-color: rgba(255, 241, 207, 0.58);
    box-shadow: 0 0 22px rgba(255, 241, 207, 0.12), inset 0 0 24px rgba(0, 0, 0, 0.24);
    transform: translateY(-1px);
  }

  .team-score .stripe { width: 8px; }
  .team-score.red .stripe { background: linear-gradient(180deg, var(--red), var(--red-dark)); }
  .team-score.blue .stripe { background: linear-gradient(180deg, var(--blue), var(--blue-dark)); }

  .team-score .score-inner {
    min-width: 0;
    padding: 8px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .team-name {
    font-size: 11px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .team-score.red .team-name { color: #ff9aa1; }
  .team-score.blue .team-name { color: #9fefff; }

  .remaining {
    font-size: 25px;
    font-weight: 950;
    line-height: 1;
    color: var(--cream);
    text-shadow: 0 0 18px rgba(255, 241, 207, 0.18);
  }

  .vs {
    height: 42px;
    border: 1px solid var(--line);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--amber);
    font-size: 12px;
    font-weight: 950;
    background: rgba(0, 0, 0, 0.35);
  }

  .identity {
    justify-self: end;
    min-width: 0;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 10px;
  }

  .identity-pill {
    min-width: 0;
    max-width: 260px;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 9px 12px;
    background: rgba(255, 241, 207, 0.08);
  }

  .identity-name {
    font-size: 13px;
    font-weight: 900;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .identity-role {
    margin-top: 2px;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.7px;
    font-weight: 800;
  }

  .table {
    min-height: 0;
    display: grid;
    grid-template-columns: minmax(210px, 250px) minmax(0, 1fr) minmax(230px, 280px);
    gap: 14px;
    padding: 14px;
    overflow: hidden;
  }

  .panel {
    min-width: 0;
    min-height: 0;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--panel);
    box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.04);
    overflow: hidden;
  }

  .intel-panel,
  .action-panel {
    display: flex;
    flex-direction: column;
  }

  .panel-head {
    flex: 0 0 auto;
    padding: 12px 13px 9px;
    border-bottom: 1px solid var(--line);
    font-size: 11px;
    font-weight: 950;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--amber);
  }

  .panel-body {
    min-height: 0;
    padding: 12px;
    overflow: hidden;
  }

  .clue-display {
    border: 1px solid rgba(248, 185, 75, 0.35);
    border-radius: 8px;
    padding: 12px;
    background:
      linear-gradient(135deg, rgba(248, 185, 75, 0.12), rgba(255, 241, 207, 0.04)),
      rgba(0, 0, 0, 0.18);
  }

  .clue-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 900;
  }

  .clue-word {
    margin-top: 5px;
    font-size: 28px;
    font-weight: 950;
    line-height: 1;
    color: var(--cream);
    overflow-wrap: anywhere;
  }

  .clue-count {
    margin-top: 8px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 40px;
    min-height: 32px;
    border-radius: 6px;
    background: var(--amber);
    color: var(--ink);
    font-size: 18px;
    font-weight: 950;
  }

  .roster {
    display: grid;
    gap: 8px;
    margin-top: 12px;
  }

  .roster-team {
    border: 1px solid var(--line);
    border-radius: 8px;
    overflow: hidden;
    background: rgba(255, 241, 207, 0.055);
  }

  .roster-title {
    padding: 7px 9px;
    font-size: 10px;
    font-weight: 950;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    display: flex;
    justify-content: space-between;
  }

  .roster-title.red { color: #ff9aa1; border-bottom: 1px solid rgba(231, 63, 77, 0.28); }
  .roster-title.blue { color: #9fefff; border-bottom: 1px solid rgba(35, 191, 210, 0.28); }

  .agent-list {
    display: grid;
    gap: 5px;
    padding: 8px;
  }

  .agent {
    min-width: 0;
    display: grid;
    grid-template-columns: 26px minmax(0, 1fr);
    gap: 7px;
    align-items: center;
  }

  .avatar {
    width: 26px;
    height: 26px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 950;
    color: white;
  }

  .avatar.red { background: linear-gradient(135deg, var(--red), var(--red-dark)); }
  .avatar.blue { background: linear-gradient(135deg, var(--blue), var(--blue-dark)); color: #06262d; }

  .agent-name {
    min-width: 0;
    font-size: 12px;
    font-weight: 850;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .agent-role {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 850;
  }

  .board-panel {
    min-width: 0;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
    background:
      linear-gradient(135deg, rgba(255, 241, 207, 0.08), rgba(0, 0, 0, 0.16)),
      rgba(13, 17, 13, 0.82);
  }

  .board-wrap {
    width: min(100%, 640px);
    height: auto;
    aspect-ratio: 1 / 1;
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    grid-template-rows: repeat(5, minmax(0, 1fr));
    gap: 8px;
    padding: 10px;
    border-radius: 8px;
    background:
      linear-gradient(135deg, rgba(255, 241, 207, 0.2), rgba(255, 241, 207, 0.06)),
      #181611;
    border: 1px solid rgba(255, 241, 207, 0.24);
    box-shadow: 0 26px 90px rgba(0, 0, 0, 0.36), inset 0 0 0 1px rgba(0, 0, 0, 0.35);
  }

  .word-card {
    position: relative;
    min-width: 0;
    min-height: 0;
    width: 100%;
    height: 100%;
    border: 0;
    border-radius: 8px;
    color: var(--ink);
    background:
      linear-gradient(135deg, rgba(255, 255, 255, 0.33), rgba(255, 255, 255, 0.02)),
      linear-gradient(180deg, var(--paper), var(--paper-2));
    box-shadow:
      0 9px 0 rgba(70, 48, 20, 0.7),
      0 17px 24px rgba(0, 0, 0, 0.28),
      inset 0 0 0 1px rgba(255, 255, 255, 0.38);
    cursor: default;
    overflow: hidden;
    transform: translateZ(0);
    transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
  }

  .word-card::before {
    content: "";
    position: absolute;
    inset: 5px;
    border: 1px solid rgba(41, 25, 12, 0.18);
    border-radius: 6px;
    pointer-events: none;
  }

  .word-card.can-guess {
    cursor: pointer;
    animation: cardReady 1.6s ease-in-out infinite;
  }

  .word-card.can-guess:hover,
  .word-card.can-guess:focus-visible {
    transform: translateY(-5px) scale(1.02);
    box-shadow:
      0 14px 0 rgba(70, 48, 20, 0.72),
      0 24px 34px rgba(0, 0, 0, 0.34),
      0 0 28px rgba(248, 185, 75, 0.28),
      inset 0 0 0 1px rgba(255, 255, 255, 0.48);
    outline: none;
  }

  @keyframes cardReady {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.09); }
  }

  .word-card.revealed {
    color: white;
    box-shadow: 0 8px 0 rgba(0, 0, 0, 0.46), 0 16px 28px rgba(0, 0, 0, 0.34);
  }

  .word-card.team-red { background: linear-gradient(150deg, #ff7580, var(--red) 48%, var(--red-dark)); }
  .word-card.team-blue { background: linear-gradient(150deg, #71efff, var(--blue) 45%, var(--blue-dark)); color: #061e24; }
  .word-card.team-neutral { background: linear-gradient(150deg, #e7c58c, var(--neutral) 48%, #5b4225); }
  .word-card.team-assassin { background: linear-gradient(145deg, #333, #050505 48%, #000); color: #f4ede2; }

  .word-card.key-red { box-shadow: 0 9px 0 rgba(70, 48, 20, 0.7), 0 0 0 3px rgba(231, 63, 77, 0.75), 0 17px 24px rgba(0, 0, 0, 0.28); }
  .word-card.key-blue { box-shadow: 0 9px 0 rgba(70, 48, 20, 0.7), 0 0 0 3px rgba(35, 191, 210, 0.78), 0 17px 24px rgba(0, 0, 0, 0.28); }
  .word-card.key-neutral { box-shadow: 0 9px 0 rgba(70, 48, 20, 0.7), 0 0 0 3px rgba(185, 143, 82, 0.74), 0 17px 24px rgba(0, 0, 0, 0.28); }
  .word-card.key-assassin { box-shadow: 0 9px 0 rgba(70, 48, 20, 0.7), 0 0 0 3px rgba(0, 0, 0, 0.9), 0 0 32px rgba(255, 255, 255, 0.14), 0 17px 24px rgba(0, 0, 0, 0.28); }

  .word-index {
    position: absolute;
    top: 7px;
    left: 8px;
    font-size: 10px;
    font-weight: 950;
    opacity: 0.56;
  }

  .word-text {
    position: absolute;
    inset: 20px 8px 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 15px;
    line-height: 1.05;
    font-weight: 950;
    letter-spacing: 0;
    overflow-wrap: anywhere;
    text-transform: uppercase;
  }

  .key-chip {
    position: absolute;
    right: 7px;
    bottom: 7px;
    min-width: 26px;
    height: 22px;
    padding: 0 6px;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.72);
    color: white;
    font-size: 10px;
    font-weight: 950;
    letter-spacing: 0.4px;
  }

  .word-card.team-blue .key-chip { color: #061e24; background: rgba(255, 255, 255, 0.72); }

  .action-form {
    display: grid;
    gap: 10px;
  }

  .clue-input {
    width: 100%;
    min-height: 46px;
    border: 1px solid rgba(255, 241, 207, 0.26);
    border-radius: 8px;
    padding: 10px 12px;
    background: rgba(255, 241, 207, 0.12);
    color: var(--cream);
    outline: none;
    font-size: 15px;
    font-weight: 850;
  }

  .clue-input:focus {
    border-color: var(--amber);
    box-shadow: 0 0 0 3px rgba(248, 185, 75, 0.14);
  }

  .clue-input::placeholder { color: rgba(255, 241, 207, 0.44); }

  .count-row {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 7px;
  }

  .count-btn,
  .primary-btn,
  .pass-btn {
    min-height: 44px;
    border: 1px solid rgba(255, 241, 207, 0.22);
    border-radius: 8px;
    color: var(--cream);
    background: rgba(255, 241, 207, 0.1);
    cursor: pointer;
    font-weight: 950;
    transition: transform 0.12s ease, background 0.12s ease, box-shadow 0.12s ease;
  }

  .count-btn.active {
    background: var(--amber);
    color: var(--ink);
    box-shadow: 0 0 24px rgba(248, 185, 75, 0.26);
  }

  .primary-btn {
    background: linear-gradient(135deg, var(--amber), #ffdf74);
    color: var(--ink);
    box-shadow: 0 10px 28px rgba(248, 185, 75, 0.22);
  }

  .pass-btn {
    width: 100%;
    background: linear-gradient(135deg, rgba(255, 241, 207, 0.16), rgba(255, 241, 207, 0.08));
  }

  .count-btn:active,
  .primary-btn:active,
  .pass-btn:active {
    transform: scale(0.98);
  }

  .status-card {
    border-radius: 8px;
    padding: 13px;
    border: 1px solid var(--line);
    background: rgba(255, 241, 207, 0.07);
  }

  .status-kicker {
    font-size: 10px;
    font-weight: 950;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .status-main {
    margin-top: 6px;
    font-size: 18px;
    font-weight: 950;
    line-height: 1.12;
    color: var(--cream);
    overflow-wrap: anywhere;
  }

  .log-list {
    display: grid;
    gap: 7px;
    margin-top: 10px;
  }

  .log-item {
    font-size: 11px;
    line-height: 1.25;
    color: rgba(255, 241, 207, 0.76);
    border-left: 2px solid rgba(248, 185, 75, 0.42);
    padding-left: 8px;
  }

  .effect-layer {
    position: fixed;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 20;
  }

  .flash {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 18;
    animation: flashOut 650ms ease-out forwards;
  }

  .flash.good { background: radial-gradient(circle at center, rgba(98, 214, 138, 0.34), transparent 52%); }
  .flash.bad { background: radial-gradient(circle at center, rgba(248, 185, 75, 0.3), rgba(231, 63, 77, 0.15), transparent 58%); }
  .flash.fatal { background: radial-gradient(circle at center, rgba(255, 255, 255, 0.22), rgba(231, 63, 77, 0.36), rgba(0, 0, 0, 0.74)); }

  @keyframes flashOut {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  .burst {
    position: fixed;
    width: 10px;
    height: 10px;
    left: var(--x);
    top: var(--y);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    background: var(--c);
    box-shadow: 0 0 18px var(--c);
    animation: burstFly 900ms cubic-bezier(.2,.7,.2,1) forwards;
  }

  @keyframes burstFly {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(0.6); }
    100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0.15); }
  }

  .banner {
    position: fixed;
    left: 50%;
    top: 50%;
    z-index: 22;
    transform: translate(-50%, -50%);
    min-width: 260px;
    max-width: min(86vw, 620px);
    border-radius: 8px;
    padding: 18px 22px;
    text-align: center;
    border: 1px solid rgba(255, 241, 207, 0.38);
    background: rgba(10, 12, 10, 0.92);
    box-shadow: 0 28px 110px rgba(0, 0, 0, 0.58);
    animation: bannerPop 1500ms ease-out forwards;
  }

  .banner.good { color: var(--green); }
  .banner.bad { color: var(--amber); }
  .banner.fatal { color: #ff6572; }

  .banner-title {
    font-size: 30px;
    font-weight: 950;
    line-height: 1;
    text-transform: uppercase;
  }

  .banner-sub {
    margin-top: 8px;
    color: var(--cream);
    font-size: 13px;
    font-weight: 800;
  }

  @keyframes bannerPop {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.82); }
    15% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
    75% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -58%) scale(0.96); }
  }

  .confetti {
    position: fixed;
    top: -14px;
    left: var(--x);
    width: 9px;
    height: 13px;
    border-radius: 2px;
    background: var(--c);
    animation: confettiDrop var(--dur) linear forwards;
  }

  @keyframes confettiDrop {
    0% { opacity: 1; transform: translateY(-20px) rotate(0deg); }
    100% { opacity: 0; transform: translateY(110vh) rotate(740deg); }
  }

  .shake {
    animation: screenShake 460ms ease-in-out;
  }

  @keyframes screenShake {
    0%, 100% { filter: none; }
    15% { filter: contrast(1.18) brightness(1.08) saturate(1.15); }
    30% { filter: contrast(0.94) brightness(0.95) saturate(1.3); }
    45% { filter: contrast(1.22) brightness(1.05) saturate(0.9); }
    60% { filter: contrast(0.96) brightness(1.12) saturate(1.25); }
    75% { filter: contrast(1.12) brightness(0.98) saturate(1.08); }
  }

  @media (max-width: 920px) {
    .topbar {
      min-height: 98px;
      grid-template-columns: minmax(0, 1fr) auto;
      grid-template-areas:
        "brand identity"
        "score score";
      gap: 8px 10px;
      padding: 10px 12px;
    }

    .brand { grid-area: brand; }
    .identity { grid-area: identity; }
    .score-strip {
      grid-area: score;
      width: 100%;
      grid-template-columns: 1fr 38px 1fr;
    }

    .crest { width: 42px; height: 42px; }
    .title { font-size: 17px; }
    .phase-line { font-size: 10px; }
    .team-score { height: 42px; }
    .team-score .score-inner { padding: 6px 8px; }
    .remaining { font-size: 20px; }
    .identity-pill { max-width: 122px; padding: 7px 8px; }
    .identity-name { font-size: 12px; }
    .identity-role { font-size: 9px; }

    .table {
      grid-template-columns: minmax(0, 1fr);
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 8px;
      padding: 8px;
    }

    .panel-head {
      display: none;
    }

    .intel-panel {
      max-height: 88px;
    }

    .intel-panel .panel-body {
      padding: 8px;
      display: grid;
      grid-template-columns: minmax(120px, 0.7fr) minmax(0, 1fr);

<script>

    var height = Number(rect.height) || 0;

    var top = Math.max(0, y);
    var right = Math.min(window.innerWidth, x + width);
    var bottom = Math.min(window.innerHeight, y + height);

  function e2eRegisterRegion(region) {

      id: String(region.id),
      kind: region.kind || "button",
      label: region.label || "",
      actionType: region.actionType || "",
      rect: { x: Number(r.x) || 0, y: Number(r.y) || 0, width: Number(r.width) || 0, height: Number(r.height) || 0 },
      center: region.center || { x: (Number(r.x) || 0) + (Number(r.width) || 0) / 2, y: (Number(r.y) || 0) + (Number(r.height) || 0) / 2 }

    for (var j = 0; j < dom.length; j++) {

  }
}());

  function escapeHtml(value) {

  }

  function unwrapAction(option) {
    if (option && typeof option === "object" && option.decision !== undefined) return option.decision;
    if (option && typeof option === "object" && option.action !== undefined) return option.action;
    return option;
  }

  function normalizeActions(actions) {
    var out = [];
    for (var i = 0; actions && i < actions.length; i++) out.push(unwrapAction(actions[i]));
    return out;
  }

  function legalGuessMap(actions) {
    var out = {};
    for (var i = 0; i < actions.length; i++) {
      if (actions[i].type === "guess") out[actions[i].index] = true;
    }
    return out;
  }

  function renderHeader(view, actions, ctx) {
    var app = document.getElementById("app");
    var status = ctx.gameOver ? "game-over" : actions.length > 0 ? "your-turn" : "waiting";
    app.setAttribute("data-phase", view.phase || "");
    app.setAttribute("data-status", status);
    app.setAttribute("data-current-player", view.currentPlayerId || "");

    document.getElementById("red-remaining").textContent = view.remaining ? view.remaining.red : 9;
    document.getElementById("blue-remaining").textContent = view.remaining ? view.remaining.blue : 8;
    document.getElementById("red-score").classList.toggle("active", view.currentTeam === "red");
    document.getElementById("blue-score").classList.toggle("active", view.currentTeam === "blue");

    var phaseLine = document.getElementById("phase-line");
    var actor = playerName(view.currentPlayerId, ctx.players);
    if (view.phase === "clue") {
      phaseLine.textContent = teamLabel(view.currentTeam) + " spymaster: " + actor;
    } else if (view.phase === "guess") {
      phaseLine.textContent = teamLabel(view.currentTeam) + " operative: " + playerName(view.activeGuesser, ctx.players);
    } else if (view.phase === "gameOverDisplay" || view.phase === "gameOver") {
      phaseLine.textContent = teamLabel(view.winnerTeam) + " team secured the field";
    } else {
      phaseLine.textContent = "Dossier active";
    }

    var myName = ctx.myId ? playerName(ctx.myId, ctx.players) : "Spectator";
    var role = view.myRole || "spectator";
    var team = view.myTeam ? teamLabel(view.myTeam) + " " : "";
    document.getElementById("identity-name").textContent = myName;
    document.getElementById("identity-role").textContent = team + role;
  }

  function renderClue(view) {
    var box = document.getElementById("clue-box");
    if (view.clue) {
      box.innerHTML =
        '<div class="clue-label">' + escapeHtml(teamLabel(view.clue.team)) + ' clue</div>' +
        '<div class="clue-word">' + escapeHtml(view.clue.word) + '</div>' +
        '<div class="clue-count">' + escapeHtml(view.clue.count) + '</div>';
    } else if (view.phase === "gameOverDisplay" || view.phase === "gameOver") {
      box.innerHTML =
        '<div class="clue-label">Result</div>' +
        '<div class="clue-word">' + escapeHtml(teamLabel(view.winnerTeam)) + '</div>' +
        '<div class="clue-count">WIN</div>';
    } else {
      box.innerHTML =
        '<div class="clue-label">Awaiting clue</div>' +
        '<div class="clue-word">' + escapeHtml(teamLabel(view.currentTeam)) + '</div>' +
        '<div class="clue-count">--</div>';
    }
  }

  function renderRoster(view, ctx) {
    var roster = document.getElementById("roster");
    var html = "";
    var teams = ["red", "blue"];
    for (var t = 0; t < teams.length; t++) {
      var team = teams[t];
      var ids = view.teams && view.teams[team] ? view.teams[team] : [];
      html += '<div class="roster-team">';
      html += '<div class="roster-title ' + team + '"><span>' + teamLabel(team) + '</span><span>' + ids.length + '</span></div>';
      html += '<div class="agent-list">';
      for (var i = 0; i < ids.length; i++) {
        var id = ids[i];
        var meta = metaFor(view, id);
        var name = playerName(id, ctx.players);
        html += '<div class="agent" data-player="' + escapeHtml(id) + '">';
        html += '<div class="avatar ' + team + '">' + escapeHtml(initial(name)) + '</div>';
        html += '<div><div class="agent-name">' + escapeHtml(name) + '</div><div class="agent-role">' + escapeHtml(meta.role) + '</div></div>';
        html += '</div>';
      }
      html += '</div></div>';
    }
    roster.innerHTML = html;
  }

  function renderBoard(view, actions) {
    var board = document.getElementById("board");
    var legal = legalGuessMap(actions);
    var canGuess = actionTypeSet(actions).guess;
    board.innerHTML = "";

    for (var i = 0; i < (view.cards || []).length; i++) {
      var card = view.cards[i];
      var btn = document.createElement("button");
      var visibleTeam = card.team || "unknown";
      var cls = "word-card";
      if (card.revealed) cls += " revealed team-" + visibleTeam;
      if (view.keyVisible && !card.revealed) cls += " key-" + visibleTeam;
      if (canGuess && legal[card.index]) cls += " can-guess";
      btn.className = cls;
      btn.type = "button";
      btn.setAttribute("data-card", String(card.index));
      btn.setAttribute("data-index", String(card.index));
      btn.disabled = !(canGuess && legal[card.index]);

      btn.innerHTML =
        '<span class="word-index">' + card.index + '</span>' +
        '<span class="word-text">' + escapeHtml(card.word) + '</span>' +
        ((view.keyVisible || card.revealed) && visibleTeam !== "unknown"
          ? '<span class="key-chip">' + escapeHtml(keyLabel(visibleTeam)) + '</span>'
          : "");

      if (canGuess && legal[card.index]) {
        (function(idx) {
          btn.addEventListener("click", function() {
            if (playgent.sound) playgent.sound("ui.select");
            playgent.submitAction({ type: "guess", index: idx });
          });
        })(card.index);
      }

      board.appendChild(btn);
    }
  }

  function renderActions(view, actions) {
    var body = document.getElementById("action-body");
    var types = actionTypeSet(actions);
    body.setAttribute("data-submission-status", actions.length > 0 ? "pending" : "submitted");

    if (types.clue) {
      var max = Math.max(1, Math.min(5, view.remaining ? view.remaining[view.currentTeam] : 5));
      if (selectedCount > max) selectedCount = max;
      var html = '<div class="action-form">';
      html += '<input class="clue-input" id="clue-input" maxlength="24" autocomplete="off" placeholder="Clue word" value="' + escapeHtml(actions[0].word || "") + '">';
      html += '<button class="primary-btn" id="send-clue" type="button">Give Clue</button>';
      html += '<div class="count-row">';
      for (var i = 1; i <= 5; i++) {
        html += '<button class="count-btn' + (i === selectedCount ? ' active' : '') + '" type="button" data-count="' + i + '"' + (i > max ? ' disabled' : '') + '>' + i + '</button>';
      }
      html += '</div></div>';
      body.innerHTML = html;

      var input = document.getElementById("clue-input");
      var send = document.getElementById("send-clue");
      var countButtons = body.querySelectorAll(".count-btn");
      for (var c = 0; c < countButtons.length; c++) {
        countButtons[c].addEventListener("click", function() {
          selectedCount = Number(this.getAttribute("data-count")) || 1;
          if (playgent.sound) playgent.sound("ui.select");
          renderActions(view, actions);
        });
      }
      send.addEventListener("click", function() {
        var word = input.value.trim() || actions[0].word || "signal";
        if (playgent.sound) playgent.sound("ui.confirm");
        playgent.submitAction({ type: "clue", word: word, count: selectedCount });
        send.disabled = true;
      });
      input.addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
          send.click();
        }
      });
      return;
    }

    if (view.phase === "guess" && (types.guess || types.pass)) {
      var activeName = view.activeGuesser ? view.activeGuesser : "";
      var guessHtml = '<div class="status-card">';
      guessHtml += '<div class="status-kicker">' + escapeHtml(teamLabel(view.currentTeam)) + ' field guess</div>';
      guessHtml += '<div class="status-main">' + escapeHtml((view.guessesMade || 0) + " / " + (view.maxGuesses || 0)) + '</div>';
      guessHtml += '</div>';
      if (types.pass) guessHtml += '<button class="pass-btn" id="pass-btn" type="button">Pass</button>';
      body.innerHTML = guessHtml;
      var passBtn = document.getElementById("pass-btn");
      if (passBtn) {
        passBtn.addEventListener("click", function() {
          if (playgent.sound) playgent.sound("ui.cancel");
          playgent.submitAction({ type: "pass" });
          passBtn.disabled = true;
        });
      }
      return;
    }

    var label = "Standing by";
    if (view.phase === "clue") label = teamLabel(view.currentTeam) + " spymaster";
    if (view.phase === "guess") label = teamLabel(view.currentTeam) + " operative";
    if (view.phase === "gameOverDisplay" || view.phase === "gameOver") label = teamLabel(view.winnerTeam) + " victory";
    var html2 = '<div class="status-card"><div class="status-kicker">Status</div><div class="status-main">' + escapeHtml(label) + '</div></div>';
    html2 += '<div class="log-list">';
    var log = view.log || [];
    for (var l = Math.max(0, log.length - 4); l < log.length; l++) {
      html2 += '<div class="log-item">' + escapeHtml(log[l]) + '</div>';
    }
    html2 += '</div>';
    body.innerHTML = html2;
  }

  function updatePlayerContainer(ctx) {
    var pc = document.getElementById("player-container");
    pc.innerHTML = "";
    var players = ctx.players || [];
    for (var i = 0; i < players.length; i++) {
      var span = document.createElement("span");
      span.setAttribute("data-player", players[i].id);
      span.textContent = players[i].name || players[i].id;
      pc.appendChild(span);
    }
  }

  function effectColors(tone, team) {
    if (tone === "fatal") return ["#ffffff", "#ff6572", "#000000", "#e73f4d"];
    if (tone === "bad") return ["#f8b94b", "#ff6572", "#fff1cf", "#b98f52"];
    if (team === "blue") return ["#23bfd2", "#9fefff", "#fff1cf", "#62d68a"];
    return ["#e73f4d", "#ff9aa1", "#fff1cf", "#62d68a"];
  }

  function flash(tone) {
    var layer = document.getElementById("effect-layer");
    var div = document.createElement("div");
    div.className = "flash " + tone;
    layer.appendChild(div);
    setTimeout(function() { if (div.parentNode) div.parentNode.removeChild(div); }, 700);
  }

  function banner(title, sub, tone) {
    var layer = document.getElementById("effect-layer");
    var div = document.createElement("div");
    div.className = "banner " + tone;
    div.innerHTML = '<div class="banner-title">' + escapeHtml(title) + '</div><div class="banner-sub">' + escapeHtml(sub) + '</div>';
    layer.appendChild(div);
    setTimeout(function() { if (div.parentNode) div.parentNode.removeChild(div); }, 1600);
  }

  function burstAt(element, tone, team) {
    var rect = element.getBoundingClientRect();
    var cx = rect.left + rect.width / 2;
    var cy = rect.top + rect.height / 2;
    var layer = document.getElementById("effect-layer");
    var colors = effectColors(tone, team);
    var count = tone === "fatal" ? 58 : tone === "bad" ? 34 : 42;
    for (var i = 0; i < count; i++) {
      var p = document.createElement("div");
      var angle = (Math.PI * 2 * i / count) + uiRand() * 0.35;
      var dist = (tone === "fatal" ? 250 : 145) * (0.45 + uiRand() * 0.65);
      p.className = "burst";
      p.style.setProperty("--x", cx + "px");
      p.style.setProperty("--y", cy + "px");
      p.style.setProperty("--dx", Math.cos(angle) * dist + "px");
      p.style.setProperty("--dy", Math.sin(angle) * dist + "px");
      p.style.setProperty("--c", colors[i % colors.length]);
      p.style.width = (6 + uiRand() * 10) + "px";
      p.style.height = p.style.width;
      layer.appendChild(p);
      setTimeout((function(node) {
        return function() { if (node.parentNode) node.parentNode.removeChild(node); };
      })(p), 1000);
    }
  }

  function screenShake() {
    var app = document.getElementById("app");
    app.classList.remove("shake");
    void app.offsetWidth;
    app.classList.add("shake");
  }

  function playRevealEffect(view) {
    var reveal = view.lastReveal;
    if (!reveal || reveal.seq === lastRevealSeq) return;
    lastRevealSeq = reveal.seq;
    var tone = reveal.outcome === "fatal" ? "fatal" : reveal.outcome === "good" ? "good" : "bad";
    var card = document.querySelector('[data-card="' + reveal.index + '"]');
    setTimeout(function() {
      if (playgent.sound) playgent.sound(tone === "good" ? "positive.clean" : (tone === "fatal" ? "negative.sting" : "negative.warning"));
      if (card) burstAt(card, tone, reveal.kind);
      flash(tone);
      banner(revealTitle(reveal), revealSubtitle(reveal), tone);
      if (tone !== "good") screenShake();
    }, 80);
  }

  function confetti(team) {
    var layer = document.getElementById("effect-layer");
    var colors = team === "blue"
      ? ["#23bfd2", "#9fefff", "#fff1cf", "#62d68a"]
      : ["#e73f4d", "#ff9aa1", "#fff1cf", "#f8b94b"];
    for (var i = 0; i < 90; i++) {
      var c = document.createElement("div");
      c.className = "confetti";
      c.style.setProperty("--x", (uiRand() * 100) + "vw");
      c.style.setProperty("--c", colors[i % colors.length]);
      c.style.setProperty("--dur", (2200 + uiRand() * 1700) + "ms");
      c.style.animationDelay = (uiRand() * 350) + "ms";
      layer.appendChild(c);
      setTimeout((function(node) {
        return function() { if (node.parentNode) node.parentNode.removeChild(node); };
      })(c), 4500);
    }
  }

  function playFinale(view) {
    if (view.phase !== "gameOverDisplay" && view.phase !== "gameOver") return;
    var key = view.winnerTeam + ":" + view.winnerReason;
    if (key === lastFinaleKey) return;
    lastFinaleKey = key;
    var viewerWon = !view.myTeam || view.myTeam === view.winnerTeam;
    if (viewerWon) {
      if (playgent.sound) playgent.sound("game.victory");
      confetti(view.winnerTeam);
      banner(teamLabel(view.winnerTeam) + " Wins", view.winnerReason || "Mission complete", "good");
      flash("good");
    } else {
      if (playgent.sound) playgent.sound("game.defeat");
      banner("Mission Failed", teamLabel(view.winnerTeam) + " team wins", "bad");
      flash("bad");
      screenShake();
    }
  }

  playgent.onStateChange(function(view, legalActions, ctx) {
    legalActions = normalizeActions(legalActions || []);
    renderHeader(view, legalActions, ctx);
    renderClue(view);
    renderRoster(view, ctx);
    renderBoard(view, legalActions);
    renderActions(view, legalActions);
    updatePlayerContainer(ctx);
    playRevealEffect(view);
    playFinale(view);
  });
})();
</script>
