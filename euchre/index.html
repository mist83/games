<style>
* { box-sizing: border-box; }
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #090b12;
  color: #f7f1dc;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
#game-container {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
}
#hud {
  position: fixed;
  z-index: 3;
  top: max(10px, env(safe-area-inset-top));
  left: 50%;
  width: min(calc(100vw - 18px), 980px);
  transform: translateX(-50%);
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
  gap: 8px;
  align-items: stretch;
  pointer-events: none;
}
.hud-panel {
  min-width: 0;
  min-height: 52px;
  border: 1px solid rgba(255, 216, 105, 0.26);
  border-radius: 8px;
  background: rgba(10, 14, 22, 0.76);
  box-shadow: 0 10px 26px rgba(0, 0, 0, 0.26), inset 0 1px 0 rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(8px);
  padding: 8px 10px;
}
.phase {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 3px;
}
.phase-label {
  color: #ffd866;
  font-weight: 900;
  font-size: 13px;
  letter-spacing: 0;
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.status {
  color: #f7f1dc;
  font-size: 13px;
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.score {
  display: grid;
  grid-template-columns: 1fr 1fr;
  width: min(330px, 38vw);
  gap: 8px;
}
.score-team {
  min-width: 92px;
  border-radius: 7px;
  padding: 6px 10px;
  background: rgba(255, 255, 255, 0.07);
  border: 1px solid rgba(255, 255, 255, 0.1);
  text-align: center;
}
.score-team b {
  display: block;
  color: #9fe9d7;
  font-size: 11px;
  font-weight: 850;
  text-transform: uppercase;
}
.score-team:nth-child(2) b { color: #ff9bb1; }
.score-team span {
  display: block;
  font-weight: 950;
  font-size: 23px;
  line-height: 1;
  margin-top: 2px;
}
.trump-box {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  gap: 8px;
  align-items: center;
}
.suit-chip {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  border: 1px solid rgba(255, 255, 255, 0.18);
  background: rgba(255, 255, 255, 0.08);
  color: #ffd866;
  font-size: 22px;
  font-family: Georgia, serif;
  box-shadow: inset 0 0 16px rgba(255, 216, 102, 0.16);
}
.trump-lines {
  min-width: 0;
}
.trump-lines b {
  display: block;
  font-size: 11px;
  color: #b9c6d3;
  text-transform: uppercase;
  font-weight: 800;
}
.trump-lines span {
  display: block;
  margin-top: 2px;
  font-size: 13px;
  color: #fff7df;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#actions {
  position: fixed;
  z-index: 4;
  left: 50%;
  bottom: max(10px, env(safe-area-inset-bottom));
  transform: translateX(-50%);
  width: min(calc(100vw - 18px), 790px);
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  gap: 8px;
  pointer-events: auto;
}
#actions button {
  min-height: 44px;
  max-width: min(220px, calc(50vw - 18px));
  border: 1px solid rgba(255, 255, 255, 0.16);
  border-radius: 8px;
  background: #172031;
  color: #f8f1df;
  box-shadow: 0 10px 24px rgba(0, 0, 0, 0.32), inset 0 1px 0 rgba(255, 255, 255, 0.1);
  padding: 0 14px;
  font-size: 13px;
  font-weight: 850;
  letter-spacing: 0;
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#actions button.trump, #actions button.play {
  background: linear-gradient(180deg, #1b6f6c, #104c55);
  border-color: rgba(137, 255, 226, 0.28);
}
#actions button.jackpot {
  background: linear-gradient(180deg, #9a263e, #611d44);
  border-color: rgba(255, 216, 102, 0.42);
}
#actions button.pass, #actions button.discard {
  background: linear-gradient(180deg, #293348, #161f30);
}
#actions button:active {
  transform: translateY(1px);
}
@media (max-width: 640px) {
  #hud {
    grid-template-columns: minmax(0, 1fr) minmax(112px, auto);
    gap: 6px;
  }
  .score {
    grid-column: 1 / 3;
    grid-row: 2;
    width: 100%;
  }
  .hud-panel {
    min-height: 48px;
    padding: 7px 8px;
  }
  .status, .trump-lines span { font-size: 12px; }
  #actions {
    gap: 6px;
  }
  #actions button {
    min-height: 42px;
    max-width: calc(50vw - 14px);
    padding: 0 10px;
    font-size: 12px;
  }
}
</style>

<div id="game-container"></div>
<div id="hud">
  <div class="hud-panel phase">
    <div id="phase-label" class="phase-label" data-phase>Loading</div>
    <div id="status-label" class="status" data-status>Warming up the table</div>
  </div>
  <div class="hud-panel score">
    <div class="score-team"><b>Team A</b><span id="score-a">0</span></div>
    <div class="score-team"><b>Team B</b><span id="score-b">0</span></div>
  </div>
  <div class="hud-panel trump-box">
    <div id="trump-chip" class="suit-chip">?</div>
    <div class="trump-lines">
      <b id="trump-kicker" data-player>Trump</b>
      <span id="trump-label">No trump yet</span>
    </div>
  </div>
</div>
<div id="actions"></div>

<script>
(function() {
  var E2E_GAME_SLUG = "euchre";
  var E2E = window.__playgentE2EState || {
    version: 1,
    regions: [],
    lastPhase: "loading",
    lastStatus: "loading",
    lastPlayerId: "",
    lastCurrentPlayer: "",
    lastLegalActionCount: 0,
    lastVisibleLegalActionCount: 0,
    lastActions: [],
    lastRawActions: []
  };
  window.__playgentE2EState = E2E;

  function setE2EAttr(el, name, value) {
    if (!el) return;
    el.setAttribute(name, value == null ? "" : String(value));
  }

  function unwrapE2EAction(option) {
    if (option && typeof option === "object" && option.decision !== undefined) return option.decision;
    if (option && typeof option === "object" && option.action !== undefined) return option.action;
    return option;
  }

  function isVisibleE2EAction(action) {
    action = unwrapE2EAction(action);
    if (!action || typeof action !== "object") return false;
    if (action.type === "advance_phase" || action.type === "system" || action.type === "noop") return false;
    return true;
  }

  function getVisibleE2EActions(actions) {
    var out = [];
    for (var i = 0; actions && i < actions.length; i++) {
      if (isVisibleE2EAction(actions[i])) out.push(unwrapE2EAction(actions[i]));
    }
    return out;
  }

  function ensureE2ETelemetry() {
    var el = document.getElementById("e2e-telemetry");
    if (!el) {
      el = document.createElement("div");
      el.id = "e2e-telemetry";
      if (document.body) document.body.appendChild(el);
    }
    el.setAttribute("aria-hidden", "true");
    el.style.cssText = "position:fixed;width:1px;height:1px;overflow:hidden;opacity:0;pointer-events:none;left:0;top:0;";
    setE2EAttr(el, "data-game", E2E_GAME_SLUG);
    setE2EAttr(el, "data-phase", E2E.lastPhase);
    setE2EAttr(el, "data-status", E2E.lastStatus);
    setE2EAttr(el, "data-player", E2E.lastPlayerId || "spectator");
    return el;
  }

  function addUnique(list, el) {
    if (!el) return;
    for (var i = 0; i < list.length; i++) if (list[i] === el) return;
    list.push(el);
  }

  function getE2ERoots() {
    var roots = [];
    addUnique(roots, ensureE2ETelemetry());
    addUnique(roots, document.getElementById("telemetry"));
    addUnique(roots, document.getElementById("game"));
    addUnique(roots, document.getElementById("game-container"));
    addUnique(roots, document.querySelector("[data-board]"));
    return roots;
  }

  function getCurrentPlayerE2E(view) {
    if (!view) return "";
    return view.currentPlayer || view.currentPlayerId || view.currentActor || view.turn || "";
  }

  function updateE2EPlayers(players) {
    var telemetry = ensureE2ETelemetry();
    var host = document.getElementById("e2e-players");
    if (!host) {
      host = document.createElement("div");
      host.id = "e2e-players";
      telemetry.appendChild(host);
    }
    host.textContent = "";
    for (var i = 0; players && i < players.length; i++) {
      var p = players[i] || {};
      var span = document.createElement("span");
      setE2EAttr(span, "data-player", p.id || "");
      setE2EAttr(span, "data-player-name", p.name || p.id || "");
      span.textContent = p.name || p.id || "";
      host.appendChild(span);
    }
  }

  function updateE2ELandmarks(view, legalActions, context) {
    var visibleActions = getVisibleE2EActions(legalActions || []);
    var phase = context && context.gameOver ? "game-over" : (view && (view.phase || view.mode || view.stage) ? (view.phase || view.mode || view.stage) : "playing");
    var status = context && context.gameOver ? "game-over" : (visibleActions.length > 0 ? "your-turn" : "waiting");
    var playerId = context && context.myId ? context.myId : "spectator";
    var currentPlayer = getCurrentPlayerE2E(view);
    var roots = getE2ERoots();
    E2E.lastPhase = phase;
    E2E.lastStatus = status;
    E2E.lastPlayerId = playerId;
    E2E.lastCurrentPlayer = currentPlayer;
    E2E.lastRawActions = legalActions || [];
    E2E.lastActions = visibleActions;
    E2E.lastLegalActionCount = (legalActions || []).length;
    E2E.lastVisibleLegalActionCount = visibleActions.length;
    for (var i = 0; i < roots.length; i++) {
      setE2EAttr(roots[i], "data-game", E2E_GAME_SLUG);
      setE2EAttr(roots[i], "data-phase", phase);
      setE2EAttr(roots[i], "data-status", status);
      setE2EAttr(roots[i], "data-player", playerId);
      setE2EAttr(roots[i], "data-current-player", currentPlayer);
      if (view && view.round != null) setE2EAttr(roots[i], "data-round", view.round);
      if (view && view.turnNumber != null) setE2EAttr(roots[i], "data-turn", view.turnNumber);
    }
    updateE2EPlayers(context && context.players ? context.players : []);
  }

  function actionTypeForIndex(idx) {
    var raw = E2E.lastRawActions && E2E.lastRawActions[idx] ? unwrapE2EAction(E2E.lastRawActions[idx]) : null;
    return raw && raw.type ? raw.type : "choose";
  }

  function safeLabelFromNode(node) {
    var label = node.getAttribute("data-action-label") || node.getAttribute("aria-label") || node.title || node.textContent || node.value || "";
    return String(label).replace(/\s+/g, " ").trim().slice(0, 100);
  }

  function decorateE2EDOMControls() {
    var nodes = document.querySelectorAll("[data-action-idx], [data-action], button, [role='button'], input[type='button'], input[type='submit'], input:not([type='hidden']), select, textarea, [data-cell], [data-card], [data-card-id], [data-option-id], [data-brainrot], canvas");
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      if (node.hasAttribute("data-action") && !node.hasAttribute("data-action-idx")) {
        node.setAttribute("data-action-idx", node.getAttribute("data-action"));
      }
      if (node.hasAttribute("data-action-idx")) {
        var idx = parseInt(node.getAttribute("data-action-idx"), 10);
        if (!isNaN(idx) && !node.hasAttribute("data-action-type")) node.setAttribute("data-action-type", actionTypeForIndex(idx));
        if (!node.hasAttribute("data-action-label")) node.setAttribute("data-action-label", safeLabelFromNode(node));
      }
      if (node.hasAttribute("data-cell") && !node.getAttribute("aria-label")) {
        node.setAttribute("aria-label", "cell " + node.getAttribute("data-cell"));
      }
      if ((node.hasAttribute("data-card") || node.hasAttribute("data-card-id")) && !node.getAttribute("aria-label")) {
        node.setAttribute("aria-label", "card " + (node.getAttribute("data-card") || node.getAttribute("data-card-id")));
      }
      if (node.tagName === "CANVAS" && !node.getAttribute("aria-label")) {
        node.setAttribute("aria-label", E2E_GAME_SLUG + " canvas");
      }
    }
  }

  function e2eBeginFrame(view, legalActions, context) {
    E2E.regions = [];
    updateE2ELandmarks(view || {}, legalActions || [], context || {});
  }

  function e2eAfterRender() {
    decorateE2EDOMControls();
  }

  function isVisibleE2ENode(node) {
    if (!node || !node.getBoundingClientRect) return false;
    var rect = node.getBoundingClientRect();
    if (rect.width <= 0 || rect.height <= 0) return false;
    if (rect.right <= 0 || rect.bottom <= 0 || rect.left >= window.innerWidth || rect.top >= window.innerHeight) return false;
    var style = window.getComputedStyle ? window.getComputedStyle(node) : null;
    if (style && (style.display === "none" || style.visibility === "hidden" || style.opacity === "0")) return false;
    if (node.disabled || node.getAttribute("aria-disabled") === "true") return false;
    return true;
  }

  function regionKindForNode(node) {
    if (node.tagName === "CANVAS") return "canvas";
    if (node.tagName === "INPUT" || node.tagName === "SELECT" || node.tagName === "TEXTAREA") return "input";
    if (node.hasAttribute("data-cell")) return "cell";
    if (node.hasAttribute("data-card") || node.hasAttribute("data-card-id")) return "card";
    return "button";
  }

  function getDOMActionRegions() {
    decorateE2EDOMControls();
    var nodes = document.querySelectorAll("[data-action-idx], button, [role='button'], input[type='button'], input[type='submit'], input:not([type='hidden']), select, textarea, [data-cell], [data-card], [data-card-id], [data-option-id], [data-brainrot], canvas");
    var out = [];
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      if (!isVisibleE2ENode(node)) continue;
      var r = clipE2ERect(node.getBoundingClientRect());
      if (!r) continue;
      var id = node.id || node.getAttribute("data-action-idx") || node.getAttribute("data-cell") || node.getAttribute("data-card") || node.getAttribute("data-card-id") || node.getAttribute("data-option-id") || node.getAttribute("data-brainrot") || ("control-" + i);
      out.push({
        id: String(id),
        kind: regionKindForNode(node),
        label: safeLabelFromNode(node),
        actionType: node.getAttribute("data-action-type") || "",
        selector: node.id ? ("#" + node.id) : "",
        rect: { x: r.left, y: r.top, width: r.width, height: r.height },
        center: { x: r.left + r.width / 2, y: r.top + r.height / 2 }
      });
    }
    return out;
  }

  function clipE2ERect(rect) {
    if (!rect) return null;
    var x = Number(rect.x != null ? rect.x : rect.left) || 0;
    var y = Number(rect.y != null ? rect.y : rect.top) || 0;
    var width = Number(rect.width) || 0;
    var height = Number(rect.height) || 0;
    var left = Math.max(0, x);
    var top = Math.max(0, y);
    var right = Math.min(window.innerWidth, x + width);
    var bottom = Math.min(window.innerHeight, y + height);
    if (right - left <= 0 || bottom - top <= 0) return null;
    return { x: left, y: top, width: right - left, height: bottom - top };
  }

  function e2eRegisterRegion(region) {
    if (!region || !region.id || !region.rect) return;
    var r = clipE2ERect(region.rect);
    if (!r || r.width == null || r.height == null) return;
    var item = {
      id: String(region.id),
      kind: region.kind || "button",
      label: region.label || "",
      actionType: region.actionType || "",
      rect: { x: Number(r.x) || 0, y: Number(r.y) || 0, width: Number(r.width) || 0, height: Number(r.height) || 0 },
      center: region.center || { x: (Number(r.x) || 0) + (Number(r.width) || 0) / 2, y: (Number(r.y) || 0) + (Number(r.height) || 0) / 2 }
    };
    for (var i = 0; i < E2E.regions.length; i++) {
      if (E2E.regions[i].id === item.id) {
        E2E.regions[i] = item;
        return;
      }
    }
    E2E.regions.push(item);
  }

  function e2eCanvasRect(localRect, app) {
    var canvas = app && app.canvas ? app.canvas : document.querySelector("canvas");
    var screen = app && app.screen ? app.screen : null;
    if (!canvas || !localRect) return null;
    var canvasRect = canvas.getBoundingClientRect();
    var screenW = screen && screen.width ? screen.width : canvasRect.width;
    var screenH = screen && screen.height ? screen.height : canvasRect.height;
    var sx = canvasRect.width / (screenW || canvasRect.width || 1);
    var sy = canvasRect.height / (screenH || canvasRect.height || 1);
    return {
      x: canvasRect.left + localRect.x * sx,
      y: canvasRect.top + localRect.y * sy,
      width: localRect.width * sx,
      height: localRect.height * sy
    };
  }

  function e2ePixiBounds(displayObject, app) {
    if (!displayObject || !displayObject.getBounds) return null;
    var b = displayObject.getBounds();
    return e2eCanvasRect({ x: b.x, y: b.y, width: b.width, height: b.height }, app);
  }

  function getE2ECanvasInfo() {
    var canvas = document.querySelector("canvas");
    if (!canvas) return null;
    var rect = canvas.getBoundingClientRect();
    return { selector: "canvas", width: rect.width, height: rect.height };
  }

  function getAllE2ERegions() {
    var out = E2E.regions.slice();
    var dom = getDOMActionRegions();
    var seen = {};
    var merged = [];
    for (var i = 0; i < out.length; i++) { seen[out[i].id] = true; merged.push(out[i]); }
    for (var j = 0; j < dom.length; j++) {
      if (!seen[dom[j].id]) merged.push(dom[j]);
    }
    return merged;
  }

  function runE2ELayoutChecks() {
    var failures = [];
    var regions = getAllE2ERegions();
    var canvas = getE2ECanvasInfo();
    if (E2E.lastVisibleLegalActionCount > 0 && regions.length === 0) {
      failures.push({ severity: "error", message: "active legal actions did not create visible controls" });
    }
    if (canvas && (canvas.width <= 0 || canvas.height <= 0)) {
      failures.push({ severity: "error", message: "canvas has empty bounds" });
    }
    for (var i = 0; i < regions.length; i++) {
      var region = regions[i];
      var r = region.rect;
      if (!r) {
        failures.push({ severity: "error", message: region.id + " has no rect" });
        continue;
      }
      if (r.width <= 0 || r.height <= 0) failures.push({ severity: "error", message: region.id + " has empty bounds" });
      if (r.x < -1 || r.y < -1 || r.x + r.width > window.innerWidth + 1 || r.y + r.height > window.innerHeight + 1) {
        failures.push({ severity: "error", message: region.id + " is offscreen" });
      }
      if (region.kind !== "canvas" && (r.width < 36 || r.height < 36)) {
        failures.push({ severity: "warning", message: region.id + " is a small touch target" });
      }
    }
    return failures;
  }

  window.__playgentE2EBegin = e2eBeginFrame;
  window.__playgentE2EAfterRender = e2eAfterRender;
  window.__playgentE2ERegisterRegion = e2eRegisterRegion;
  window.__playgentE2ECanvasRect = e2eCanvasRect;
  window.__playgentE2EPixiBounds = e2ePixiBounds;
  window.__playgentE2ERunLayoutChecks = runE2ELayoutChecks;
  window.__playgentE2E = {
    version: 1,
    getSnapshot: function() {
      return {
        phase: E2E.lastPhase,
        status: E2E.lastStatus,
        playerId: E2E.lastPlayerId,
        currentPlayer: E2E.lastCurrentPlayer,
        legalActionCount: E2E.lastVisibleLegalActionCount,
        regionCount: getAllE2ERegions().length,
        canvas: getE2ECanvasInfo()
      };
    },
    getInteractiveRegions: function() { return getAllE2ERegions(); },
    checkLayout: function() { return runE2ELayoutChecks(); }
  };

  if (typeof window.__playgentCheckLayout !== "function") {
    window.__playgentCheckLayout = function() { return runE2ELayoutChecks(); };
  }

  function patchPlaygentE2E() {
    if (!window.playgent || !window.playgent.onStateChange || window.playgent.__e2ePatched) return false;
    var original = window.playgent.onStateChange;
    window.playgent.onStateChange = function(cb) {
      return original.call(window.playgent, function(view, legalActions, context) {
        e2eBeginFrame(view, legalActions, context || {});
        var result = cb.apply(this, arguments);
        e2eAfterRender();
        return result;
      });
    };
    window.playgent.__e2ePatched = true;
    return true;
  }

  ensureE2ETelemetry();
  decorateE2EDOMControls();
  if (!patchPlaygentE2E()) {
    var tries = 0;
    var timer = setInterval(function() {
      tries++;
      if (patchPlaygentE2E() || tries > 80) clearInterval(timer);
    }, 50);
  }
}());
</script>

<script>
var SuitSymbols = { s: "\u2660", h: "\u2665", d: "\u2666", c: "\u2663" };
var SuitNames = { s: "Spades", h: "Hearts", d: "Diamonds", c: "Clubs" };
var SuitColors = { s: 0x1b2638, c: 0x1b2638, h: 0xb72643, d: 0xb72643 };
var ToneColors = {
  deal: 0x55d6c2,
  quiet: 0xaeb7c5,
  trump: 0xffd866,
  jackpot: 0xff4f86,
  loner: 0xff4f86,
  trick: 0x63e6be,
  march: 0xffc857,
  euchre: 0xff5a5f,
  point: 0x7bdff2,
  game_over: 0xffd866
};

var Tween = {
  items: [],
  to: function(target, props, duration, ease, done) {
    var starts = {};
    var keys = Object.keys(props);
    for (var i = 0; i < keys.length; i++) starts[keys[i]] = target[keys[i]];
    Tween.items.push({ target: target, props: props, starts: starts, duration: Math.max(1, duration), elapsed: 0, ease: ease || "out", done: done || null });
  },
  update: function(ms) {
    var keep = [];
    for (var i = 0; i < Tween.items.length; i++) {
      var t = Tween.items[i];
      t.elapsed += ms;
      var p = Math.min(1, t.elapsed / t.duration);
      var e = Tween.ease(p, t.ease);
      var keys = Object.keys(t.props);
      for (var k = 0; k < keys.length; k++) {
        var key = keys[k];
        t.target[key] = t.starts[key] + (t.props[key] - t.starts[key]) * e;
      }
      if (p >= 1) {
        if (t.done) t.done();
      } else {
        keep.push(t);
      }
    }
    Tween.items = keep;
  },
  ease: function(p, type) {
    if (type === "in") return p * p;
    if (type === "back") {
      var c = 1.70158;
      var q = p - 1;
      return 1 + q * q * ((c + 1) * q + c);
    }
    return 1 - Math.pow(1 - p, 3);
  }
};

var Renderer = {
  app: null,
  world: null,

  seatLayer: null,

      app.stage.addChild(Renderer.world);

      Renderer.world.x = Math.sin(Renderer.time * 0.045) * Renderer.shake;
      Renderer.world.y = Math.cos(Renderer.time * 0.052) * Renderer.shake * 0.55;

      Renderer.world.y = 0;

  onStateChange: function(view, legalActions, context) {

    }
    if (view.lastEvent && (!Renderer.prevView || !Renderer.prevView.lastEvent || Renderer.prevView.lastEvent.id !== view.lastEvent.id)) {

    }

    Renderer.prevView = JSON.parse(JSON.stringify(view));
    Renderer.lastView = view;
    Renderer.lastActions = legalActions || [];
    Renderer.lastContext = context || {};

  cacheNames: function(context) {

  layout: function() {

    var actionH = Renderer.actionHeight(h);
    var topH = Math.max(window.innerWidth < 640 ? 118 : 74, hudBottom + 14);

    var cy = topH + (h - topH - actionH - 26) * 0.46;
    var rx = Math.min(w * 0.36, (h - topH - actionH) * 0.45);
    var ry = Math.min((h - topH - actionH) * 0.25, w * 0.28);
    rx = Math.max(128, rx);
    ry = Math.max(86, ry);
    return { w: w, h: h, cx: cx, cy: cy, rx: rx, ry: ry, topH: topH, actionH: actionH };

  actionHeight: function(screenH) {
    var actionEl = document.getElementById("actions");

  drawBackground: function(layout) {

  createTitleNode: function() {
    var marquee = new PIXI.Container();

    var inner = new PIXI.Graphics();
    inner.roundRect(layout.cx - layout.rx * 0.82, layout.cy - layout.ry * 0.66, layout.rx * 1.64, layout.ry * 1.32, Math.min(layout.rx, layout.ry) / 2);
    inner.stroke({ color: 0xffffff, width: 1, alpha: 0.12 });

  },

  drawSeats: function(layout, view, context) {
    if (!view.players) return;
    var mySeat = Renderer.mySeat(view, context);

      halo.stroke({ color: active ? 0xffd866 : teamColor, width: active ? 2.2 : 1, alpha: active ? 0.85 : 0.38 });

  drawKitty: function(layout, view) {
    var x = layout.cx + layout.rx * 0.52;
    var y = layout.cy - layout.ry * 0.08;
    var cw = Renderer.cardW(layout, "table");
    for (var i = 0; i < Math.min(3, view.kittyCount || 0); i++) {
      var back = Renderer.createCard(null, cw, false, false);
      back.x = x + i * 4;

      back.rotation = 0.04;

    }
    if (view.upcard) {
      var up = Renderer.createCard(view.upcard, cw, true, !!view.trump && Renderer.cardSuit(view.upcard) === view.trump);
      up.x = x - cw * 0.78;
      up.y = y;
      up.rotation = -0.08;
      Renderer.cardLayer.addChild(up);

      label.y = y + cw * 0.9;
      Renderer.cardLayer.addChild(label);
    }
  },

  drawTrick: function(layout, view, context) {
    if (!view.trick || view.trick.length === 0) return;
    var mySeat = Renderer.mySeat(view, context);
    var cw = Renderer.cardW(layout, "table") * 1.06;
    for (var i = 0; i < view.trick.length; i++) {
      var play = view.trick[i];
      var seat = Renderer.playerSeat(view, play.playerId);
      var visual = Renderer.visualSeat(seat, mySeat);
      var offset = Renderer.trickOffset(visual, cw);
      var card = Renderer.createCard(play.card, cw, true, Renderer.effectiveSuit(play.card, view.trump) === view.trump);
      card.x = layout.cx + offset.x;
      card.y = layout.cy + offset.y;
      card.rotation = offset.r;
      Renderer.cardLayer.addChild(card);
    }
  },

  drawHands: function(layout, view, context) {
    var myId = context ? context.myId : null;
    var mySeat = Renderer.mySeat(view, context);
    var cw = Renderer.cardW(layout, "hand");
    var actionH = layout.actionH;
    var handY = layout.h - actionH - cw * 0.78 - 28;

    if (view.myHand && view.myHand.length > 0) {
      var gap = Math.min(cw * 0.74, (layout.w - 34) / Math.max(5, view.myHand.length));
      var startX = layout.cx - gap * (view.myHand.length - 1) / 2;
      for (var i = 0; i < view.myHand.length; i++) {
        var card = Renderer.createCard(view.myHand[i], cw, true, Renderer.effectiveSuit(view.myHand[i], view.trump) === view.trump);
        card.x = startX + i * gap;
        card.y = handY + Math.abs(i - (view.myHand.length - 1) / 2) * 3;
        card.rotation = (i - (view.myHand.length - 1) / 2) * 0.045;
        Renderer.cardLayer.addChild(card);
      }
    }

    if (!view.players) return;
    for (var p = 0; p < view.players.length; p++) {
      var player = view.players[p];
      if (player.id === myId && view.myHand) continue;
      var visual = Renderer.visualSeat(player.seat, mySeat);
      var pos = Renderer.seatPosition(layout, visual);
      var count = player.handCount || 0;
      var cards = view.allHands ? view.allHands[player.id] : null;
      var miniW = Renderer.cardW(layout, "mini");
      if (layout.w < 640 && (visual === 1 || visual === 3)) miniW = Math.min(miniW, 24);
      if (visual === 2) miniW = Math.min(miniW, layout.w < 640 ? 26 : 34);
      var spread = Math.min(14, miniW * (layout.w < 640 && (visual === 1 || visual === 3) ? 0.22 : 0.28));
      for (var c = 0; c < count; c++) {
        var face = cards && cards[c];
        var back = Renderer.createCard(face, miniW, !!face, face && Renderer.effectiveSuit(face, view.trump) === view.trump);
        var centered = c - (count - 1) / 2;
        if (visual === 1 || visual === 3) {
          if (layout.w < 640) {
            var stepY = Math.max(8, miniW * 0.34);
            var cardH = miniW * 1.38;
            var topY = pos.y + 42 + c * stepY;
            back.x = pos.x + centered * 0.6;
            back.y = topY + cardH / 2;
            back.rotation = (visual === 1 ? -0.04 : 0.04) + centered * 0.01;
          } else {
            var sideOffset = Math.max(78, miniW * 2.2);
            var minX = miniW / 2 + 8;
            var maxX = layout.w - miniW / 2 - 8;
            var outsideX = visual === 1 ? pos.x - sideOffset : pos.x + sideOffset;
            var insideX = visual === 1 ? pos.x + sideOffset : pos.x - sideOffset;
            back.x = outsideX < minX || outsideX > maxX ? insideX : outsideX;
            back.y = pos.y + centered * spread;
            back.rotation = visual === 1 ? -0.12 : 0.12;
          }
        } else {
          back.x = pos.x + centered * spread;
          back.y = pos.y + (visual === 0 ? -55 : (layout.w < 640 ? 48 : 54));
          back.rotation = centered * 0.035;
        }
        Renderer.cardLayer.addChild(back);
      }
    }
  },

  playDealAnimation: function(view, context) {
    if (!Renderer.app || !view.players) return;
    if (window.playgent && window.playgent.sound) window.playgent.sound("card.deal.fast");
    var layout = Renderer.layout();
    var mySeat = Renderer.mySeat(view, context);
    var cw = Renderer.cardW(layout, "mini") * 0.95;
    var deckX = layout.cx + layout.rx * 0.52;
    var deckY = layout.cy - layout.ry * 0.08;
    for (var i = 0; i < 20; i++) {
      var player = view.players[i % view.players.length];
      var pos = Renderer.seatPosition(layout, Renderer.visualSeat(player.seat, mySeat));
      var card = Renderer.createCard(null, cw, false, false);
      card.x = deckX;
      card.y = deckY;
      card.alpha = 0;
      card.scale.set(0.62);
      Renderer.fxLayer.addChild(card);
      (function(c, target, index) {
        setTimeout(function() {
          if (!c.parent) return;
          c.alpha = 1;
          Tween.to(c, { x: target.x, y: target.y }, 420, "out");
          Tween.to(c.scale, { x: 1, y: 1 }, 420, "back", function() {
            Tween.to(c, { alpha: 0 }, 220, "out", function() {
              if (c.parent) {
                c.parent.removeChild(c);
                c.destroy({ children: true });
              }
            });
          });
          c.rotation = (index % 5 - 2) * 0.05;
        }, index * 28);
      })(card, pos, i);
    }
  },

  playEvent: function(event, view, context) {
    if (!event) return;
    var layout = Renderer.layout();
    var tone = event.tone || event.type || "trick";
    if (window.playgent && window.playgent.sound) {
      if (tone === "deal") window.playgent.sound("card.deal.fast");
      else if (tone === "trick") window.playgent.sound("card.collect");
      else if (tone === "euchre" || tone === "jackpot" || tone === "loner") window.playgent.sound("positive.clean");
      else if (tone === "game_over") window.playgent.sound("game.over");
      else window.playgent.sound("score.tick");
    }
    var color = ToneColors[tone] || 0xffd866;
    var x = layout.cx;
    var y = layout.cy;
    if (event.playerId) {
      var mySeat = Renderer.mySeat(view, context);
      var seat = Renderer.playerSeat(view, event.playerId);
      var pos = Renderer.seatPosition(layout, Renderer.visualSeat(seat, mySeat));
      x = pos.x;
      y = pos.y;
    }
    Renderer.showSlotPopup(event.title || "WIN", event.subtitle || "", color, tone);
    Renderer.emitBurst(x, y, color, tone === "euchre" || tone === "jackpot" || tone === "loner" ? 42 : 24);
    if (tone !== "quiet" && tone !== "deal") Renderer.shake = Math.max(Renderer.shake, tone === "trick" ? 4 : 8);
  },

  showSlotPopup: function(title, subtitle, color, tone) {
    Renderer.clearLayer(Renderer.bannerLayer);
    var layout = Renderer.layout();
    var metrics = Renderer.popupMetrics(layout);
    var box = new PIXI.Container();
    box.x = layout.cx;
    box.y = metrics.y;
    box.alpha = 0;
    box.scale.set(0.78);

    var bg = new PIXI.Graphics();
    bg.roundRect(-metrics.w / 2, -metrics.h / 2, metrics.w, metrics.h, 9);
    bg.fill({ color: 0x111722, alpha: 0.94 });
    bg.stroke({ color: color, width: 2, alpha: 0.86 });
    box.addChild(bg);

    if (metrics.showReels) {
      var reelLabels = Renderer.reelLabels(tone, title);
      var reelW = Math.min(54, metrics.w * 0.15);
      var reelH = Math.min(42, metrics.h * 0.38);
      var reelGap = Math.min(12, metrics.w * 0.035);
      var reelStart = -reelW - reelGap;
      for (var i = 0; i < 3; i++) {
        var reel = new PIXI.Graphics();
        reel.roundRect(reelStart + i * (reelW + reelGap), -metrics.h / 2 + 12, reelW, reelH, 6);
        reel.fill({ color: 0xf7f1dc, alpha: 0.96 });
        reel.stroke({ color: 0xffd866, width: 1.5, alpha: 0.7 });
        box.addChild(reel);
        var reelText = Renderer.text("?", Math.max(18, reelH * 0.58), i === 1 ? 0xb72643 : 0x111722, 950, "Georgia, serif");
        reelText.anchor.set(0.5);
        reelText.x = reelStart + i * (reelW + reelGap) + reelW / 2;
        reelText.y = -metrics.h / 2 + 12 + reelH / 2;
        box.addChild(reelText);
        (function(t, finalText, delay) {
          setTimeout(function() {
            if (!t.parent) return;
            t.text = finalText;
            t.scale.set(1.35);
            Tween.to(t.scale, { x: 1, y: 1 }, 240, "back");
          }, delay);
        })(reelText, reelLabels[i], 130 + i * 115);
      }
    }

    var titleSize = metrics.showReels ? 23 : 20;
    var titleText = Renderer.text(title, titleSize, 0xfff1b0, 950);
    titleText.anchor.set(0.5);
    titleText.y = metrics.showReels ? metrics.h * 0.14 : -metrics.h * 0.12;
    box.addChild(titleText);
    var subText = Renderer.text(subtitle, 12, 0xc9d2dc, 800);
    subText.anchor.set(0.5);
    subText.y = metrics.showReels ? metrics.h * 0.38 : metrics.h * 0.18;
    box.addChild(subText);

    Renderer.bannerLayer.addChild(box);
    Tween.to(box, { alpha: 1 }, 180, "out");
    Tween.to(box.scale, { x: 1, y: 1 }, 260, "back");
    setTimeout(function() {
      if (!box.parent) return;
      Tween.to(box, { alpha: 0 }, 360, "out", function() {
        if (box.parent) {
          box.parent.removeChild(box);
          box.destroy({ children: true });
        }
      });
    }, 2100);
  },

  popupMetrics: function(layout) {
    var titleY = Math.max(84, layout.topH + 20);
    var titleBottom = titleY + 22;
    var tableTop = layout.cy - layout.ry;
    var gap = Math.max(58, tableTop - titleBottom - 12);
    var maxH = layout.w < 640 ? 96 : 84;
    var h = Math.max(58, Math.min(maxH, gap));
    var w = Math.min(layout.w - 28, h < 86 ? 320 : 360);
    var y = titleBottom + 6 + h / 2;
    if (y + h / 2 > tableTop - 6) y = tableTop - 6 - h / 2;
    if (y - h / 2 < titleBottom + 6) y = titleBottom + 6 + h / 2;
    return {
      w: Math.max(260, w),
      h: h,
      y: y,
      showReels: h >= 86
    };
  },

  emitBurst: function(x, y, color, count) {
    for (var i = 0; i < count; i++) {
      var p = new PIXI.Graphics();
      var coin = i % 4 === 0;
      if (coin) {
        p.circle(0, 0, 4.5);
        p.fill({ color: 0xffd866, alpha: 0.95 });
        p.stroke({ color: 0xffffff, width: 1, alpha: 0.28 });
      } else {
        p.rect(-2, -2, 4, 4);
        p.fill({ color: i % 3 === 0 ? 0xffffff : color, alpha: 0.95 });
      }
      p.x = x;
      p.y = y;
      Renderer.fxLayer.addChild(p);
      var angle = i * 2.399 + (count % 7) * 0.31;
      var speed = 2.4 + (i % 9) * 0.34;
      Renderer.particles.push({
        node: p,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 1.2,
        life: 760 + (i % 8) * 70,
        max: 760 + (i % 8) * 70,
        rot: (i % 2 === 0 ? 1 : -1) * (0.04 + (i % 5) * 0.01)
      });
    }
  },

  updateParticles: function(ms) {
    var keep = [];
    for (var i = 0; i < Renderer.particles.length; i++) {
      var p = Renderer.particles[i];
      p.life -= ms;
      p.vy += 0.012 * ms;
      p.node.x += p.vx * ms / 16;
      p.node.y += p.vy * ms / 16;
      p.node.rotation += p.rot * ms / 16;
      p.node.alpha = Math.max(0, p.life / p.max);
      if (p.life > 0 && p.node.parent) {
        keep.push(p);
      } else if (p.node.parent) {
        p.node.parent.removeChild(p.node);
        p.node.destroy({ children: true });
      }
    }
    Renderer.particles = keep;
  },

  createCard: function(card, width, faceUp, highlight) {
    var h = width * 1.38;
    var r = Math.max(5, width * 0.1);
    var c = new PIXI.Container();

    var shadow = new PIXI.Graphics();
    shadow.roundRect(-width / 2 + 2, -h / 2 + 3, width, h, r);
    shadow.fill({ color: 0x000000, alpha: 0.35 });
    c.addChild(shadow);

    var body = new PIXI.Graphics();
    body.roundRect(-width / 2, -h / 2, width, h, r);
    if (faceUp) {
      body.fill({ color: 0xf8f1df });
      body.stroke({ color: highlight ? 0xffd866 : 0xb7ad97, width: highlight ? 2 : 1, alpha: 0.95 });
    } else {
      body.fill({ color: 0x102b3a });
      body.stroke({ color: 0x63e6be, width: 1.2, alpha: 0.58 });
    }
    c.addChild(body);

    if (!faceUp) {
      Renderer.drawCardBackDesign(c, width, h, r);
      return c;
    }

    var rank = Renderer.cardRank(card);
    var suit = Renderer.cardSuit(card);
    var red = suit === "h" || suit === "d";
    var color = red ? 0xb72643 : 0x162033;
    var rankLabel = rank === "T" ? "10" : rank;

    var corner = Renderer.text(rankLabel, width * 0.22, color, 950, "Georgia, serif");
    corner.anchor.set(0.5, 0);
    corner.x = -width * 0.32;
    corner.y = -h * 0.43;
    c.addChild(corner);
    var cornerSuit = Renderer.text(SuitSymbols[suit] || suit, width * 0.2, color, 900, "Georgia, serif");
    cornerSuit.anchor.set(0.5, 0);
    cornerSuit.x = -width * 0.32;
    cornerSuit.y = -h * 0.25;
    c.addChild(cornerSuit);

    var centerRank = Renderer.text(rankLabel, width * 0.46, color, 950, "Georgia, serif");
    centerRank.anchor.set(0.5);
    centerRank.y = -h * 0.07;
    c.addChild(centerRank);
    var centerSuit = Renderer.text(SuitSymbols[suit] || suit, width * 0.34, color, 900, "Georgia, serif");
    centerSuit.anchor.set(0.5);
    centerSuit.y = h * 0.24;
    c.addChild(centerSuit);
    return c;
  },

  drawCardBackDesign: function(cardNode, width, height, radius) {
    var inset = Math.max(5, width * 0.11);
    var frame = new PIXI.Graphics();
    frame.roundRect(-width / 2 + inset, -height / 2 + inset, width - inset * 2, height - inset * 2, Math.max(3, radius * 0.62));
    frame.stroke({ color: 0xffd866, width: 1, alpha: 0.28 });
    cardNode.addChild(frame);

    var medallion = new PIXI.Graphics();
    medallion.circle(0, 0, width * 0.25);
    medallion.fill({ color: 0xffd866, alpha: 0.08 });
    medallion.stroke({ color: 0x63e6be, width: 1, alpha: 0.34 });
    cardNode.addChild(medallion);

    for (var i = 0; i < 4; i++) {
      var pip = new PIXI.Graphics();
      pip.circle(0, 0, Math.max(1.7, width * 0.035));
      pip.fill({ color: i % 2 === 0 ? 0xffd866 : 0x63e6be, alpha: 0.48 });
      pip.x = (i < 2 ? -1 : 1) * (width * 0.28);
      pip.y = (i % 2 === 0 ? -1 : 1) * (height * 0.31);
      cardNode.addChild(pip);
    }

    var backText = Renderer.text("E", width * 0.48, 0xffd866, 950, "Georgia, serif");
    backText.anchor.set(0.5);
    backText.alpha = 0.32;
    cardNode.addChild(backText);
  },

  text: function(value, size, color, weight, family) {
    return new PIXI.Text({
      text: value || "",
      style: {
        fontFamily: family || "Inter, Arial, sans-serif",
        fontSize: size,
        fontWeight: String(weight || 700),
        fill: color,
        align: "center",
        letterSpacing: 0
      }
    });
  },

  clearLayer: function(layer) {
    if (!layer) return;
    while (layer.children.length > 0) {
      var child = layer.removeChildAt(0);
      child.destroy({ children: true });
    }
  },

  cardW: function(layout, kind) {
    if (kind === "hand") return Math.max(48, Math.min(78, layout.w / 7.2, (layout.h - layout.topH - layout.actionH) / 6.3));
    if (kind === "mini") return Math.max(28, Math.min(42, layout.w / 12, layout.h / 13));
    return Math.max(42, Math.min(62, layout.w / 12, layout.h / 10));
  },

  seatPosition: function(layout, visualSeat) {
    if (visualSeat === 0) return { x: layout.cx, y: Math.min(layout.h - layout.actionH - 124, layout.cy + layout.ry * 1.08) };
    if (visualSeat === 1) return { x: Math.max(66, layout.cx - layout.rx * 1.08), y: layout.cy + 8 };
    if (visualSeat === 2) return { x: layout.cx, y: Math.max(layout.topH + 72, layout.cy - layout.ry * 1.1) };
    return { x: Math.min(layout.w - 66, layout.cx + layout.rx * 1.08), y: layout.cy + 8 };
  },

  trickOffset: function(visualSeat, cw) {
    if (visualSeat === 0) return { x: 0, y: cw * 0.74, r: 0.02 };
    if (visualSeat === 1) return { x: -cw * 0.78, y: 0, r: -0.12 };
    if (visualSeat === 2) return { x: 0, y: -cw * 0.74, r: -0.03 };
    return { x: cw * 0.78, y: 0, r: 0.12 };
  },

  mySeat: function(view, context) {
    var myId = context ? context.myId : null;
    if (!view.players || !myId) return 0;
    for (var i = 0; i < view.players.length; i++) {
      if (view.players[i].id === myId) return view.players[i].seat;
    }
    return 0;
  },

  playerSeat: function(view, playerId) {
    if (!view.players) return 0;
    for (var i = 0; i < view.players.length; i++) {
      if (view.players[i].id === playerId) return view.players[i].seat;
    }
    return 0;
  },

  visualSeat: function(seat, mySeat) {
    return (seat - mySeat + 4) % 4;
  },

  shortName: function(id) {
    var name = Renderer.nameCache[id] || id || "";
    return name.length > 15 ? name.slice(0, 14) + "." : name;
  },

  phaseName: function(phase) {
    if (phase === "orderUp") return "Order Up";
    if (phase === "callTrump") return "Name Trump";
    if (phase === "discard") return "Dealer Discard";
    if (phase === "play") return "Trick Play";
    if (phase === "handEnd") return "Payout";
    if (phase === "gameOver") return "Cash Out";
    return phase || "Loading";
  },

  statusText: function(view) {
    if (!view) return "";
    if (view.phase === "orderUp") return Renderer.shortName(view.currentPlayer) + " eyes " + Renderer.cardLabel(view.upcard);
    if (view.phase === "callTrump") return Renderer.shortName(view.currentPlayer) + " can name trump";
    if (view.phase === "discard") return Renderer.shortName(view.currentPlayer) + " trims the pickup";
    if (view.phase === "play") {
      if (!view.trick || view.trick.length === 0) return Renderer.shortName(view.currentPlayer) + " leads the trick";
      return Renderer.shortName(view.currentPlayer) + " follows suit if able";
    }
    if (view.phase === "handEnd" && view.handSummary) return Renderer.teamName(view.handSummary.scoringTeam) + " scores " + view.handSummary.points;
    if (view.phase === "gameOver") return Renderer.teamName(view.winnerTeam) + " hits the payout";
    return "Euchre";
  },

  tableBadge: function(view) {
    if (!view.trump) return view.upcard ? "UPCARD " + Renderer.cardLabel(view.upcard) : "ORDER UP";
    return "TRUMP " + SuitSymbols[view.trump] + "  " + (view.alone ? "LONER" : Renderer.teamName(view.makerTeam));
  },

  actionLabel: function(action) {
    if (!action) return "Action";
    if (action.type === "pass") return "Pass";
    if (action.type === "order_up") return action.alone ? "Loner" : "Order";
    if (action.type === "call_trump") return (action.alone ? "Loner " : "Call ") + (SuitNames[action.suit] || action.suit);
    if (action.type === "discard") return "Discard " + Renderer.cardLabel(action.card);
    if (action.type === "play") return "Play " + Renderer.cardLabel(action.card);
    return action.type;
  },

  teamName: function(team) {
    return team === 0 ? "Team A" : "Team B";
  },

  cardRank: function(card) {
    return card ? card.charAt(0) : "";
  },

  cardSuit: function(card) {
    return card ? card.charAt(1) : "";
  },

  cardLabel: function(card) {
    if (!card) return "-";
    var rank = Renderer.cardRank(card);
    var label = rank === "T" ? "10" : rank;
    var suit = Renderer.cardSuit(card);
    return label + (SuitSymbols[suit] || suit);
  },

  effectiveSuit: function(card, trump) {
    var rank = Renderer.cardRank(card);
    var suit = Renderer.cardSuit(card);
    if (trump && rank === "J" && suit === Renderer.leftSuit(trump)) return trump;
    return suit;
  },

  leftSuit: function(trump) {
    if (trump === "h") return "d";
    if (trump === "d") return "h";
    if (trump === "s") return "c";
    if (trump === "c") return "s";
    return null;
  },

  reelLabels: function(tone, title) {
    if (tone === "jackpot" || tone === "loner" || title === "JACKPOT LONER") return ["J", "J", "J"];
    if (tone === "euchre") return ["E", "U", "!"];
    if (tone === "march") return ["5", "5", "5"];
    if (tone === "trump") return ["T", "R", "P"];
    if (tone === "trick") return ["9", "J", "A"];
    return ["9", "10", "A"];
  }
};

window.__playgentCheckLayout = function() {
  var failures = window.__playgentE2E ? window.__playgentE2E.checkLayout() : [];
  if (!Renderer.app || !Renderer.lastView) return failures;
  var hudEl = document.getElementById("hud");
  if (!hudEl) return failures;

  var layout = Renderer.layout();
  var hudBottom = hudEl.getBoundingClientRect().bottom;
  var marqueeTop = Math.max(84, layout.topH + 20) - 22;
  if (layout.topH < hudBottom + 8) {
    failures.push("Euchre canvas top safe area is inside the HUD");
  }
  if (marqueeTop < hudBottom + 8) {
    failures.push("Euchre canvas title overlaps the HUD");
  }
  return failures;
};

(function() {
  var pendingView = null;
  var pendingActions = null;
  var pendingContext = null;
  var ready = false;

  function receive(view, legalActions, context) {
    if (ready) {
      Renderer.onStateChange(view, legalActions, context || {});
    } else {
      pendingView = view;
      pendingActions = legalActions;
      pendingContext = context || {};
    }
  }

  function attachPlaygent() {
    if (typeof playgent !== "undefined" && playgent.onStateChange) {
      playgent.onStateChange(receive);
    } else {
      setTimeout(attachPlaygent, 50);
    }
  }

  function start() {
    if (typeof PIXI === "undefined") {
      setTimeout(start, 50);
      return;
    }
    Renderer.init().then(function() {
      ready = true;
      if (pendingView) {
        Renderer.onStateChange(pendingView, pendingActions || [], pendingContext || {});
        pendingView = null;
      }
    }).catch(function(err) {
      var status = document.getElementById("status-label");
      status.textContent = err && err.message ? err.message : String(err);
    });
  }

  attachPlaygent();
  start();
})();
</script>
